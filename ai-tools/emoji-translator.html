<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Emoji Translator — Khyati</title>
  <!-- SEO + social share preview: meta description, Open Graph & Twitter Card tags. (khyati:seo-meta) -->
  <meta name="description" content="Emoji Translator — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Khyati17" />
  <meta property="og:title" content="Emoji Translator — Khyati" />
  <meta property="og:description" content="Emoji Translator — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed." />
  <meta property="og:image" content="https://khyati17.com/og-image.png" />
  <meta property="og:url" content="https://khyati17.com/ai-tools/emoji-translator.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Emoji Translator — Khyati" />
  <meta name="twitter:description" content="Emoji Translator — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed." />
  <meta name="twitter:image" content="https://khyati17.com/og-image.png" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    :root{ --pp:#6a1b9a; --pp2:#9c4dcc; --acc:#e9d8ff; --ink:#2b0b3a; }
    .t-main{ max-width:760px; margin:0 auto; padding:18px 16px 48px; }
    .t-head{ text-align:center; margin:8px 0 22px; }
    .t-head h2{ font-size:clamp(1.5rem,4vw,2.2rem); color:var(--pp); margin:0; }
    .t-head p{ color:#6b5b7e; margin:8px 0 0; }
    .t-panel{ background:#fff; border:1px solid var(--acc); border-radius:16px; box-shadow:0 8px 28px rgba(117,80,168,.10); padding:20px; margin-bottom:20px; }
    label{ display:block; font-weight:600; color:var(--ink); margin-bottom:8px; font-size:.92rem; }
    textarea{ width:100%; min-height:90px; padding:12px 14px; border:1px solid #d9c7ee; border-radius:10px; font-family:inherit; font-size:1rem; color:var(--ink); resize:vertical; }
    textarea:focus{ outline:none; border-color:var(--pp2); }
    .t-generate{ margin-top:14px; width:100%; cursor:pointer; border:none; border-radius:12px; background:linear-gradient(90deg,var(--pp),var(--pp2)); color:#fff; font-weight:700; font-size:1.05rem; padding:14px; }
    .t-generate:hover{ opacity:.93; }
    .out{ background:linear-gradient(135deg,#faf5ff,#f2e9fd); border:1px solid #ead9fb; border-radius:12px; padding:18px; font-size:1.25rem; line-height:1.7; min-height:70px; color:var(--ink); word-break:break-word; }
    .out:empty::before{ content:"Your emoji-fied text appears here…"; color:#8a76a3; font-size:1rem; }
    .bar{ display:flex; justify-content:flex-end; margin-top:12px; }
    .copybtn{ cursor:pointer; border:1px solid var(--pp2); background:#fff; color:var(--pp); border-radius:10px; padding:8px 14px; font-weight:600; font-size:.85rem; }
    .t-toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:var(--pp); color:#fff; padding:10px 18px; border-radius:999px; font-size:.9rem; box-shadow:0 8px 24px rgba(0,0,0,.2); opacity:0; pointer-events:none; transition:all .25s; z-index:100; }
    .t-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
  <!-- canonical + site icon (khyati:head) -->
  <link rel="canonical" href="https://khyati17.com/ai-tools/emoji-translator.html" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#6a1b9a" />
</head>
<body>
  <div id="site-header-root"></div>
  <main class="t-main">
    <div class="t-head">
      <h2>😀 Emoji Translator</h2>
      <p>Turn your words into emojis. Type a sentence and watch it light up.</p>
    </div>
    <div class="t-panel">
      <label for="inp">Your text</label>
      <textarea id="inp" placeholder="e.g. I love pizza and my happy dog at the beach">I love pizza and my happy dog at the beach</textarea>
      <button class="t-generate" id="genBtn">😀 Emoji-fy</button>
    </div>
    <div class="t-panel">
      <div class="out" id="out"></div>
      <div class="bar"><button class="copybtn" id="copyBtn" style="display:none">📋 Copy</button></div>
    </div>
  </main>
  <div class="t-toast" id="toast">Copied!</div>
  <footer class="site-footer"><p>© <span id="year"></span> Khyati — All rights reserved</p></footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script>
  (function(){
    const MAP={
      love:"❤️",heart:"❤️",happy:"😊",sad:"😢",laugh:"😂",cry:"😭",angry:"😠",cool:"😎",
      pizza:"🍕",burger:"🍔",coffee:"☕",cake:"🎂",ice:"🍦",apple:"🍎",food:"🍽️",
      dog:"🐶",cat:"🐱",bird:"🐦",fish:"🐟",lion:"🦁",bear:"🐻",
      sun:"☀️",moon:"🌙",star:"⭐",rain:"🌧️",snow:"❄️",fire:"🔥",water:"💧",
      beach:"🏖️",home:"🏠",school:"🏫",work:"💼",car:"🚗",plane:"✈️",travel:"✈️",
      music:"🎵",book:"📚",game:"🎮",phone:"📱",money:"💰",gift:"🎁",party:"🎉",
      time:"⏰",day:"📅",night:"🌃",morning:"🌅",
      friend:"🧑‍🤝‍🧑",family:"👨‍👩‍👧",baby:"👶",king:"🤴",queen:"👸",
      yes:"✅",no:"❌",ok:"👌",good:"👍",bad:"👎",win:"🏆",
      flower:"🌸",tree:"🌳",earth:"🌍",rocket:"🚀",magic:"✨",dream:"💭",idea:"💡",
      run:"🏃",dance:"💃",sing:"🎤",sleep:"😴",eat:"🍴",smile:"😄"
    };
    const out=document.getElementById('out'), copyBtn=document.getElementById('copyBtn');
    const toast=document.getElementById('toast'); let tt;
    function showToast(m){ toast.textContent=m; toast.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>toast.classList.remove('show'),1400); }
    function gen(){
      const text=document.getElementById('inp').value||"";
      const result=text.replace(/\b([a-zA-Z]+)\b/g,(m)=>{ const e=MAP[m.toLowerCase()]; return e? (m+" "+e) : m; });
      out.textContent=result.trim();
      copyBtn.style.display = out.textContent? "inline-block":"none";
    }
    document.getElementById('genBtn').addEventListener('click',gen);
    copyBtn.addEventListener('click',()=>{ try{ navigator.clipboard.writeText(out.textContent); showToast("Copied!"); }catch(e){ showToast("Press Ctrl+C"); } });
    gen();
  })();
  </script>
  <script type="module" src="../assets/js/auth.js?v=2"></script>
  <script type="module">import('../assets/js/loadHeader.js').then(m=>m.loadSharedHeader());</script>
</body>
</html>
