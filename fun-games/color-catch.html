<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#2b0b3a,#6a1b9a,#9c4dcc);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
  .container{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:24px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);text-align:center;max-width:520px;width:100%;position:relative}
  h1{font-size:2rem;color:#fff;margin-bottom:6px;text-shadow:0 0 30px rgba(233,216,255,.4)}
  .subtitle{color:rgba(255,255,255,.65);font-size:.88rem;margin-bottom:16px}
  .score-board{display:flex;justify-content:space-between;background:rgba(0,0,0,.3);border-radius:12px;padding:10px 20px;margin-bottom:16px;color:#fff;font-size:1.05rem}
  .score-board span{color:#e9d8ff;font-weight:bold}
  canvas{display:block;margin:0 auto;border-radius:12px;background:#1a0a2a;box-shadow:0 0 40px rgba(156,77,204,.25);width:100%;max-width:400px;aspect-ratio:4/5;touch-action:none}
  .controls{margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .controls button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:10px 22px;border-radius:10px;cursor:pointer;font-size:1rem;transition:.2s}
  .controls button:hover{background:#e9d8ff;color:#2b0b3a}
  .over{display:none;position:absolute;inset:0;background:rgba(20,5,35,.82);border-radius:24px;justify-content:center;align-items:center;flex-direction:column;color:#fff;z-index:10}
  .over.show{display:flex}
  .over h2{font-size:2rem;margin-bottom:6px}.over p{opacity:.8;margin-bottom:14px}
  .over button{background:#e9d8ff;border:none;color:#2b0b3a;padding:10px 30px;border-radius:10px;font-weight:bold;cursor:pointer;font-size:1rem}
</style>

<body>
<div class="container">
  <div class="over" id="over"><h2>Game Over</h2><p>Score: <span id="fin">0</span></p><button onclick="reset()">Play Again</button></div>
  <h1>🎨 Color Catch</h1>
  <p class="subtitle">Move with ← → / mouse. Press SPACE to switch your color. Catch only matching drops!</p>
  <div class="score-board"><div>Score: <span id="score">0</span></div><div>Lives: <span id="lives">3</span></div><div>Best: <span id="best">0</span></div></div>
  <canvas id="c" width="400" height="500"></canvas>
  <div class="controls"><button onclick="switchColor()">🎨 Switch Color</button><button onclick="reset()">🔄 Restart</button></div>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const COLORS=['#ff5e7e','#5ec8ff','#7dff9b','#ffd65e'];
let paddle,drops,score,lives,best,colorIdx,spawnT,running;
try{best=parseInt(localStorage.getItem('colorCatchBest'))||0}catch(e){best=0}
document.getElementById('best').textContent=best;
function reset(){paddle={x:200,w:70,h:14};drops=[];score=0;lives=3;colorIdx=0;spawnT=0;running=true;
  document.getElementById('score').textContent=0;document.getElementById('lives').textContent=3;document.getElementById('over').classList.remove('show');}
function switchColor(){colorIdx=(colorIdx+1)%COLORS.length;}
function spawn(){drops.push({x:30+Math.random()*340,y:-20,r:14,ci:Math.floor(Math.random()*COLORS.length),v:2+score*0.03+Math.random()*1.5});}
let keys={};
addEventListener('keydown',e=>{keys[e.key]=1;if(e.key===' '){e.preventDefault();switchColor();}if(['ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
addEventListener('keyup',e=>{keys[e.key]=0;});
c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();paddle.x=(e.clientX-r.left)/r.width*400;});
c.addEventListener('touchmove',e=>{const r=c.getBoundingClientRect();paddle.x=(e.touches[0].clientX-r.left)/r.width*400;e.preventDefault();},{passive:false});
c.addEventListener('click',switchColor);
function loop(){
  x.fillStyle='#1a0a2a';x.fillRect(0,0,400,500);
  // starfield shimmer (keeps canvas animating for liveness)
  x.fillStyle='rgba(255,255,255,.06)';for(let i=0;i<18;i++){const sx=(i*53+ (performance.now()/40))%400;x.fillRect(sx,(i*70)%500,2,2);}
  if(running){
    if(keys.ArrowLeft)paddle.x-=6;if(keys.ArrowRight)paddle.x+=6;
    paddle.x=Math.max(paddle.w/2,Math.min(400-paddle.w/2,paddle.x));
    spawnT++;if(spawnT>Math.max(28,70-score))  {spawnT=0;spawn();}
    for(let i=drops.length-1;i>=0;i--){const d=drops[i];d.y+=d.v;
      if(d.y>470-d.r&&d.y<486&&Math.abs(d.x-paddle.x)<paddle.w/2+d.r){
        if(d.ci===colorIdx){score++;document.getElementById('score').textContent=score;}
        else{lives--;document.getElementById('lives').textContent=lives;}
        drops.splice(i,1);if(lives<=0)over();continue;}
      if(d.y>520){drops.splice(i,1);}
      else{x.fillStyle=COLORS[d.ci];x.beginPath();x.arc(d.x,d.y,d.r,0,7);x.fill();
        x.fillStyle='rgba(255,255,255,.3)';x.beginPath();x.arc(d.x-4,d.y-4,4,0,7);x.fill();}
    }
    // paddle
    x.fillStyle=COLORS[colorIdx];x.shadowColor=COLORS[colorIdx];x.shadowBlur=18;
    x.fillRect(paddle.x-paddle.w/2,480,paddle.w,paddle.h);x.shadowBlur=0;
    x.fillStyle='rgba(255,255,255,.85)';x.font='12px Segoe UI';x.textAlign='center';
    x.fillText('YOU',paddle.x,491);
  }
  requestAnimationFrame(loop);
}
function over(){running=false;if(score>best){best=score;try{localStorage.setItem('colorCatchBest',best)}catch(e){}document.getElementById('best').textContent=best;}
  document.getElementById('fin').textContent=score;document.getElementById('over').classList.add('show');}
reset();loop();
</script>
<script src="/assets/js/cute.js?v=5&amp;nb=1"></script>
</body>
