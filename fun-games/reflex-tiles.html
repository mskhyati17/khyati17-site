<body>
<div class="container">
  <div class="over" id="over"><h2>Times Up!</h2><p>Score: <span id="fin">0</span></p><button onclick="reset()">Play Again</button></div>
  <h1>⚡ Reflex Tiles</h1>
  <p class="subtitle">Tap the glowing tiles before they fade. Miss 3 and it's over!</p>
  <div class="score-board"><div>Score: <span id="score">0</span></div><div>Misses: <span id="miss">0</span>/3</div><div>Best: <span id="best">0</span></div></div>
  <canvas id="c" width="420" height="420"></canvas>
  <div class="controls"><button onclick="reset()">🔄 Restart</button></div>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const N=4,PAD=14,SIZE=(420-PAD*(N+1))/N;
let tiles,score,miss,best,running,spawnT,rate;
try{best=parseInt(localStorage.getItem('reflexTilesBest'))||0}catch(e){best=0}
document.getElementById('best').textContent=best;
function cell(r,col){return{x:PAD+col*(SIZE+PAD),y:PAD+r*(SIZE+PAD)};}
function reset(){tiles=[];score=0;miss=0;running=true;spawnT=0;rate=70;
  document.getElementById('score').textContent=0;document.getElementById('miss').textContent=0;document.getElementById('over').classList.remove('show');}
function spawn(){let r,col,key;let tries=0;do{r=Math.floor(Math.random()*N);col=Math.floor(Math.random()*N);key=r+'-'+col;tries++;}while(tiles.some(t=>t.key===key)&&tries<20);
  tiles.push({key,r,col,life:1,max:1});}
function hit(mx,my){for(let i=tiles.length-1;i>=0;i--){const t=tiles[i],p=cell(t.r,t.col);
  if(mx>=p.x&&mx<=p.x+SIZE&&my>=p.y&&my<=p.y+SIZE){tiles.splice(i,1);score++;document.getElementById('score').textContent=score;return;}}}
c.addEventListener('mousedown',e=>{if(!running)return;const r=c.getBoundingClientRect();hit((e.clientX-r.left)/r.width*420,(e.clientY-r.top)/r.height*420);});
c.addEventListener('touchstart',e=>{if(!running)return;const r=c.getBoundingClientRect();const t=e.touches[0];hit((t.clientX-r.left)/r.width*420,(t.clientY-r.top)/r.height*420);e.preventDefault();},{passive:false});
addEventListener('keydown',e=>{if(e.key===' '&&!running){e.preventDefault();reset();}});
function loop(){
  x.fillStyle='#0d041a';x.fillRect(0,0,420,420);
  const tm=performance.now();
  // grid base (gently shimmers so the board always animates)
  for(let r=0;r<N;r++)for(let col=0;col<N;col++){const p=cell(r,col);
    x.fillStyle=`rgba(255,255,255,${0.045+0.03*Math.sin(tm/500+r*1.3+col)})`;x.beginPath();x.roundRect(p.x,p.y,SIZE,SIZE,10);x.fill();}
  if(running){
    spawnT++;rate=Math.max(28,70-score*0.6);
    if(spawnT>rate){spawnT=0;spawn();}
    for(let i=tiles.length-1;i>=0;i--){const t=tiles[i];t.life-=0.012;
      if(t.life<=0){tiles.splice(i,1);miss++;document.getElementById('miss').textContent=miss;if(miss>=3)over();continue;}
      const p=cell(t.r,t.col),a=t.life;
      x.fillStyle=`rgba(233,216,255,${a})`;x.shadowColor='#e9d8ff';x.shadowBlur=20*a;
      x.beginPath();x.roundRect(p.x,p.y,SIZE,SIZE,10);x.fill();x.shadowBlur=0;
      x.fillStyle=`rgba(43,11,58,${a})`;x.font='bold 26px Segoe UI';x.textAlign='center';x.textBaseline='middle';
      x.fillText('⚡',p.x+SIZE/2,p.y+SIZE/2);
    }
  }
  requestAnimationFrame(loop);
}
function over(){if(!running)return;running=false;if(score>best){best=score;try{localStorage.setItem('reflexTilesBest',best)}catch(e){}document.getElementById('best').textContent=best;}
  document.getElementById('fin').textContent=score;document.getElementById('over').classList.add('show');}
reset();loop();
</script>
