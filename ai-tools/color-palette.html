<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Color Palette Generator — Khyati</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    :root{ --pp:#6a1b9a; --pp2:#9c4dcc; --acc:#e9d8ff; --ink:#2b0b3a; }
    .t-main{ max-width:860px; margin:0 auto; padding:18px 16px 48px; }
    .t-head{ text-align:center; margin:8px 0 22px; }
    .t-head h2{ font-size:clamp(1.5rem,4vw,2.2rem); color:var(--pp); margin:0; }
    .t-head p{ color:#6b5b7e; margin:8px 0 0; }
    .t-panel{ background:#fff; border:1px solid var(--acc); border-radius:16px; box-shadow:0 8px 28px rgba(117,80,168,.10); padding:20px; margin-bottom:20px; }
    .t-row{ display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    .t-row > div{ flex:1; min-width:180px; }
    label{ display:block; font-weight:600; color:var(--ink); margin-bottom:8px; font-size:.92rem; }
    select{ width:100%; padding:10px 12px; border:1px solid #d9c7ee; border-radius:10px; font-family:inherit; font-size:.95rem; background:#fff; color:var(--ink); }
    .t-generate{ margin-top:16px; width:100%; cursor:pointer; border:none; border-radius:12px; background:linear-gradient(90deg,var(--pp),var(--pp2)); color:#fff; font-weight:700; font-size:1.05rem; padding:14px; }
    .t-generate:hover{ opacity:.93; }
    .palette{ display:grid; grid-template-columns:repeat(5,1fr); gap:0; border-radius:14px; overflow:hidden; min-height:220px; box-shadow:0 8px 24px rgba(117,80,168,.14); }
    .swatch{ cursor:pointer; display:flex; align-items:flex-end; justify-content:center; padding-bottom:16px; min-height:220px; transition:flex .2s; position:relative; }
    .swatch span{ background:rgba(255,255,255,.85); color:#222; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:.8rem; font-weight:600; padding:4px 8px; border-radius:6px; }
    @media(max-width:560px){ .palette{ grid-template-columns:repeat(2,1fr); } .swatch{ min-height:120px; } }
    .t-toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:var(--pp); color:#fff; padding:10px 18px; border-radius:999px; font-size:.9rem; box-shadow:0 8px 24px rgba(0,0,0,.2); opacity:0; pointer-events:none; transition:all .25s; z-index:100; }
    .t-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
    .hint{ text-align:center; color:#8a76a3; font-size:.85rem; margin-top:10px; }
  </style>
</head>
<body>
  <div id="site-header-root"></div>
  <main class="t-main">
    <div class="t-head">
      <h2>🎨 Color Palette Generator</h2>
      <p>Generate beautiful colour palettes for your designs. Click a colour to copy its hex code.</p>
    </div>
    <div class="t-panel">
      <div class="t-row">
        <div>
          <label for="harmony">Style</label>
          <select id="harmony">
            <option value="random">Random</option>
            <option value="analogous">Analogous (similar)</option>
            <option value="complementary">Complementary (contrast)</option>
            <option value="monochrome">Monochrome (one hue)</option>
            <option value="pastel">Pastel (soft)</option>
          </select>
        </div>
      </div>
      <button class="t-generate" id="genBtn">🎨 Generate Palette</button>
    </div>
    <div class="palette" id="palette"></div>
    <button class="t-generate" id="copyAll" style="margin-top:14px;display:none">📋 Copy all hex codes</button>
    <div class="hint">Tip: press the <strong>spacebar</strong> for a new palette.</div>
  </main>
  <div class="t-toast" id="toast">Copied!</div>
  <footer class="site-footer"><p>© <span id="year"></span> Khyati — All rights reserved</p></footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script>
  (function(){
    const rnd=(min,max)=>Math.random()*(max-min)+min;
    const hsl2hex=(h,s,l)=>{ s/=100; l/=100; const k=n=>(n+h/30)%12; const a=s*Math.min(l,1-l);
      const f=n=>{const c=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1))); return Math.round(255*c).toString(16).padStart(2,'0');};
      return ('#'+f(0)+f(8)+f(4)).toUpperCase(); };
    function build(){
      const mode=document.getElementById('harmony').value;
      const base=rnd(0,360); const out=[];
      for(let i=0;i<5;i++){
        let h,s,l;
        switch(mode){
          case 'analogous':    h=(base + i*22)%360; s=rnd(55,75); l=rnd(45,65); break;
          case 'complementary':h=(base + (i%2?180:0) + i*8)%360; s=rnd(55,80); l=rnd(40,68); break;
          case 'monochrome':   h=base; s=rnd(35,70); l=20+i*15; break;
          case 'pastel':       h=(base + i*48)%360; s=rnd(40,60); l=rnd(78,88); break;
          default:             h=rnd(0,360); s=rnd(50,85); l=rnd(40,70);
        }
        out.push(hsl2hex(h,s,l));
      }
      return out;
    }
    const paletteEl=document.getElementById('palette');
    const copyAllBtn=document.getElementById('copyAll');
    const toast=document.getElementById('toast'); let tt;
    function showToast(m){ toast.textContent=m; toast.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>toast.classList.remove('show'),1400); }
    function copy(t){ try{ navigator.clipboard.writeText(t); showToast("Copied "+t); }catch(e){ showToast("Press Ctrl+C"); } }
    let current=[];
    function render(){
      current=build(); paletteEl.innerHTML="";
      current.forEach(hex=>{
        const d=document.createElement('div'); d.className='swatch'; d.style.background=hex;
        d.innerHTML=`<span>${hex}</span>`; d.addEventListener('click',()=>copy(hex));
        paletteEl.appendChild(d);
      });
      copyAllBtn.style.display="block";
    }
    document.getElementById('genBtn').addEventListener('click',render);
    copyAllBtn.addEventListener('click',()=>copy(current.join(', ')));
    document.addEventListener('keydown',e=>{ if(e.code==='Space' && e.target===document.body){ e.preventDefault(); render(); } });
    render();
  })();
  </script>
  <script type="module" src="../assets/js/auth.js"></script>
  <script type="module">import('../assets/js/loadHeader.js').then(m=>m.loadSharedHeader());</script>
</body>
</html>
