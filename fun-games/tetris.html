<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris 🧱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1a1a3e, #0d0d2b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            max-width: 520px;
            width: 100%;
            position: relative;
        }
        h1 {
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(0,150,255,0.3);
        }
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .game-wrapper {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        canvas#gameCanvas {
            display: block;
            border-radius: 12px;
            background: #111;
            box-shadow: 0 0 40px rgba(0,150,255,0.15);
            width: 100%;
            max-width: 300px;
            aspect-ratio: 10/20;
            image-rendering: pixelated;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 120px;
        }
        .panel-box {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 12px;
            color: #fff;
        }
        .panel-box h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 6px;
        }
        .panel-box .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #60a5fa;
        }
        canvas#nextCanvas {
            display: block;
            margin: 0 auto;
            border-radius: 8px;
            background: #0a0a0a;
            width: 80px;
            height: 80px;
            image-rendering: pixelated;
        }
        .controls {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .controls button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .controls button:hover {
            background: #60a5fa;
            color: #000;
            border-color: #60a5fa;
            transform: scale(1.05);
        }
        .controls button:active { transform: scale(0.95); }
        .mobile-dpad {
            display: none;
            margin-top: 12px;
            grid-template-areas:
                ". up ."
                "left down right";
            grid-template-columns: repeat(3, 56px);
            grid-template-rows: repeat(2, 56px);
            gap: 5px;
            justify-content: center;
        }
        .mobile-dpad button {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 12px;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .mobile-dpad button:active { background: #60a5fa; color: #000; }
        .dpad-up    { grid-area: up; }
        .dpad-down  { grid-area: down; }
        .dpad-left  { grid-area: left; }
        .dpad-right { grid-area: right; }
        .game-over-msg {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            border-radius: 24px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            z-index: 10;
        }
        .game-over-msg.show { display: flex; }
        .game-over-msg h2 { font-size: 2rem; margin-bottom: 6px; }
        .game-over-msg p { font-size: 1.1rem; opacity: 0.7; }
        .game-over-msg button {
            margin-top: 16px;
            background: #60a5fa;
            border: none;
            color: #000;
            padding: 10px 32px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .game-over-msg button:hover { background: #93bbfc; }
        @media (max-width: 520px) {
            .container { padding: 16px; border-radius: 16px; }
            h1 { font-size: 1.5rem; }
            .game-wrapper { flex-direction: column; align-items: center; }
            .mobile-dpad { display: grid; }
            .controls button { padding: 6px 12px; font-size: 0.8rem; }
            .side-panel { flex-direction: row; min-width: unset; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-over-msg" id="gameOverMsg">
            <h2>Game Over</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
        <h1>🧱 Tetris</h1>
        <p class="subtitle">Arrow keys to move & rotate</p>
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="200" height="400"></canvas>
            <div class="side-panel">
                <div class="panel-box">
                    <h3>Score</h3>
                    <div class="value" id="score">0</div>
                </div>
                <div class="panel-box">
                    <h3>High Score</h3>
                    <div class="value" id="highScore">0</div>
                </div>
                <div class="panel-box">
                    <h3>Next</h3>
                    <canvas id="nextCanvas" width="80" height="80"></canvas>
                </div>
            </div>
        </div>
        <div class="controls">
            <button onclick="togglePause()" id="pauseBtn">⏸ Pause</button>
            <button onclick="resetGame()">🔄 Restart</button>
        </div>
        <div class="mobile-dpad" id="mobileDpad">
            <button class="dpad-up"    onclick="rotatePiece()">⟳</button>
            <button class="dpad-left"  onclick="moveLeft()">◀</button>
            <button class="dpad-down"  onclick="softDrop()">▼</button>
            <button class="dpad-right" onclick="moveRight()">▶</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverMsg = document.getElementById('gameOverMsg');

        const COLS = 10;
        const ROWS = 20;
        const CELL = canvas.width / COLS;

        // Tetromino shapes
        const SHAPES = {
            I: { cells: [[1,1,1,1]], color: '#00f0f0' },
            O: { cells: [[1,1],[1,1]], color: '#f0f000' },
            T: { cells: [[0,1,0],[1,1,1]], color: '#a000f0' },
            S: { cells: [[0,1,1],[1,1,0]], color: '#00f000' },
            Z: { cells: [[1,1,0],[0,1,1]], color: '#f00000' },
            J: { cells: [[1,0,0],[1,1,1]], color: '#0000f0' },
            L: { cells: [[0,0,1],[1,1,1]], color: '#f0a000' }
        };
        const SHAPE_KEYS = ['I','O','T','S','Z','J','L'];

        let board, currentPiece, currentX, currentY, nextPiece;
        let score, highScore, running, paused, gameLoop, dropInterval;

        function createBoard() {
            return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
        }

        function randomPiece() {
            const key = SHAPE_KEYS[Math.floor(Math.random() * SHAPE_KEYS.length)];
            return {
                key,
                cells: SHAPES[key].cells.map(row => [...row]),
                color: SHAPES[key].color
            };
        }

        function rotateMatrix(matrix) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const result = Array.from({ length: cols }, (_, c) =>
                Array.from({ length: rows }, (_, r) => matrix[rows - 1 - r][c])
            );
            return result;
        }

        function rotatePiece() {
            if (!running || paused) return;
            const rotated = rotateMatrix(currentPiece.cells);
            if (!collision(rotated, currentX, currentY)) {
                currentPiece.cells = rotated;
                draw();
            }
        }

        function moveLeft() {
            if (!running || paused) return;
            if (!collision(currentPiece.cells, currentX - 1, currentY)) {
                currentX--;
                draw();
            }
        }

        function moveRight() {
            if (!running || paused) return;
            if (!collision(currentPiece.cells, currentX + 1, currentY)) {
                currentX++;
                draw();
            }
        }

        function softDrop() {
            if (!running || paused) return;
            if (!collision(currentPiece.cells, currentX, currentY + 1)) {
                currentY++;
                draw();
            }
        }

        function hardDrop() {
            if (!running || paused) return;
            while (!collision(currentPiece.cells, currentX, currentY + 1)) {
                currentY++;
            }
            lockPiece();
        }

        function collision(cells, offX, offY) {
            for (let r = 0; r < cells.length; r++) {
                for (let c = 0; c < cells[0].length; c++) {
                    if (cells[r][c]) {
                        const boardX = offX + c;
                        const boardY = offY + r;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS) return true;
                        if (boardY >= 0 && board[boardY][boardX]) return true;
                    }
                }
            }
            return false;
        }

        function lockPiece() {
            const cells = currentPiece.cells;
            for (let r = 0; r < cells.length; r++) {
                for (let c = 0; c < cells[0].length; c++) {
                    if (cells[r][c]) {
                        const boardX = currentX + c;
                        const boardY = currentY + r;
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
            clearLines();
            spawnPiece();
        }

        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== null)) {
                    board.splice(r, 1);
                    board.unshift(Array(COLS).fill(null));
                    cleared++;
                    r++; // re-check same row
                }
            }
            if (cleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[Math.min(cleared, 4)];
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    try { localStorage.setItem('tetrisHighScore', highScore); } catch(e) {}
                }
            }
        }

        function spawnPiece() {
            currentPiece = nextPiece;
            currentX = Math.floor((COLS - currentPiece.cells[0].length) / 2);
            currentY = -1;
            nextPiece = randomPiece();
            drawNext();

            if (collision(currentPiece.cells, currentX, currentY)) {
                gameOver();
            }
        }

        function init() {
            board = createBoard();
            score = 0;
            running = true;
            paused = false;
            dropInterval = 500;
            document.getElementById('pauseBtn').textContent = '⏸ Pause';
            gameOverMsg.classList.remove('show');
            scoreEl.textContent = '0';
            nextPiece = randomPiece();
            spawnPiece();
            draw();
        }

        function togglePause() {
            if (!running) return;
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Pause';
            if (!paused) scheduleDrop();
        }

        function resetGame() {
            clearTimeout(gameLoop);
            init();
            if (!paused) scheduleDrop();
        }

        function scheduleDrop() {
            clearTimeout(gameLoop);
            gameLoop = setTimeout(() => {
                if (!running || paused) return;
                if (!collision(currentPiece.cells, currentX, currentY + 1)) {
                    currentY++;
                    draw();
                    scheduleDrop();
                } else {
                    lockPiece();
                    if (running) scheduleDrop();
                }
            }, dropInterval);
        }

        function gameOver() {
            running = false;
            clearTimeout(gameLoop);
            finalScoreEl.textContent = score;
            gameOverMsg.classList.add('show');
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Grid
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        ctx.fillStyle = board[r][c];
                        ctx.shadowColor = board[r][c];
                        ctx.shadowBlur = 8;
                        ctx.beginPath();
                        ctx.roundRect(c * CELL + 1, r * CELL + 1, CELL - 2, CELL - 2, 3);
                        ctx.fill();
                    } else {
                        ctx.fillStyle = 'rgba(255,255,255,0.03)';
                        ctx.shadowBlur = 0;
                        ctx.beginPath();
                        ctx.roundRect(c * CELL + 1, r * CELL + 1, CELL - 2, CELL - 2, 2);
                        ctx.fill();
                    }
                }
            }
            ctx.shadowBlur = 0;
            // Current piece
            const cells = currentPiece.cells;
            ctx.fillStyle = currentPiece.color;
            ctx.shadowColor = currentPiece.color;
            ctx.shadowBlur = 12;
            for (let r = 0; r < cells.length; r++) {
                for (let c = 0; c < cells[0].length; c++) {
                    if (cells[r][c]) {
                        const x = (currentX + c) * CELL + 1;
                        const y = (currentY + r) * CELL + 1;
                        if (currentY + r >= 0) {
                            ctx.beginPath();
                            ctx.roundRect(x, y, CELL - 2, CELL - 2, 3);
                            ctx.fill();
                            // Inner highlight
                            ctx.fillStyle = 'rgba(255,255,255,0.25)';
                            ctx.beginPath();
                            ctx.roundRect(x + 2, y + 2, CELL - 6, CELL - 6, 2);
                            ctx.fill();
                            ctx.fillStyle = currentPiece.color;
                        }
                    }
                }
            }
            ctx.shadowBlur = 0;
        }

        function drawNext() {
            nextCtx.clearRect(0, 0, 80, 80);
            const cells = nextPiece.cells;
            const cellSize = 16;
            const cols = cells[0].length;
            const rows = cells.length;
            const offX = (80 - cols * cellSize) / 2;
            const offY = (80 - rows * cellSize) / 2;
            nextCtx.fillStyle = nextPiece.color;
            nextCtx.shadowColor = nextPiece.color;
            nextCtx.shadowBlur = 10;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (cells[r][c]) {
                        nextCtx.beginPath();
                        nextCtx.roundRect(offX + c * cellSize + 1, offY + r * cellSize + 1, cellSize - 2, cellSize - 2, 3);
                        nextCtx.fill();
                    }
                }
            }
            nextCtx.shadowBlur = 0;
        }

        // roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowLeft':  e.preventDefault(); moveLeft(); break;
                case 'ArrowRight': e.preventDefault(); moveRight(); break;
                case 'ArrowDown':  e.preventDefault(); softDrop(); break;
                case 'ArrowUp':    e.preventDefault(); rotatePiece(); break;
                case ' ':          e.preventDefault(); hardDrop(); break;
                case 'p':
                case 'P':          e.preventDefault(); togglePause(); break;
            }
        });

        // Touch swipe support
        let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
        canvas.addEventListener('touchstart', e => {
            const t = e.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
            touchStartTime = Date.now();
        }, { passive: true });
        canvas.addEventListener('touchend', e => {
            const t = e.changedTouches[0];
            const dx = t.clientX - touchStartX;
            const dy = t.clientY - touchStartY;
            const elapsed = Date.now() - touchStartTime;
            if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && elapsed < 200) {
                rotatePiece();
            } else if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0) moveRight(); else moveLeft();
            } else {
                if (dy > 0) softDrop(); else hardDrop();
            }
        }, { passive: true });

        // Load high score
        try {
            highScore = parseInt(localStorage.getItem('tetrisHighScore')) || 0;
            highScoreEl.textContent = highScore;
        } catch(e) { highScore = 0; }

        // Prevent scroll
        window.addEventListener('keydown', e => {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
                e.preventDefault();
            }
        });

        init();
        scheduleDrop();
    </script>
  <script src="/assets/js/cute.js?v=5&amp;nb=1"></script>
</body>
</html>
