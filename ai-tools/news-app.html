<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>News Aggregator — Khyati</title>
  <!-- SEO + social share preview: meta description, Open Graph & Twitter Card tags. (khyati:seo-meta) -->
  <meta name="description" content="News Aggregator — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Khyati17" />
  <meta property="og:title" content="News Aggregator — Khyati" />
  <meta property="og:description" content="News Aggregator — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed." />
  <meta property="og:image" content="https://khyati17.com/og-image.png" />
  <meta property="og:url" content="https://khyati17.com/ai-tools/news-app.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="News Aggregator — Khyati" />
  <meta name="twitter:description" content="News Aggregator — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed." />
  <meta name="twitter:image" content="https://khyati17.com/og-image.png" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    .tool-frame-wrap {
      width: 100%;
      max-width: var(--max-width);
      margin: 18px auto 36px;
      padding: 0 12px;
    }
    .tool-frame-wrap iframe {
      width: 100%;
      height: 82vh;
      min-height: 520px;
      border: none;
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(117,80,168,0.12);
      display: block;
    }
    /* loading + offline states */
    .tool-loading { text-align:center; color:#6a4b8f; padding:70px 16px; font-size:1rem; }
    .tool-offline {
      max-width: 560px; margin: 48px auto; padding: 40px 26px; text-align:center;
      background:#fff; border:1px solid #e9d8ff; border-radius:16px;
      box-shadow:0 8px 28px rgba(117,80,168,0.12);
    }
    .tool-offline .ico { font-size:3rem; line-height:1; }
    .tool-offline h2 { margin:14px 0 6px; color:#6a1b9a; }
    .tool-offline p { color:#555; margin:6px 0 20px; }
    .tool-offline .btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div id="site-header-root"></div>

  <div class="tool-frame-wrap" id="toolArea">
    <div class="tool-loading" id="toolLoading">⏳ Loading News Aggregator…</div>
    <iframe
      id="toolFrame"
      title="News Aggregator"
      allow="autoplay"
      style="display:none"
    ></iframe>
    <div class="tool-offline" id="toolOffline" style="display:none">
      <div class="ico">📰</div>
      <h2>News Aggregator is temporarily offline</h2>
      <p>This tool's live news service isn't responding right now. Please check back soon.</p>
      <div class="btn-row">
        <button class="btn" id="retryBtn">🔄 Try again</button>
        <a class="btn btn-ghost" href="/ai-tools/index.html">← Back to AI Zone</a>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>© <span id="year"></span> Khyati — All rights reserved</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script>
    // Embedded backend lives on a Hugging Face Space. We check its runtime
    // state via the CORS-friendly HF API and only show the iframe when the
    // Space is actually RUNNING — otherwise a friendly offline message.
    const EMBED_URL = "https://anuragbhumca07-news-app.hf.space";
    const SPACE_ID  = "anuragbhumca07/news-app";
    const frame   = document.getElementById('toolFrame');
    const loading = document.getElementById('toolLoading');
    const offline = document.getElementById('toolOffline');

    function show(el){ [frame,loading,offline].forEach(e=> e.style.display='none'); el.style.display = 'block'; }

    async function check(){
      show(loading);
      try{
        const res = await fetch(`https://huggingface.co/api/spaces/${SPACE_ID}`, { cache:'no-store', signal: AbortSignal.timeout(9000) });
        const data = await res.json();
        if(data && data.runtime && data.runtime.stage === 'RUNNING'){
          frame.src = EMBED_URL;
          show(frame);
        } else {
          show(offline);
        }
      }catch(e){
        // If the status check itself fails (network/CORS), optimistically try the embed.
        frame.src = EMBED_URL;
        show(frame);
      }
    }
    document.getElementById('retryBtn').addEventListener('click', check);
    check();
  </script>
  <script type="module" src="../assets/js/auth.js?v=2"></script>
  <script type="module">import('../assets/js/loadHeader.js').then(m=>m.loadSharedHeader());</script>
</body>
</html>
