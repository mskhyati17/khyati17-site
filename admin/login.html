<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in</title>
  <!-- SEO: meta description for search-result snippets. (khyati:seo-meta) -->
  <meta name="description" content="Khyati17 account area. Sign in to manage your profile and content." />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    #login-form{max-width:400px;margin:22px auto;text-align:left;background:#fff;border:1px solid #efe4fb;border-radius:18px;padding:24px 22px;box-shadow:0 14px 36px rgba(117,80,168,.14)}
    #login-form label{display:block;font-weight:700;color:#6a1b9a;font-size:.82rem;margin:12px 0 5px}
    #login-form label:first-of-type{margin-top:0}
    #login-form input{width:100%;padding:11px 13px;border:2px solid #e3d3f6;border-radius:11px;font:inherit;font-size:.98rem;color:#2b0b3a;outline:none;transition:border-color .15s}
    #login-form input:focus{border-color:#9c4dcc}
    #login-form input+br{display:none}
    #login-form button[type=submit]{width:100%;margin-top:18px;background:linear-gradient(90deg,#6a1b9a,#c56be0);color:#fff;border:none;border-radius:999px;padding:12px;font-weight:800;font-size:1rem;cursor:pointer}
    #login-form button[type=submit]:hover{transform:translateY(-1px)}
    #login-form .video-note,#login-form p{margin-top:14px;text-align:center;color:#6a4b8f;font-size:.88rem}
    #login-form a{color:#6a1b9a;font-weight:700}
    .hero>h2{text-align:center}
    [data-theme="dark"] #login-form{background:#241633;border-color:#3a2550}
    [data-theme="dark"] #login-form input{background:#1a1027;border-color:#3a2550;color:#f0e8ff}
    [data-theme="dark"] #login-form label{color:#d9b8ff}
    [data-theme="dark"] #login-form .video-note,[data-theme="dark"] #login-form p{color:#c3b0dd}
  </style>
  <!-- canonical + site icon (khyati:head) -->
  <link rel="canonical" href="https://khyati17.com/admin/login.html" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#6a1b9a" />
</head>
<body>
  <div id="site-header-root"></div>

  <main class="hero">
    <h2>Sign in</h2>
    <form id="login-form" style="max-width:420px;margin:16px auto;text-align:left;">
      <label>Email<br/><input id="email" type="email" autocapitalize="none" autocomplete="username" required/></label><br/>
      <label>Password<br/><input id="password" type="password" required/></label><br/>
      <button type="submit" class="btn">Sign in</button>
      <p class="video-note">New here? <a href="signup.html">Create an account</a></p>
      <p id="msg" style="color:#7a2a9b"></p>
    </form>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Khyati17 — All rights reserved</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script type="module" src="../assets/js/auth.js?v=2"></script>
  <script type="module">import('../assets/js/loadHeader.js').then(m=>m.loadSharedHeader());</script>
  <script>
    const form = document.getElementById('login-form');
    form.addEventListener('submit', async e =>{
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const p = document.getElementById('password').value;
      const res = await Auth.signin(email,p);
      const msg = document.getElementById('msg');
      console.debug('Auth.signin returned', res);

      // If using Supabase, only redirect when a session is present
      const isSupabase = window.Auth && window.Auth.isSupabase;
      const hasSession = res?.data?.session || res?.data?.access_token || res?.raw?.data?.session || res?.raw?.data?.access_token;

      if(res.ok && (!isSupabase || hasSession || res.confirmed === true)){
        // Signed in (or demo auth). Update UI and redirect to home.
        await Auth.renderAuthArea();
        msg.textContent = 'Signed in — redirecting...';
        setTimeout(()=>location.href='/',700);
        return;
      }

      // At this point either sign-in failed or Supabase requires email confirmation
      if(res.ok && isSupabase && res.confirmed === false){
        msg.textContent = 'Sign-up succeeded but confirmation required. Check your email (and spam) for a confirmation link.';
        return;
      }

      // Provide a clearer error message when available
      if(res && res.msg) {
        msg.textContent = res.msg;
        return;
      }

      // Fallback error
      msg.textContent = 'Sign-in failed. Open the console and network tab for details.';
    });
  </script>
</body>
</html>
