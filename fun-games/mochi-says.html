<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐶 Mochi Says</title>
<meta name="description" content="Mochi barks a colour sequence — repeat it back! A cute memory game on Khyati17." />
<meta property="og:title" content="🐶 Mochi Says — Khyati17" />
<meta property="og:description" content="Watch, remember, repeat — how long a sequence can you memorize?" />
<meta property="og:image" content="https://khyati17.com/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#2b0b3a,#6a1b9a,#9c4dcc);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
  .container{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:24px;padding:26px;box-shadow:0 30px 80px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);text-align:center;max-width:420px;width:100%}
  h1{font-size:1.7rem;color:#fff;margin-bottom:4px;text-shadow:0 0 30px rgba(233,216,255,.4)}
  .subtitle{color:rgba(255,255,255,.65);font-size:.82rem;margin-bottom:14px;min-height:1.1em}
  .score-board{display:flex;justify-content:space-between;background:rgba(0,0,0,.3);border-radius:12px;padding:9px 18px;margin-bottom:16px;color:#fff}
  .score-board b{color:#e9d8ff}
  .pads{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:320px;margin:0 auto}
  .pad{aspect-ratio:1;border-radius:18px;cursor:pointer;opacity:.55;transition:opacity .12s,transform .12s;display:flex;align-items:center;justify-content:center;font-size:2rem;border:none;user-select:none}
  .pad.lit{opacity:1;transform:scale(1.04);box-shadow:0 0 34px currentColor}
  .pad:disabled{cursor:not-allowed}
  .p0{background:#ff6a8a;color:#ff6a8a}.p1{background:#4dc0ff;color:#4dc0ff}.p2{background:#7ee081;color:#7ee081}.p3{background:#ffd166;color:#ffd166}
  .controls{margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .controls button,.back{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:10px 22px;border-radius:10px;cursor:pointer;font-size:.95rem;transition:.2s;text-decoration:none;display:inline-block}
  .controls button:hover,.back:hover{background:#e9d8ff;color:#2b0b3a}
  #start{background:#e9d8ff;color:#2b0b3a;font-weight:bold}
</style>
</head>
<body>
<div class="container">
  <h1>🐶 Mochi Says</h1>
  <p class="subtitle" id="msg">Press Start — watch Mochi, then repeat!</p>
  <div class="score-board"><div>Round: <b id="round">0</b></div><div id="phase">🐾 Ready</div><div>Best: <b id="best">0</b></div></div>
  <div class="pads">
    <button class="pad p0" data-pad="0" aria-label="pink">🐾</button>
    <button class="pad p1" data-pad="1" aria-label="blue">🐾</button>
    <button class="pad p2" data-pad="2" aria-label="green">🐾</button>
    <button class="pad p3" data-pad="3" aria-label="yellow">🐾</button>
  </div>
  <div class="controls">
    <button id="start">Start ▶</button>
    <a class="back" href="/fun-games/index.html">← All Games</a>
  </div>
</div>
<script>
(function(){
  var pads=[].slice.call(document.querySelectorAll('.pad'));
  var msg=document.getElementById('msg'), roundEl=document.getElementById('round'), bestEl=document.getElementById('best'), phaseEl=document.getElementById('phase');
  var seq=[], input=[], round=0, state='ready', best=0;
  try{ best=+localStorage.getItem('mochiSaysBest')||0; }catch(e){} bestEl.textContent=best;

  function setPads(on){ pads.forEach(function(p){ p.disabled=!on; }); }
  function flash(i, ms){ return new Promise(function(res){ pads[i].classList.add('lit'); setTimeout(function(){ pads[i].classList.remove('lit'); setTimeout(res, 140); }, ms); }); }
  function wait(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

  async function playSeq(){
    state='watch'; phaseEl.textContent='👀 Watch'; msg.textContent='Watch Mochi…'; setPads(false);
    await wait(500);
    for(var i=0;i<seq.length;i++){ await flash(seq[i], Math.max(260, 520 - round*14)); }
    state='input'; input=[]; phaseEl.textContent='🐾 Your turn'; msg.textContent='Your turn — repeat it!'; setPads(true);
  }
  function nextRound(){ round++; roundEl.textContent=round; seq.push(Math.floor(Math.random()*4)); playSeq(); }
  function start(){ seq=[]; input=[]; round=0; roundEl.textContent=0; state='ready'; nextRound(); }

  function press(i){
    if(state!=='input') return;
    pads[i].classList.add('lit'); setTimeout(function(){ pads[i].classList.remove('lit'); },160);
    input.push(i);
    if(seq[input.length-1]!==i){ gameOver(); return; }
    if(input.length===seq.length){ setPads(false); msg.textContent='Good boy! 🐶 Next round…'; phaseEl.textContent='✅'; setTimeout(nextRound, 700); }
  }
  function gameOver(){
    state='over'; setPads(false); phaseEl.textContent='💔';
    var reached=round-1; // completed rounds
    if(reached>best){ best=reached; try{ localStorage.setItem('mochiSaysBest',best); }catch(e){} bestEl.textContent=best; msg.textContent='Aww! New best: '+best+' 🏆 Press Start to try again!'; }
    else msg.textContent='Oops! You reached round '+round+'. Press Start to try again!';
  }

  pads.forEach(function(p){ p.addEventListener('click', function(){ press(+p.getAttribute('data-pad')); }); });
  document.getElementById('start').addEventListener('click', start);
  setPads(false);

  // test hooks
  window.__mochiSays = { get seq(){return seq.slice();}, get state(){return state;}, get round(){return round;}, press:press, start:start };
})();
</script>
<script src="/assets/js/cute.js?nb=1"></script>
</body>
</html>
