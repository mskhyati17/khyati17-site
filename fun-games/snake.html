<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake 🐍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1a1a3e, #0d0d2b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
            position: relative;
        }
        h1 {
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(0,255,100,0.3);
        }
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 10px 20px;
            margin-bottom: 18px;
            color: #fff;
            font-size: 1.1rem;
        }
        .score-board span { color: #4ade80; font-weight: bold; }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            background: #111;
            box-shadow: 0 0 40px rgba(0,255,100,0.15);
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1/1;
            image-rendering: pixelated;
        }
        .controls {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .controls button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            min-width: 80px;
        }
        .controls button:hover {
            background: #4ade80;
            color: #000;
            border-color: #4ade80;
            transform: scale(1.05);
        }
        .controls button:active { transform: scale(0.95); }
        .mobile-dpad {
            display: none;
            margin-top: 18px;
            grid-template-areas:
                ". up ."
                "left down right";
            grid-template-columns: repeat(3, 64px);
            grid-template-rows: repeat(2, 64px);
            gap: 6px;
            justify-content: center;
        }
        .mobile-dpad button {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 12px;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .mobile-dpad button:active { background: #4ade80; color: #000; }
        .dpad-up    { grid-area: up; }
        .dpad-down  { grid-area: down; }
        .dpad-left  { grid-area: left; }
        .dpad-right { grid-area: right; }
        .game-over-msg {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            border-radius: 24px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            z-index: 10;
        }
        .game-over-msg.show { display: flex; }
        .game-over-msg h2 { font-size: 2rem; margin-bottom: 6px; }
        .game-over-msg p { font-size: 1.1rem; opacity: 0.7; }
        .game-over-msg button {
            margin-top: 16px;
            background: #4ade80;
            border: none;
            color: #000;
            padding: 10px 32px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .game-over-msg button:hover { background: #6ee7a0; }
        @media (max-width: 600px) {
            .container { padding: 16px; border-radius: 16px; }
            h1 { font-size: 1.5rem; }
            .mobile-dpad { display: grid; }
            .controls button { min-width: 70px; padding: 8px 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-over-msg" id="gameOverMsg">
            <h2>Game Over</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
        <h1>🐍 Snake</h1>
        <p class="subtitle">Arrow keys or swipe to move</p>
        <div class="score-board">
            <div>Score: <span id="score">0</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button onclick="togglePause()" id="pauseBtn">⏸ Pause</button>
            <button onclick="resetGame()">🔄 Restart</button>
        </div>
        <div class="mobile-dpad" id="mobileDpad">
            <button class="dpad-up"    onclick="setDir('up')">▲</button>
            <button class="dpad-left"  onclick="setDir('left')">◀</button>
            <button class="dpad-down"  onclick="setDir('down')">▼</button>
            <button class="dpad-right" onclick="setDir('right')">▶</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverMsg = document.getElementById('gameOverMsg');

        const GRID = 20;
        const CELL = canvas.width / GRID;

        let snake, food, dir, nextDir, score, highScore, running, paused, gameLoop;

        function init() {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dir = 'right';
            nextDir = 'right';
            score = 0;
            running = true;
            paused = false;
            document.getElementById('pauseBtn').textContent = '⏸ Pause';
            gameOverMsg.classList.remove('show');
            scoreEl.textContent = '0';
            spawnFood();
            draw();
        }

        function spawnFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID),
                    y: Math.floor(Math.random() * GRID)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        function setDir(d) {
            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
            if (d !== opposites[dir]) nextDir = d;
        }

        function togglePause() {
            if (!running) return;
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Pause';
            if (!paused) gameLoop = setTimeout(step, 120);
        }

        function resetGame() {
            clearTimeout(gameLoop);
            init();
            if (!paused) gameLoop = setTimeout(step, 120);
        }

        function step() {
            if (!running || paused) return;
            dir = nextDir;

            const head = { ...snake[0] };
            switch (dir) {
                case 'up':    head.y--; break;
                case 'down':  head.y++; break;
                case 'left':  head.x--; break;
                case 'right': head.x++; break;
            }

            // Wall wrap
            if (head.x < 0) head.x = GRID - 1;
            if (head.x >= GRID) head.x = 0;
            if (head.y < 0) head.y = GRID - 1;
            if (head.y >= GRID) head.y = 0;

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    try { localStorage.setItem('snakeHighScore', highScore); } catch(e) {}
                }
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
            const speed = Math.max(60, 140 - score * 2);
            gameLoop = setTimeout(step, speed);
        }

        function gameOver() {
            running = false;
            clearTimeout(gameLoop);
            finalScoreEl.textContent = score;
            gameOverMsg.classList.add('show');
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL, 0);
                ctx.lineTo(i * CELL, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL);
                ctx.lineTo(canvas.width, i * CELL);
                ctx.stroke();
            }
            // Snake
            snake.forEach((seg, i) => {
                const ratio = 1 - i / snake.length * 0.5;
                const g = Math.floor(200 * ratio);
                ctx.fillStyle = `rgb(0, ${Math.max(60, g)}, 0)`;
                ctx.shadowColor = '#4ade80';
                ctx.shadowBlur = i === 0 ? 14 : 6;
                const p = 2;
                ctx.beginPath();
                ctx.roundRect(seg.x * CELL + p, seg.y * CELL + p, CELL - p*2, CELL - p*2, 4);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
            // Food
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            // Eyes on head
            if (snake.length > 0) {
                const h = snake[0];
                ctx.fillStyle = '#fff';
                const cx = h.x * CELL + CELL/2;
                const cy = h.y * CELL + CELL/2;
                const off = 4;
                const eSize = 3;
                ctx.beginPath();
                ctx.arc(cx - off, cy - off, eSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + off, cy - off, eSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(cx - off + (dir === 'left' ? -1 : 0), cy - off + (dir === 'up' ? -1 : 0), 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + off + (dir === 'right' ? 1 : 0), cy - off + (dir === 'up' ? -1 : 0), 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // roundRect polyfill for canvas
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            const keyMap = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                w: 'up', s: 'down', a: 'left', d: 'right'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                setDir(keyMap[e.key]);
            }
            if (e.key === ' ' || e.key === 'p') {
                e.preventDefault();
                togglePause();
            }
        });

        // Touch swipe support
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            const t = e.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
        }, { passive: true });
        canvas.addEventListener('touchend', e => {
            const t = e.changedTouches[0];
            const dx = t.clientX - touchStartX;
            const dy = t.clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                setDir(dx > 0 ? 'right' : 'left');
            } else {
                setDir(dy > 0 ? 'down' : 'up');
            }
        }, { passive: true });

        // Load high score
        try {
            highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
            highScoreEl.textContent = highScore;
        } catch(e) { highScore = 0; }

        // Prevent page scroll on arrow keys
        window.addEventListener('keydown', e => {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
                e.preventDefault();
            }
        });

        init();
        gameLoop = setTimeout(step, 120);
    </script>
  <script src="/assets/js/cute.js?v=5&amp;nb=1"></script>
</body>
</html>
