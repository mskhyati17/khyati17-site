<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stories</title>
  <!-- SEO + social share preview: meta description, Open Graph & Twitter Card tags. (khyati:seo-meta) -->
  <meta name="description" content="Read original short stories on Khyati17 — free, family-friendly tales you can enjoy in your browser." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Khyati17" />
  <meta property="og:title" content="Stories" />
  <meta property="og:description" content="Read original short stories on Khyati17 — free, family-friendly tales you can enjoy in your browser." />
  <meta property="og:image" content="https://khyati17.com/og-image.png" />
  <meta property="og:url" content="https://khyati17.com/stories/stories.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Stories" />
  <meta name="twitter:description" content="Read original short stories on Khyati17 — free, family-friendly tales you can enjoy in your browser." />
  <meta name="twitter:image" content="https://khyati17.com/og-image.png" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <!-- This page is the single-story reader. Opened on its own (e.g. via an old
       cached menu link or bookmark), send visitors to the Story Hub instead;
       the hub links here with ?story=<slug> to read a specific story. -->
  <script>
    (function(){
      try{
        if(!new URLSearchParams(location.search).get('story')){
          location.replace('/stories/index.html');
        }
      }catch(e){ /* if anything goes wrong, just show the reader */ }
    })();
  </script>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    /* keep the reader from overflowing on phones (stacks the sidebar) */
    #story-content{word-wrap:break-word;overflow-wrap:break-word}
    #story-content img{max-width:100%;height:auto}
    @media (max-width:700px){
      .stories-layout{flex-direction:column !important;gap:12px !important}
      #stories-list{width:auto !important;min-width:0 !important;max-height:220px !important}
      .stories-layout > div{width:auto !important}
    }
  </style>
  <!-- canonical + site icon (khyati:head) -->
  <link rel="canonical" href="https://khyati17.com/stories/stories.html" />
</head>
<body>
  <div id="site-header-root"></div>

  <main class="hero">
    <h2>Stories</h2>
    <p>Purple-themed place for stories and more.</p>

    <section class="stories-layout" style="margin-top:18px;display:flex;gap:18px;max-width:1200px;margin-left:auto;margin-right:auto">
      <aside id="stories-list" style="width:25%;min-width:220px;max-height:70vh;overflow:auto;background:rgba(154,68,204,0.02);padding:12px;border-radius:8px">
        <h3 style="margin-top:0">Stories</h3>
        <div id="stories-list-container"></div>
      </aside>

      <div style="width:75%;min-height:400px;display:flex;flex-direction:column">
        <div id="admin-area" style="margin-bottom:12px"></div>
        <article id="story-content" style="background:#fff;padding:16px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.06);overflow:auto;max-height:70vh"></article>
        <div id="comments-area" class="comments-area" style="margin-top:12px">
          <h4 style="margin:6px 0 12px">Comments</h4>
          <div id="comments-list" style="margin-bottom:12px"></div>
          <div id="comment-form-wrapper"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Khyati — All rights reserved</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script type="module" src="../assets/js/auth.js?v=2"></script>
  <script type="module">import('../assets/js/loadHeader.js').then(m=>m.loadSharedHeader());</script>
  <script type="module">
    import { fetchComments, renderCommentsInto, renderCommentForm } from '../assets/js/comments.js?v=2';
    import adminModule from '../assets/js/admin.js';
    // bump the ?v= version whenever stories-data.js changes (see index.html)
    import { STORIES as BAKED } from './stories-data.js?v=20260626a';

    const slugOf = s => s.slug || s.id || (s.title||'').replace(/\s+/g,'-').toLowerCase();
    let ALL_STORIES = [];

    // Estimate reading time from the story body (~200 words/min).
    function readingTime(html){
      const words = String(html||'').replace(/<[^>]+>/g,' ').trim().split(/\s+/).filter(Boolean).length;
      return Math.max(1, Math.round(words/200));
    }

    async function loadStories(){
      let extra = [];
      if(window.supabase){
        try{ const { data, error } = await window.supabase.from('stories').select('*').order('created_at', {ascending:false}); if(!error && data) extra = data; }
        catch(e){ console.warn('supabase fetch stories failed', e); }
      } else {
        extra = JSON.parse(localStorage.getItem('khyati_stories_admin')||'[]');
      }
      // Baked-in stories first, then any extras that aren't already baked in.
      const stories = [...BAKED];
      const have = new Set(stories.map(slugOf));
      (extra||[]).forEach(s=>{ if(!have.has(slugOf(s))) stories.push(s); });
      ALL_STORIES = stories;
      const container = document.getElementById('stories-list-container'); container.innerHTML = '';
      stories.forEach(s=>{
        const a = document.createElement('div'); a.style.padding='8px'; a.style.cursor='pointer'; a.style.borderBottom='1px solid rgba(106,27,154,0.04)';
        a.textContent = s.title || s.slug || '(untitled)';
        a.addEventListener('click', ()=> showStory(s));
        container.appendChild(a);
      });
      // If the Story Hub linked us to a specific story (?story=<slug>), open it;
      // otherwise fall back to the first/most-recent story.
      const wanted = new URLSearchParams(location.search).get('story');
      const idOf = s => s.slug || s.id || (s.title||'').replace(/\s+/g,'-').toLowerCase();
      const target = wanted ? stories.find(s=> idOf(s) === wanted) : null;
      const toShow = target || stories[0];
      if(toShow) showStory(toShow);
    }

    function showStory(s){
      const el = document.getElementById('story-content');
      if(!el) return;
      const slug = s.slug || s.id || (s.title||'').replace(/\s+/g,'-').toLowerCase();
      const mins = readingTime(s.body);
      const meta = `<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:2px 0 10px;font-size:.8rem;color:#8a6fb0">`
        + (s.category ? `<span style="background:#f3e9fd;color:#6a1b9a;font-weight:700;border-radius:999px;padding:3px 10px">${escapeHtml(s.category)}</span>` : '')
        + `<span>⏱️ ${mins} min read</span></div>`;
      el.innerHTML = `<h2>${escapeHtml(s.title||'')}</h2>${meta}<p style="color:#6a4b8f">${escapeHtml(s.excerpt||'')}</p>`
        + `<button id="story-share" class="btn btn-ghost" style="margin:2px 0 12px;font-size:.85rem;padding:6px 14px">🔗 Share story</button>`
        + `<div>${s.body||''}</div>`
        + `<div style="margin:22px 0 6px;text-align:center"><button id="story-another" class="btn" style="font-size:.9rem">🎲 Read another story</button></div>`;
      // "Read another" opens a random different story
      const another = document.getElementById('story-another');
      if(another) another.addEventListener('click', ()=>{
        if(ALL_STORIES.length < 2){ return; }
        let pick; do { pick = ALL_STORIES[Math.floor(Math.random()*ALL_STORIES.length)]; } while(slugOf(pick) === slug);
        showStory(pick);
        el.scrollIntoView({behavior:'smooth', block:'start'});
      });
      // wire the share button (native share on mobile, copy link elsewhere)
      const sb = document.getElementById('story-share');
      if(sb) sb.addEventListener('click', async ()=>{
        const shareUrl = 'https://khyati17.com/stories/stories.html?story=' + encodeURIComponent(slug);
        const data = { title: (s.title||'A story') + ' — Khyati17', text: s.excerpt || 'Read this story on Khyati17!', url: shareUrl };
        if(navigator.share){ try{ await navigator.share(data); return; }catch(e){} }
        try{ await navigator.clipboard.writeText(shareUrl); sb.textContent='✅ Link copied!'; }
        catch(e){ sb.textContent='Press Ctrl+C'; }
        setTimeout(()=>{ sb.textContent='🔗 Share story'; }, 1600);
      });
      // set a data-content-id for comments to pick up
      el.setAttribute('data-content-id', slug);
      // load comments for this story
      (async ()=>{
        const cid = el.getAttribute('data-content-id');
        const comments = await fetchComments('story', cid);
        const commentsList = document.getElementById('comments-list');
        renderCommentsInto(commentsList, comments);
        // render the comment form (sign-in prompt or textarea + post)
        renderCommentForm(document.getElementById('comment-form-wrapper'), 'story', cid, commentsList);
      })();
    }

    // simple HTML escaper
    function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    document.addEventListener('DOMContentLoaded', async ()=>{
      if(window.AuthReady) try{ await window.AuthReady }catch(e){}
      await loadStories();
      // mount admin UI if current user is admin
      try{ await adminModule.mountAdminUI('stories'); }catch(e){/* ignore */}
    });
    
  </script>
</body>
</html>
