<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong 🏓</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1a1a3e, #0d0d2b);
            min-height: 100vh; display: flex; justify-content: center;
            align-items: center; padding: 20px; overflow: hidden;
        }
        .container {
            background: rgba(255,255,255,0.07); backdrop-filter: blur(12px);
            border-radius: 24px; padding: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; max-width: 600px; width: 100%;
        }
        h1 { font-size: 2.2rem; color: #fff; margin-bottom: 8px; text-shadow: 0 0 30px rgba(0,200,255,0.3); }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 14px; }
        .score-board {
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.4); border-radius: 12px;
            padding: 8px 20px; margin-bottom: 12px; color: #fff; font-size: 1.1rem;
        }
        .score-board .player { color: #60a5fa; font-weight: bold; }
        .score-board .cpu { color: #f87171; font-weight: bold; }
        canvas {
            display: block; margin: 0 auto; border-radius: 12px;
            background: #0a0a1a; box-shadow: 0 0 40px rgba(0,200,255,0.1);
            width: 100%; max-width: 550px;
        }
        .controls { margin-top: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .controls button {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 20px; border-radius: 10px; cursor: pointer;
            font-size: 0.9rem; transition: 0.2s;
        }
        .controls button:hover { background: #60a5fa; color: #000; border-color: #60a5fa; transform: scale(1.05); }
        .game-over-msg {
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.75); border-radius: 24px;
            justify-content: center; align-items: center; flex-direction: column; color: #fff; z-index: 10;
        }
        .game-over-msg.show { display: flex; }
        .game-over-msg h2 { font-size: 2rem; margin-bottom: 4px; }
        .game-over-msg p { font-size: 1.1rem; opacity: 0.7; }
        .game-over-msg button {
            margin-top: 14px; background: #60a5fa; border: none;
            color: #000; padding: 10px 32px; border-radius: 10px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        .game-over-msg button:hover { background: #93bbfd; }
        @media (max-width: 600px) {
            .container { padding: 16px; border-radius: 16px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container" style="position:relative">
        <div class="game-over-msg" id="gameOverMsg">
            <h2 id="gameOverTitle">Game Over</h2>
            <p id="gameOverDetail">You 0 - 5 CPU</p>
            <button onclick="resetGame()">Play Again</button>
        </div>
        <h1>🏓 Pong</h1>
        <p class="subtitle">↑ ↓ to move | First to 5 wins</p>
        <div class="score-board">
            <div>You: <span class="player" id="playerScore">0</span></div>
            <div>CPU: <span class="cpu" id="cpuScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="550" height="400"></canvas>
        <div class="controls">
            <button onclick="togglePause()" id="pauseBtn">⏸ Pause</button>
            <button onclick="resetGame()">🔄 Restart</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 550, H = 400;
        const playerScoreEl = document.getElementById('playerScore');
        const cpuScoreEl = document.getElementById('cpuScore');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const gameOverDetail = document.getElementById('gameOverDetail');
        const gameOverMsg = document.getElementById('gameOverMsg');

        const PADDLE_W = 10, PADDLE_H = 70;
        const BALL_SIZE = 10;
        const WIN_SCORE = 5;

        let player, cpu, ball, playerScore, cpuScore, running, paused, gameLoop;
        let keys = {};

        function init() {
            player = { x: 20, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, vy: 0 };
            cpu = { x: W - 20 - PADDLE_W, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, vy: 0 };
            resetBall();
            playerScore = 0;
            cpuScore = 0;
            running = true;
            paused = false;
            keys = {};
            playerScoreEl.textContent = '0';
            cpuScoreEl.textContent = '0';
            document.getElementById('pauseBtn').textContent = '⏸ Pause';
            gameOverMsg.classList.remove('show');
        }

        function resetBall() {
            ball = {
                x: W/2 - BALL_SIZE/2,
                y: H/2 - BALL_SIZE/2,
                w: BALL_SIZE, h: BALL_SIZE,
                vx: (Math.random() > 0.5 ? 1 : -1) * 4,
                vy: (Math.random() - 0.5) * 3
            };
        }

        function togglePause() {
            if (!running) return;
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Pause';
        }

        function resetGame() {
            clearInterval(gameLoop);
            init();
            gameLoop = setInterval(update, 20);
        }

        function update() {
            if (!running || paused) return;

            const SPEED = 5;
            if (keys['ArrowUp']) player.vy = -SPEED;
            else if (keys['ArrowDown']) player.vy = SPEED;
            else player.vy = 0;
            player.y += player.vy;
            player.y = Math.max(0, Math.min(H - player.h, player.y));

            // CPU AI
            const cpuSpeed = 3.2;
            const ballCenter = ball.y + ball.h/2;
            const cpuCenter = cpu.y + cpu.h/2;
            if (ballCenter < cpuCenter - 5) cpu.vy = -cpuSpeed;
            else if (ballCenter > cpuCenter + 5) cpu.vy = cpuSpeed;
            else cpu.vy = 0;
            cpu.y += cpu.vy;
            cpu.y = Math.max(0, Math.min(H - cpu.h, cpu.y));

            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.y <= 0 || ball.y + ball.h >= H) ball.vy *= -1;

            // Paddle collision
            if (ball.x <= player.x + player.w && ball.x + ball.w >= player.x &&
                ball.y < player.y + player.h && ball.y + ball.h > player.y) {
                ball.vx = Math.abs(ball.vx) * 1.05;
                ball.vy += (ball.y + ball.h/2 - (player.y + player.h/2)) * 0.05;
                ball.x = player.x + player.w;
            }
            if (ball.x + ball.w >= cpu.x && ball.x <= cpu.x + cpu.w &&
                ball.y < cpu.y + cpu.h && ball.y + ball.h > cpu.y) {
                ball.vx = -Math.abs(ball.vx) * 1.05;
                ball.vy += (ball.y + ball.h/2 - (cpu.y + cpu.h/2)) * 0.05;
                ball.x = cpu.x - ball.w;
            }

            if (ball.x < 0) {
                cpuScore++;
                cpuScoreEl.textContent = cpuScore;
                if (cpuScore >= WIN_SCORE) { gameOver('CPU Wins!', `You ${playerScore} - ${cpuScore} CPU`); return; }
                resetBall();
            }
            if (ball.x > W) {
                playerScore++;
                playerScoreEl.textContent = playerScore;
                if (playerScore >= WIN_SCORE) { gameOver('You Win!', `You ${playerScore} - ${cpuScore} CPU`); return; }
                resetBall();
            }

            draw();
        }

        function gameOver(title, detail) {
            running = false;
            clearInterval(gameLoop);
            gameOverTitle.textContent = title;
            gameOverDetail.textContent = detail;
            gameOverMsg.classList.add('show');
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            // Center line
            ctx.setLineDash([8, 8]);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
            ctx.setLineDash([]);
            // Player paddle
            ctx.shadowColor = '#60a5fa'; ctx.shadowBlur = 15;
            ctx.fillStyle = '#60a5fa';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            // CPU paddle
            ctx.shadowColor = '#f87171'; ctx.shadowBlur = 15;
            ctx.fillStyle = '#f87171';
            ctx.fillRect(cpu.x, cpu.y, cpu.w, cpu.h);
            // Ball
            ctx.shadowColor = '#fff'; ctx.shadowBlur = 20;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(ball.x + ball.w/2, ball.y + ball.h/2, ball.w/2, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); }
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; });
        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
        });

        init();
        gameLoop = setInterval(update, 20);
    </script>
  <script src="/assets/js/cute.js?v=4&amp;nb=1"></script>
</body>
</html>
