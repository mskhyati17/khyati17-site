    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.2em;
        }

        .status {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
            min-height: 30px;
            font-weight: 500;
        }

        .status.winner {
            color: #27ae60;
            font-weight: bold;
        }

        .status.draw {
            color: #e67e22;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 20px auto;
            max-width: 350px;
        }

        .cell {
            aspect-ratio: 1;
            background: #f0f0f0;
            border: none;
            border-radius: 12px;
            font-size: 3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .cell:hover:not(.disabled) {
            background: #e0e0e0;
            transform: scale(1.02);
        }

        .cell.x {
            color: #3498db;
        }

        .cell.o {
            color: #e74c3c;
        }

        .cell.win-cell {
            background: #d4edda;
            animation: pulse 0.5s ease-in-out;
        }

        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
            transform: translateY(-2px);
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            min-height: 40px;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .mode-toggle {
            margin-bottom: 15px;
        }

        .mode-toggle label {
            font-size: 0.95em;
            color: #555;
            cursor: pointer;
        }

        .mode-toggle input[type="checkbox"] {
            margin-right: 6px;
            cursor: pointer;
        }
    </style>
  <!-- canonical + site icon (khyati:head) -->
  <link rel="canonical" href="https://khyati17.com/fun-games/tictactoe/index.html" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

<body>
    <div class="container">
        <h1>🎮 Tic-Tac-Toe</h1>
        <div class="mode-toggle">
            <label>
                <input type="checkbox" id="aiMode"> Play against AI
            </label>
        </div>
        <div class="status" id="status">Player X's turn</div>
        <div class="board" id="board">
            <button class="cell" data-row="0" data-col="0"></button>
            <button class="cell" data-row="0" data-col="1"></button>
            <button class="cell" data-row="0" data-col="2"></button>
            <button class="cell" data-row="1" data-col="0"></button>
            <button class="cell" data-row="1" data-col="1"></button>
            <button class="cell" data-row="1" data-col="2"></button>
            <button class="cell" data-row="2" data-col="0"></button>
            <button class="cell" data-row="2" data-col="1"></button>
            <button class="cell" data-row="2" data-col="2"></button>
        </div>
        <div class="controls">
            <button class="btn btn-primary" id="resetBtn">🔄 New Game</button>
            <button class="btn btn-success" id="aiMoveBtn">🤖 AI Move</button>
        </div>
        <div class="message" id="message"></div>
    </div>

    <script>
        const board = document.getElementById('board');
        const status = document.getElementById('status');
        const message = document.getElementById('message');
        const resetBtn = document.getElementById('resetBtn');
        const aiMoveBtn = document.getElementById('aiMoveBtn');
        const aiModeCheckbox = document.getElementById('aiMode');

        let gameOver = false;
        let currentPlayer = 'X';

        async function apiCall(url, options = {}) {
            try {
                const response = await fetch(url, {
                    headers: { 'Content-Type': 'application/json' },
                    ...options
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'API error');
                }
                return data;
            } catch (err) {
                showMessage(err.message, 'error');
                return null;
            }
        }

        async function loadState() {
            const data = await apiCall('/api/state');
            if (data) updateUI(data);
        }

        async function makeMove(row, col) {
            if (gameOver) return;

            const data = await apiCall('/api/move', {
                method: 'POST',
                body: JSON.stringify({ row, col })
            });

            if (data) {
                updateUI(data);
                // If AI mode is on and it's now O's turn and game isn't over
                if (aiModeCheckbox.checked && !data.game_over && data.current_player === 'O') {
                    setTimeout(() => doAIMove(), 300);
                }
            }
        }

        async function doAIMove() {
            const data = await apiCall('/api/ai-move', { method: 'POST' });
            if (data) updateUI(data);
        }

        async function resetGame() {
            const data = await apiCall('/api/reset', { method: 'POST' });
            if (data) updateUI(data);
            showMessage('Game reset!', 'success');
        }

        function updateUI(data) {
            // Update board
            const cells = board.querySelectorAll('.cell');
            cells.forEach(cell => {
                const row = parseInt(cell.dataset.row);
                const col = parseInt(cell.dataset.col);
                const value = data.board[row][col];
                cell.textContent = value || '';
                cell.className = 'cell';
                if (value === 'X') cell.classList.add('x');
                if (value === 'O') cell.classList.add('o');
                if (data.game_over) cell.classList.add('disabled');
            });

            // Highlight winning cells
            if (data.winner) {
                highlightWinCells(data.board, data.winner);
            }

            // Update status
            gameOver = data.game_over;
            currentPlayer = data.current_player;
            status.className = 'status';

            if (data.winner) {
                status.textContent = `🎉 Player ${data.winner} wins!`;
                status.classList.add('winner');
            } else if (data.is_draw) {
                status.textContent = "🤝 It's a draw!";
                status.classList.add('draw');
            } else {
                status.textContent = `Player ${data.current_player}'s turn`;
            }

            // Enable/disable AI move button
            aiMoveBtn.disabled = gameOver || data.current_player !== 'O';
        }

        function highlightWinCells(boardState, winner) {
            // Check rows
            for (let r = 0; r < 3; r++) {
                if (boardState[r][0] === winner && boardState[r][1] === winner && boardState[r][2] === winner) {
                    highlightCell(r, 0);
                    highlightCell(r, 1);
                    highlightCell(r, 2);
                    return;
                }
            }
            // Check columns
            for (let c = 0; c < 3; c++) {
                if (boardState[0][c] === winner && boardState[1][c] === winner && boardState[2][c] === winner) {
                    highlightCell(0, c);
                    highlightCell(1, c);
                    highlightCell(2, c);
                    return;
                }
            }
            // Check diagonal
            if (boardState[0][0] === winner && boardState[1][1] === winner && boardState[2][2] === winner) {
                highlightCell(0, 0);
                highlightCell(1, 1);
                highlightCell(2, 2);
                return;
            }
            // Check anti-diagonal
            if (boardState[0][2] === winner && boardState[1][1] === winner && boardState[2][0] === winner) {
                highlightCell(0, 2);
                highlightCell(1, 1);
                highlightCell(2, 0);
                return;
            }
        }

        function highlightCell(row, col) {
            const cell = board.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            if (cell) cell.classList.add('win-cell');
        }

        function showMessage(msg, type) {
            message.textContent = msg;
            message.className = `message ${type}`;
            setTimeout(() => {
                message.textContent = '';
                message.className = 'message';
            }, 3000);
        }

        // Event listeners
        board.addEventListener('click', (e) => {
            const cell = e.target.closest('.cell');
            if (!cell || cell.classList.contains('disabled')) return;
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            makeMove(row, col);
        });

        resetBtn.addEventListener('click', resetGame);
        aiMoveBtn.addEventListener('click', doAIMove);

        // Load initial state
        loadState();
    </script>
  <script src="/assets/js/cute.js?v=5&amp;nb=1"></script>
</body>
</html>
