<script>
"use strict";
(function () {

// ---------------------------------------------------------------------------
// Setup
// ---------------------------------------------------------------------------
const W = 800, H = 500;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive scaling while keeping aspect ratio
function resize() {
  const wrap = document.getElementById('wrap');
  const aspect = W / H;
  let vw = window.innerWidth, vh = window.innerHeight;
  let cw = vw, ch = vw / aspect;
  if (ch > vh) { ch = vh; cw = vh * aspect; }
  wrap.style.width = cw + 'px';
  wrap.style.height = ch + 'px';
}
window.addEventListener('resize', resize);
resize();

// ---------------------------------------------------------------------------
// Audio (Web Audio API)
// ---------------------------------------------------------------------------
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type, vol) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.value = vol || 0.15;
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    g.gain.setValueAtTime(g.gain.value, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t);
    o.stop(t + dur);
  } catch (e) {}
}
function sndCoin() { beep(880, 0.08, 'square', 0.10); beep(1320, 0.10, 'square', 0.08); }
function sndTag()  { beep(140, 0.12, 'sawtooth', 0.22); beep(90, 0.16, 'square', 0.18); }
function sndBounce(){ beep(300, 0.10, 'sine', 0.15); beep(600, 0.12, 'sine', 0.12); }
function sndTeleport(){ beep(700, 0.10, 'triangle', 0.14); beep(1100, 0.10, 'triangle', 0.10); }
function sndJoin() { beep(523, 0.08, 'square', 0.12); beep(784, 0.10, 'square', 0.10); }
function sndStart(){ beep(523,0.1,'square',0.12); beep(659,0.1,'square',0.12); beep(784,0.14,'square',0.12); }

// ---------------------------------------------------------------------------
// Player definitions: colors + key controls
// ---------------------------------------------------------------------------
const PLAYER_DEFS = [
  { name: 'P1', color: '#e74c3c', dark: '#a93226', keys: { left: 'a',          right: 'd',          jump: 'w'          } },
  { name: 'P2', color: '#3498db', dark: '#21618c', keys: { left: 'arrowleft',  right: 'arrowright', jump: 'arrowup'    } },
  { name: 'P3', color: '#2ecc71', dark: '#1e8449', keys: { left: 'j',          right: 'l',          jump: 'i'          } },
  { name: 'P4', color: '#f1c40f', dark: '#b7950b', keys: { left: 'f',          right: 'h',          jump: 't'          } },
];

// ---------------------------------------------------------------------------
// Keyboard state
// ---------------------------------------------------------------------------
const keys = {};
const justPressed = {};
window.addEventListener('keydown', function (e) {
  const k = e.key.toLowerCase();
  if (!keys[k]) justPressed[k] = true;
  keys[k] = true;
  // Prevent scrolling with arrows / space
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  ensureAudio();
});
window.addEventListener('keydown', function () { ensureAudio(); }, { once: true });
window.addEventListener('keyup', function (e) {
  const k = e.key.toLowerCase();
  keys[k] = false;
});

// ---------------------------------------------------------------------------
// Map definitions
// ---------------------------------------------------------------------------
// Each map: platforms (x,y,w,h), spawns, bouncePads, teleporters (pair), coins
function makeMaps() {
  // Common ground
  function base(extra) {
    return Object.assign({
      platforms: [
        { x: 0,   y: 470, w: 800, h: 30 },              // ground
      ],
      spawns: [ {x:80,y:430}, {x:680,y:430}, {x:380,y:200}, {x:200,y:300} ],
      bouncePads: [],
      teleporters: [],
      coins: [],
    }, extra);
  }

  // ---- Map 1: Grassy ----
  const grassy = base({
    theme: 'grass',
    platforms: [
      { x: 0,   y: 470, w: 800, h: 30 },
      { x: 60,  y: 370, w: 160, h: 22 },
      { x: 580, y: 370, w: 160, h: 22 },
      { x: 300, y: 300, w: 200, h: 22 },
      { x: 120, y: 230, w: 140, h: 22 },
      { x: 540, y: 230, w: 140, h: 22 },
      { x: 330, y: 150, w: 140, h: 22 },
    ],
    spawns: [ {x:80,y:330}, {x:660,y:330}, {x:360,y:110}, {x:360,y:260} ],
    bouncePads: [ {x:140,y:358,w:48}, {x:600,y:358,w:48}, {x:376,y:138,w:48} ],
    teleporters: [ {x:30,y:438}, {x:740,y:438} ],
    coins: [
      {x:120,y:340},{x:180,y:340},{x:620,y:340},{x:680,y:340},
      {x:360,y:270},{x:440,y:270},{x:160,y:200},{x:600,y:200},
      {x:400,y:120},{x:340,y:120},{x:400,y:440},{x:200,y:440},
    ],
  });

  // ---- Map 2: Winter ----
  const winter = base({
    theme: 'winter',
    platforms: [
      { x: 0,   y: 470, w: 800, h: 30 },
      { x: 60,  y: 370, w: 160, h: 22 },
      { x: 580, y: 370, w: 160, h: 22 },
      { x: 300, y: 300, w: 200, h: 22 },
      { x: 120, y: 230, w: 140, h: 22 },
      { x: 540, y: 230, w: 140, h: 22 },
      { x: 330, y: 150, w: 140, h: 22 },
    ],
    spawns: [ {x:80,y:330}, {x:660,y:330}, {x:360,y:110}, {x:360,y:260} ],
    bouncePads: [ {x:140,y:358,w:48}, {x:600,y:358,w:48}, {x:376,y:138,w:48} ],
    teleporters: [ {x:30,y:438}, {x:740,y:438} ],
    coins: [
      {x:120,y:340},{x:180,y:340},{x:620,y:340},{x:680,y:340},
      {x:360,y:270},{x:440,y:270},{x:160,y:200},{x:600,y:200},
      {x:400,y:120},{x:340,y:120},{x:400,y:440},{x:200,y:440},
    ],
  });

  // ---- Map 3: Egypt (pyramid stepped center) ----
  const egypt = base({
    theme: 'egypt',
    platforms: [
      { x: 0,   y: 470, w: 800, h: 30 },
      { x: 60,  y: 360, w: 150, h: 22 },
      { x: 590, y: 360, w: 150, h: 22 },
      { x: 300, y: 400, w: 200, h: 22 },   // pyramid base
      { x: 330, y: 330, w: 140, h: 22 },   // pyramid mid
      { x: 360, y: 260, w: 80,  h: 22 },   // pyramid top
      { x: 120, y: 250, w: 120, h: 22 },
      { x: 560, y: 250, w: 120, h: 22 },
    ],
    spawns: [ {x:80,y:320}, {x:660,y:320}, {x:380,y:220}, {x:380,y:360} ],
    bouncePads: [ {x:130,y:348,w:48}, {x:610,y:348,w:48}, {x:376,y:248,w:48} ],
    teleporters: [ {x:30,y:438}, {x:740,y:438} ],
    coins: [
      {x:110,y:330},{x:170,y:330},{x:620,y:330},{x:680,y:330},
      {x:380,y:370},{x:420,y:370},{x:380,y:300},{x:400,y:230},
      {x:160,y:220},{x:600,y:220},{x:300,y:440},{x:500,y:440},
    ],
  });

  return [grassy, winter, egypt];
}
const MAPS = makeMaps();
const MAP_NAMES = ['Grassy', 'Winter', 'Egypt'];

// ---------------------------------------------------------------------------
// Game state
// ---------------------------------------------------------------------------
const STATE = { LOBBY: 'LOBBY', PLAYING: 'PLAYING', ROUND_END: 'ROUND_END' };
let gameState = STATE.LOBBY;

const lobby = {
  joined: [false, false, false, false],
  mapIndex: 0,
  timerOptions: [60, 120, 180],
  timerIndex: 0,
};

let players = [];        // active player objects
let activeMap = null;
let coins = [];          // {x,y,collected,respawn}
let bouncePads = [];     // {x,y,w,squish}
let teleporters = [];    // {x,y,pulse}
let itIndex = 0;         // index into players[] who is IT
let timeLeft = 60;
let lastTagTime = 0;
let particles = [];
let snowflakes = [];
let shake = 0;
let roundResult = null;  // {loserName, scores:[{name,color,coins}]}
let teleCooldown = 0;

// ---------------------------------------------------------------------------
// Physics constants
// ---------------------------------------------------------------------------
const GRAVITY = 0.65;
const MOVE_ACCEL = 0.9;
const MAX_SPEED = 4.2;
const FRICTION = 0.78;
const JUMP_FORCE = -12.5;
const IT_SPEED_MULT = 1.10;
const BOUNCE_MULT = 2.5;
const INVINCIBLE_TIME = 1.5; // seconds
const PLAYER_W = 30, PLAYER_H = 40;

// ---------------------------------------------------------------------------
// Build snowflakes for winter
// ---------------------------------------------------------------------------
function buildSnow() {
  snowflakes = [];
  for (let i = 0; i < 80; i++) {
    snowflakes.push({
      x: pseudoRand(i * 13.1) * W,
      y: pseudoRand(i * 7.7) * H,
      r: 1 + pseudoRand(i * 3.3) * 2.5,
      sp: 0.4 + pseudoRand(i * 5.5) * 1.2,
      drift: (pseudoRand(i * 2.2) - 0.5) * 0.6,
    });
  }
}
function pseudoRand(n) { const x = Math.sin(n) * 10000; return x - Math.floor(x); }

// ---------------------------------------------------------------------------
// Start a round
// ---------------------------------------------------------------------------
function startGame() {
  activeMap = MAPS[lobby.mapIndex];
  timeLeft = lobby.timerOptions[lobby.timerIndex];

  // Build players from joined slots
  players = [];
  const spawns = activeMap.spawns;
  let si = 0;
  for (let i = 0; i < 4; i++) {
    if (!lobby.joined[i]) continue;
    const def = PLAYER_DEFS[i];
    const sp = spawns[si % spawns.length];
    players.push({
      defIndex: i,
      name: def.name,
      color: def.color,
      dark: def.dark,
      keys: def.keys,
      x: sp.x, y: sp.y,
      vx: 0, vy: 0,
      w: PLAYER_W, h: PLAYER_H,
      onGround: false,
      facing: 1,
      coins: 0,
      invincible: 0,
      squish: 0,
      spawnIndex: si % spawns.length,
      blinkTimer: pseudoRand(i + 1) * 3,
    });
    si++;
  }

  // Random IT
  itIndex = Math.floor(pseudoRand(timeLeft + players.length) * players.length) % players.length;

  // Setup coins
  coins = activeMap.coins.map(c => ({ x: c.x, y: c.y, collected: false, respawn: 0 }));
  // Bounce pads
  bouncePads = activeMap.bouncePads.map(b => ({ x: b.x, y: b.y, w: b.w, squish: 0 }));
  // Teleporters
  teleporters = activeMap.teleporters.map(t => ({ x: t.x, y: t.y, pulse: 0 }));

  particles = [];
  shake = 0;
  teleCooldown = 0;
  if (activeMap.theme === 'winter') buildSnow();

  gameState = STATE.PLAYING;
  sndStart();
}

// ---------------------------------------------------------------------------
// AABB collision
// ---------------------------------------------------------------------------
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ---------------------------------------------------------------------------
// Update — physics & logic
// ---------------------------------------------------------------------------
let roundEndTimer = 0;

function update(dt) {
  if (gameState === STATE.LOBBY) {
    updateLobby();
    return;
  }
  if (gameState === STATE.ROUND_END) {
    updateRoundEnd();
    return;
  }

  // PLAYING
  // Timer
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    endRound();
    return;
  }

  if (teleCooldown > 0) teleCooldown -= dt;

  const plats = activeMap.platforms;

  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    const isIt = (i === itIndex);
    const speedMult = isIt ? IT_SPEED_MULT : 1;

    // Input
    let left = keys[p.keys.left];
    let right = keys[p.keys.right];
    let jump = justPressed[p.keys.jump];

    if (left)  { p.vx -= MOVE_ACCEL; p.facing = -1; }
    if (right) { p.vx += MOVE_ACCEL; p.facing = 1; }
    if (!left && !right) p.vx *= FRICTION;

    const maxS = MAX_SPEED * speedMult;
    if (p.vx > maxS) p.vx = maxS;
    if (p.vx < -maxS) p.vx = -maxS;
    if (Math.abs(p.vx) < 0.05) p.vx = 0;

    // Jump (no double jump)
    if (jump && p.onGround) {
      p.vy = JUMP_FORCE;
      p.onGround = false;
    }

    // Gravity
    p.vy += GRAVITY;
    if (p.vy > 18) p.vy = 18;

    // --- Horizontal move + collide ---
    p.x += p.vx;
    for (const pl of plats) {
      if (aabb(p, pl)) {
        if (p.vx > 0) p.x = pl.x - p.w;
        else if (p.vx < 0) p.x = pl.x + pl.w;
        p.vx = 0;
      }
    }
    // World bounds horizontal
    if (p.x < 0) { p.x = 0; p.vx = 0; }
    if (p.x + p.w > W) { p.x = W - p.w; p.vx = 0; }

    // --- Vertical move + collide ---
    const wasAir = !p.onGround;
    p.onGround = false;
    p.y += p.vy;
    for (const pl of plats) {
      if (aabb(p, pl)) {
        if (p.vy > 0) {
          p.y = pl.y - p.h;
          if (wasAir && p.vy > 6) { p.squish = 1; } // landing squish
          p.vy = 0;
          p.onGround = true;
        } else if (p.vy < 0) {
          p.y = pl.y + pl.h;
          p.vy = 0;
        }
      }
    }

    // Fall off bottom -> respawn
    if (p.y > H + 60) {
      const sp = activeMap.spawns[p.spawnIndex];
      p.x = sp.x; p.y = sp.y; p.vx = 0; p.vy = 0;
    }

    // Bounce pads
    for (const b of bouncePads) {
      const padBox = { x: b.x, y: b.y, w: b.w, h: 12 };
      if (p.vy >= 0 && aabb(p, padBox) && p.y + p.h <= b.y + 16) {
        p.vy = JUMP_FORCE * BOUNCE_MULT * 0.55; // scaled launch
        p.onGround = false;
        b.squish = 1;
        sndBounce();
      }
      if (b.squish > 0) b.squish -= dt * 4;
    }

    // Teleporters
    if (teleCooldown <= 0 && teleporters.length >= 2) {
      for (let t = 0; t < teleporters.length; t++) {
        const tp = teleporters[t];
        const tbox = { x: tp.x - 4, y: tp.y - 4, w: 32, h: 40 };
        if (aabb(p, tbox)) {
          const other = teleporters[(t + 1) % teleporters.length];
          p.x = other.x; p.y = other.y - 4;
          p.vy = Math.min(p.vy, 0);
          teleCooldown = 0.8;
          spawnParticles(tp.x + 12, tp.y + 16, '#9b59b6', 14);
          spawnParticles(other.x + 12, other.y + 16, '#1abc9c', 14);
          sndTeleport();
          break;
        }
      }
    }

    // Coins
    const pbox = { x: p.x, y: p.y, w: p.w, h: p.h };
    for (const c of coins) {
      if (c.collected) continue;
      const cbox = { x: c.x - 8, y: c.y - 8, w: 16, h: 16 };
      if (aabb(pbox, cbox)) {
        c.collected = true;
        c.respawn = 5;
        p.coins++;
        sndCoin();
        spawnParticles(c.x, c.y, '#f1c40f', 8);
      }
    }

    // Timers
    if (p.invincible > 0) p.invincible -= dt;
    if (p.squish > 0) p.squish -= dt * 4;
    p.blinkTimer -= dt;
    if (p.blinkTimer < 0) p.blinkTimer = 2.5 + pseudoRand(p.x) * 2;
  }

  // Coin respawn
  for (const c of coins) {
    if (c.collected) {
      c.respawn -= dt;
      if (c.respawn <= 0) c.collected = false;
    }
  }

  // Tagging — IT touches another player.
  // A freshly-tagged IT is invincible and cannot tag back during the grace
  // window, which prevents the instant re-tag ping-pong.
  const it = players[itIndex];
  if (it && it.invincible <= 0) {
    for (let i = 0; i < players.length; i++) {
      if (i === itIndex) continue;
      const other = players[i];
      if (other.invincible > 0) continue;
      if (aabb(it, other)) {
        // Tag!
        itIndex = i;
        other.invincible = INVINCIBLE_TIME;
        lastTagTime = 0;
        shake = 10;
        spawnParticles(other.x + other.w/2, other.y + other.h/2, other.color, 20);
        spawnParticles(it.x + it.w/2, it.y + it.h/2, '#ff3b30', 16);
        sndTag();
        break;
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy;
    pt.vy += 0.25;
    pt.life -= dt;
    if (pt.life <= 0) particles.splice(i, 1);
  }

  // Pulse teleporters
  for (const tp of teleporters) tp.pulse += dt * 4;

  // Snow
  if (activeMap.theme === 'winter') {
    for (const f of snowflakes) {
      f.y += f.sp;
      f.x += f.drift;
      if (f.y > H) { f.y = -5; }
      if (f.x > W) f.x = 0;
      if (f.x < 0) f.x = W;
    }
  }

  if (shake > 0) shake -= dt * 30;
  if (shake < 0) shake = 0;

  // Clear justPressed at end of frame
  for (const k in justPressed) justPressed[k] = false;
}

function endRound() {
  const loser = players[itIndex];
  const scores = players.map(p => ({ name: p.name, color: p.color, coins: p.coins }));
  roundResult = { loserName: loser ? loser.name : '?', loserColor: loser ? loser.color : '#fff', scores };
  gameState = STATE.ROUND_END;
  roundEndTimer = 0;
  sndTag();
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const ang = pseudoRand(x + i * 1.7) * Math.PI * 2;
    const sp = 1 + pseudoRand(y + i * 2.3) * 4;
    particles.push({
      x, y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp - 1,
      life: 0.5 + pseudoRand(i + x) * 0.5,
      color,
      size: 2 + pseudoRand(i * 3) * 3,
    });
  }
}

// ---------------------------------------------------------------------------
// Lobby logic
// ---------------------------------------------------------------------------
function updateLobby() {
  // Join via jump key
  for (let i = 0; i < 4; i++) {
    if (!lobby.joined[i] && justPressed[PLAYER_DEFS[i].keys.jump]) {
      lobby.joined[i] = true;
      sndJoin();
    }
  }
  // Map selector: keys 1,2,3
  if (justPressed['1']) lobby.mapIndex = 0;
  if (justPressed['2']) lobby.mapIndex = 1;
  if (justPressed['3']) lobby.mapIndex = 2;
  // Timer toggle: key 'c'
  if (justPressed['c']) lobby.timerIndex = (lobby.timerIndex + 1) % lobby.timerOptions.length;
  // Start: Enter / space
  const count = lobby.joined.filter(Boolean).length;
  if ((justPressed['enter'] || justPressed[' ']) && count >= 2) {
    startGame();
  }
  for (const k in justPressed) justPressed[k] = false;
}

function updateRoundEnd() {
  roundEndTimer += 1/60;
  // Play again: Enter / space
  if (justPressed['enter'] || justPressed[' ']) {
    startGame();
  }
  // Back to lobby: Escape or B
  if (justPressed['escape'] || justPressed['b']) {
    gameState = STATE.LOBBY;
  }
  for (const k in justPressed) justPressed[k] = false;
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
let animTime = 0;

function draw() {
  ctx.save();
  // Screen shake
  if (shake > 0) {
    const sx = (pseudoRand(animTime) - 0.5) * shake;
    const sy = (pseudoRand(animTime + 1) - 0.5) * shake;
    ctx.translate(sx, sy);
  }

  if (gameState === STATE.LOBBY) drawLobby();
  else { drawGame(); if (gameState === STATE.ROUND_END) drawRoundEnd(); }

  ctx.restore();
}

// ---- Background per theme ----
function drawBackground(theme) {
  if (theme === 'grass') {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#87ceeb'); g.addColorStop(1, '#bfe9ff');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // clouds
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    drawCloud(120, 80, 1); drawCloud(520, 60, 1.3); drawCloud(680, 130, 0.9);
    // hills
    ctx.fillStyle = '#7ec850';
    ctx.beginPath(); ctx.arc(150, 500, 160, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(600, 500, 200, Math.PI, 0); ctx.fill();
  } else if (theme === 'winter') {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0b1a3a'); g.addColorStop(1, '#1c3a6e');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // moon
    ctx.fillStyle = '#f5f3e7';
    ctx.beginPath(); ctx.arc(680, 90, 36, 0, Math.PI*2); ctx.fill();
    // stars
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 40; i++) {
      const x = pseudoRand(i*9.1)*W, y = pseudoRand(i*4.3)*260;
      ctx.fillRect(x, y, 2, 2);
    }
    // snowflakes
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    for (const f of snowflakes) {
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.fill();
    }
  } else if (theme === 'egypt') {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#f6c177'); g.addColorStop(1, '#e8a25b');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // sun
    ctx.fillStyle = '#fff3c4';
    ctx.beginPath(); ctx.arc(400, 110, 50, 0, Math.PI*2); ctx.fill();
    // distant pyramids
    ctx.fillStyle = '#d98c3f';
    drawPyramid(140, 470, 180);
    drawPyramid(640, 470, 200);
    ctx.fillStyle = '#c97b30';
    drawPyramid(380, 470, 150);
  }
}
function drawCloud(x, y, s) {
  ctx.beginPath();
  ctx.arc(x, y, 22*s, 0, Math.PI*2);
  ctx.arc(x+26*s, y+6, 28*s, 0, Math.PI*2);
  ctx.arc(x+56*s, y, 22*s, 0, Math.PI*2);
  ctx.fill();
}
function drawPyramid(cx, baseY, size) {
  ctx.beginPath();
  ctx.moveTo(cx, baseY - size);
  ctx.lineTo(cx - size*0.8, baseY);
  ctx.lineTo(cx + size*0.8, baseY);
  ctx.closePath();
  ctx.fill();
}

// ---- Platforms per theme ----
function drawPlatform(pl, theme) {
  if (theme === 'grass') {
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    ctx.fillStyle = '#5fbb3f';
    ctx.fillRect(pl.x, pl.y, pl.w, 8);
    ctx.fillStyle = '#7ed957';
    for (let gx = pl.x + 3; gx < pl.x + pl.w; gx += 8) {
      ctx.fillRect(gx, pl.y - 3, 2, 4);
    }
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    for (let dx = pl.x + 6; dx < pl.x + pl.w; dx += 14) {
      ctx.fillRect(dx, pl.y + 12, 3, 3);
    }
  } else if (theme === 'winter') {
    ctx.fillStyle = '#6b8cae';
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    ctx.fillStyle = '#dff0ff';
    ctx.fillRect(pl.x, pl.y, pl.w, 9);
    // snow bumps
    ctx.fillStyle = '#ffffff';
    for (let gx = pl.x; gx < pl.x + pl.w; gx += 12) {
      ctx.beginPath(); ctx.arc(gx+6, pl.y, 5, Math.PI, 0); ctx.fill();
    }
  } else if (theme === 'egypt') {
    ctx.fillStyle = '#c79a52';
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    ctx.fillStyle = '#e3c07b';
    ctx.fillRect(pl.x, pl.y, pl.w, 8);
    // hieroglyphs
    ctx.fillStyle = 'rgba(90,60,20,0.5)';
    for (let gx = pl.x + 8; gx < pl.x + pl.w - 6; gx += 20) {
      ctx.fillRect(gx, pl.y + 11, 3, 7);
      ctx.fillRect(gx + 6, pl.y + 13, 5, 3);
    }
  }
}

function drawGame() {
  const theme = activeMap.theme;
  drawBackground(theme);

  // Platforms
  for (const pl of activeMap.platforms) drawPlatform(pl, theme);

  // Bounce pads
  for (const b of bouncePads) {
    const sq = Math.max(0, b.squish);
    const ph = 12 - sq * 6;
    const py = b.y + (12 - ph);
    ctx.fillStyle = '#e67e22';
    ctx.fillRect(b.x, py, b.w, ph);
    ctx.fillStyle = '#f1c40f';
    ctx.fillRect(b.x + 3, py + 2, b.w - 6, 4);
    // springs hint
    ctx.strokeStyle = '#b9770e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x + 6, py + ph);
    ctx.lineTo(b.x + b.w - 6, py + ph);
    ctx.stroke();
  }

  // Teleporters
  for (const tp of teleporters) {
    const r = 13 + Math.sin(tp.pulse) * 3;
    const grd = ctx.createRadialGradient(tp.x+12, tp.y+16, 2, tp.x+12, tp.y+16, r+6);
    grd.addColorStop(0, 'rgba(155,89,182,0.95)');
    grd.addColorStop(0.6, 'rgba(26,188,156,0.6)');
    grd.addColorStop(1, 'rgba(26,188,156,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(tp.x+12, tp.y+16, r+6, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#dcb6ff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(tp.x+12, tp.y+16, r, 0, Math.PI*2); ctx.stroke();
  }

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    const bob = Math.sin(animTime*4 + c.x) * 2;
    ctx.save();
    ctx.translate(c.x, c.y + bob);
    const sw = Math.abs(Math.cos(animTime*4 + c.x));
    ctx.scale(sw * 0.7 + 0.3, 1);
    ctx.fillStyle = '#f1c40f';
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffe680';
    ctx.beginPath(); ctx.arc(0, 0, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#c79a16'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Particles
  for (const pt of particles) {
    ctx.globalAlpha = Math.max(0, pt.life);
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x - pt.size/2, pt.y - pt.size/2, pt.size, pt.size);
  }
  ctx.globalAlpha = 1;

  // Players
  for (let i = 0; i < players.length; i++) {
    drawPlayer(players[i], i === itIndex);
  }

  // HUD
  drawHUD();
}

function drawPlayer(p, isIt) {
  const squish = Math.max(0, p.squish);
  const sw = p.w * (1 + squish * 0.25);
  const sh = p.h * (1 - squish * 0.30);
  const px = p.x - (sw - p.w) / 2;
  const py = p.y + (p.h - sh);

  // Invincibility flash
  let flash = false;
  if (p.invincible > 0) {
    flash = (Math.floor(animTime * 16) % 2 === 0);
  }

  ctx.save();

  // IT red aura/glow
  if (isIt) {
    const gr = ctx.createRadialGradient(px+sw/2, py+sh/2, 4, px+sw/2, py+sh/2, sw+14);
    gr.addColorStop(0, 'rgba(255,40,30,0.55)');
    gr.addColorStop(1, 'rgba(255,40,30,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(px+sw/2, py+sh/2, sw+14, 0, Math.PI*2); ctx.fill();
  }

  ctx.globalAlpha = flash ? 0.45 : 1;

  // Body (rounded rect)
  const bodyColor = isIt ? '#ff3b30' : p.color;
  roundRect(px, py, sw, sh, 8);
  ctx.fillStyle = bodyColor;
  ctx.fill();
  // outline
  ctx.lineWidth = 2;
  ctx.strokeStyle = isIt ? '#7a0f0a' : p.dark;
  ctx.stroke();

  // Eyes
  const eyeY = py + sh * 0.32;
  const eyeOff = p.facing >= 0 ? 1 : -1;
  const ex1 = px + sw*0.32, ex2 = px + sw*0.68;
  const blinking = p.blinkTimer < 0.12;
  ctx.fillStyle = '#fff';
  if (!blinking) {
    ctx.beginPath(); ctx.arc(ex1, eyeY, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2, eyeY, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(ex1 + eyeOff*2, eyeY, 2.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2 + eyeOff*2, eyeY, 2.4, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ex1-4, eyeY); ctx.lineTo(ex1+4, eyeY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex2-4, eyeY); ctx.lineTo(ex2+4, eyeY); ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  // Bouncing arrow above IT
  if (isIt) {
    const bob = Math.sin(animTime * 6) * 5;
    const ax = px + sw/2;
    const ay = py - 18 + bob;
    ctx.fillStyle = '#ff3b30';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ax, ay + 12);
    ctx.lineTo(ax - 9, ay);
    ctx.lineTo(ax - 4, ay);
    ctx.lineTo(ax - 4, ay - 8);
    ctx.lineTo(ax + 4, ay - 8);
    ctx.lineTo(ax + 4, ay);
    ctx.lineTo(ax + 9, ay);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawHUD() {
  // Timer (large centered top)
  const m = Math.floor(timeLeft / 60);
  const s = Math.floor(timeLeft % 60);
  const tstr = m + ':' + (s < 10 ? '0' : '') + s;
  ctx.font = 'bold 40px Trebuchet MS, sans-serif';
  ctx.textAlign = 'center';
  ctx.lineWidth = 5;
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.strokeText(tstr, W/2, 48);
  ctx.fillStyle = timeLeft <= 10 ? '#ff5b4a' : '#ffffff';
  ctx.fillText(tstr, W/2, 48);

  // "IT" flashing text under timer
  if (Math.floor(animTime * 3) % 2 === 0) {
    const it = players[itIndex];
    if (it) {
      ctx.font = 'bold 18px Trebuchet MS, sans-serif';
      ctx.fillStyle = '#ff3b30';
      ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 3;
      ctx.strokeText(it.name + ' is IT!', W/2, 72);
      ctx.fillText(it.name + ' is IT!', W/2, 72);
    }
  }

  // Player coin counts in corners
  ctx.font = 'bold 16px Trebuchet MS, sans-serif';
  ctx.lineWidth = 3;
  const corners = [
    { x: 14,  y: 28, align: 'left'  },
    { x: W-14,y: 28, align: 'right' },
    { x: 14,  y: H-16, align: 'left'  },
    { x: W-14,y: H-16, align: 'right' },
  ];
  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    const c = corners[i];
    ctx.textAlign = c.align;
    const label = p.name + (i === itIndex ? ' [IT]' : '') + '  🪙 ' + p.coins;
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.strokeText(label, c.x, c.y);
    ctx.fillStyle = p.color;
    ctx.fillText(label, c.x, c.y);
  }
  ctx.textAlign = 'left';
}

// ---------------------------------------------------------------------------
// Lobby rendering
// ---------------------------------------------------------------------------
function drawLobby() {
  // bg
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2c3e7a'); g.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Title
  ctx.textAlign = 'center';
  const titleColors = ['#e74c3c','#f1c40f','#2ecc71','#3498db'];
  const letters = 'TAG';
  ctx.font = 'bold 90px Trebuchet MS, sans-serif';
  const totalW = ctx.measureText(letters).width;
  let lx = W/2 - totalW/2;
  const bob = Math.sin(animTime*2)*4;
  for (let i = 0; i < letters.length; i++) {
    const ch = letters[i];
    const cw = ctx.measureText(ch).width;
    ctx.save();
    ctx.fillStyle = titleColors[i % titleColors.length];
    ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
    ctx.textAlign = 'left';
    const yy = 110 + Math.sin(animTime*3 + i)*6 + bob;
    ctx.strokeText(ch, lx, yy);
    ctx.fillText(ch, lx, yy);
    ctx.restore();
    lx += cw + 4;
  }
  ctx.textAlign = 'center';
  ctx.font = 'bold 16px Trebuchet MS, sans-serif';
  ctx.fillStyle = '#cdd6f4';
  ctx.fillText('Press your JUMP key to join  (2-4 players)', W/2, 140);

  // Player slots
  const slotW = 170, slotH = 110, gap = 16;
  const startX = W/2 - (slotW*4 + gap*3)/2;
  const slotY = 165;
  const ctrlText = [
    'A / D  •  W jump',
    '← / →  •  ↑ jump',
    'J / L  •  I jump',
    'F / H  •  T jump',
  ];
  for (let i = 0; i < 4; i++) {
    const sx = startX + i*(slotW+gap);
    const joined = lobby.joined[i];
    ctx.fillStyle = joined ? PLAYER_DEFS[i].color : 'rgba(255,255,255,0.08)';
    roundRect(sx, slotY, slotW, slotH, 12); ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = joined ? '#fff' : 'rgba(255,255,255,0.25)';
    roundRect(sx, slotY, slotW, slotH, 12); ctx.stroke();

    ctx.fillStyle = joined ? '#fff' : '#888';
    ctx.font = 'bold 22px Trebuchet MS, sans-serif';
    ctx.fillText('Player ' + (i+1), sx + slotW/2, slotY + 32);

    // mini character
    if (joined) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Trebuchet MS, sans-serif';
      ctx.fillText('✓ READY', sx + slotW/2, slotY + 60);
    } else {
      ctx.fillStyle = '#aab';
      ctx.font = '14px Trebuchet MS, sans-serif';
      ctx.fillText('press jump to join', sx + slotW/2, slotY + 58);
    }
    ctx.fillStyle = joined ? 'rgba(255,255,255,0.85)' : '#778';
    ctx.font = '13px Trebuchet MS, sans-serif';
    ctx.fillText(ctrlText[i], sx + slotW/2, slotY + 88);
  }

  // Map selector
  const my = 300;
  ctx.fillStyle = '#cdd6f4';
  ctx.font = 'bold 16px Trebuchet MS, sans-serif';
  ctx.fillText('MAP  (press 1 / 2 / 3)', W/2, my);
  const thumbW = 110, thumbH = 60, tgap = 18;
  const tStartX = W/2 - (thumbW*3 + tgap*2)/2;
  for (let i = 0; i < 3; i++) {
    const tx = tStartX + i*(thumbW+tgap);
    const ty = my + 12;
    drawMapThumb(tx, ty, thumbW, thumbH, i, i === lobby.mapIndex);
    ctx.fillStyle = i === lobby.mapIndex ? '#fff' : '#99a';
    ctx.font = 'bold 14px Trebuchet MS, sans-serif';
    ctx.fillText(MAP_NAMES[i], tx + thumbW/2, ty + thumbH + 18);
  }

  // Timer selector
  const ty2 = 420;
  ctx.fillStyle = '#cdd6f4';
  ctx.font = 'bold 16px Trebuchet MS, sans-serif';
  ctx.fillText('ROUND TIME (press C to change):  ' + lobby.timerOptions[lobby.timerIndex] + 's', W/2, ty2);

  // Start button
  const count = lobby.joined.filter(Boolean).length;
  const canStart = count >= 2;
  const bw = 240, bh = 44, bx = W/2 - bw/2, by = 440;
  ctx.fillStyle = canStart ? (Math.floor(animTime*2)%2===0 ? '#2ecc71' : '#27c065') : 'rgba(120,120,140,0.4)';
  roundRect(bx, by, bw, bh, 10); ctx.fill();
  ctx.fillStyle = canStart ? '#fff' : '#aab';
  ctx.font = 'bold 22px Trebuchet MS, sans-serif';
  ctx.fillText(canStart ? '▶ START GAME (Enter)' : 'Need 2+ players', W/2, by + 30);

  ctx.textAlign = 'left';
}

function drawMapThumb(x, y, w, h, idx, selected) {
  ctx.save();
  ctx.beginPath(); roundRect(x, y, w, h, 8); ctx.clip();
  if (idx === 0) {
    ctx.fillStyle = '#87ceeb'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#5fbb3f'; ctx.fillRect(x, y+h-14, w, 14);
    ctx.fillStyle = '#7ec850';
    ctx.fillRect(x+12, y+30, 30, 6); ctx.fillRect(x+w-42, y+30, 30, 6);
    ctx.fillRect(x+w/2-15, y+18, 30, 6);
  } else if (idx === 1) {
    ctx.fillStyle = '#0b1a3a'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#dff0ff'; ctx.fillRect(x, y+h-14, w, 14);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+12, y+30, 30, 5); ctx.fillRect(x+w-42, y+30, 30, 5);
    for (let i=0;i<8;i++){ ctx.fillRect(x+pseudoRand(i)*w, y+pseudoRand(i*2)*h, 2,2); }
  } else {
    ctx.fillStyle = '#f6c177'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#d98c3f';
    ctx.beginPath(); ctx.moveTo(x+w/2,y+12); ctx.lineTo(x+w/2-26,y+h-14); ctx.lineTo(x+w/2+26,y+h-14); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#c79a52'; ctx.fillRect(x, y+h-14, w, 14);
  }
  ctx.restore();
  ctx.lineWidth = selected ? 4 : 2;
  ctx.strokeStyle = selected ? '#f1c40f' : 'rgba(255,255,255,0.3)';
  roundRect(x, y, w, h, 8); ctx.stroke();
}

// ---------------------------------------------------------------------------
// Round end rendering
// ---------------------------------------------------------------------------
function drawRoundEnd() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  const scale = 1 + Math.sin(animTime*4)*0.04;
  ctx.save();
  ctx.translate(W/2, 130);
  ctx.scale(scale, scale);
  ctx.font = 'bold 52px Trebuchet MS, sans-serif';
  ctx.fillStyle = roundResult.loserColor;
  ctx.strokeStyle = '#000'; ctx.lineWidth = 6;
  ctx.strokeText(roundResult.loserName + ' LOSES!', 0, 0);
  ctx.fillText(roundResult.loserName + ' LOSES!', 0, 0);
  ctx.restore();

  ctx.font = 'bold 20px Trebuchet MS, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('They were IT when time ran out!', W/2, 180);

  // Coin scores
  ctx.font = 'bold 22px Trebuchet MS, sans-serif';
  ctx.fillStyle = '#f1c40f';
  ctx.fillText('— COIN SCORES —', W/2, 235);
  const sorted = roundResult.scores.slice().sort((a,b)=>b.coins-a.coins);
  ctx.font = 'bold 20px Trebuchet MS, sans-serif';
  let yy = 270;
  for (let i = 0; i < sorted.length; i++) {
    const s = sorted[i];
    ctx.fillStyle = s.color;
    ctx.fillText((i+1) + '. ' + s.name + '   🪙 ' + s.coins, W/2, yy);
    yy += 30;
  }

  // Buttons
  const bw = 220, bh = 42;
  const by = 410;
  // Play again
  ctx.fillStyle = (Math.floor(animTime*2)%2===0) ? '#2ecc71' : '#27c065';
  roundRect(W/2 - bw - 12, by, bw, bh, 10); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Trebuchet MS, sans-serif';
  ctx.fillText('▶ PLAY AGAIN (Enter)', W/2 - bw/2 - 12, by + 28);
  // Back to lobby
  ctx.fillStyle = '#3498db';
  roundRect(W/2 + 12, by, bw, bh, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText('← LOBBY (Esc)', W/2 + bw/2 + 12, by + 28);

  ctx.textAlign = 'left';
}

// ---------------------------------------------------------------------------
// Game loop — fixed timestep
// ---------------------------------------------------------------------------
let lastTime = performance.now();
let acc = 0;
const STEP = 1/60;

function loop(now) {
  let frameTime = (now - lastTime) / 1000;
  lastTime = now;
  if (frameTime > 0.25) frameTime = 0.25; // clamp
  acc += frameTime;
  animTime += frameTime;

  while (acc >= STEP) {
    update(STEP);
    acc -= STEP;
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Expose minimal hooks for automated testing
window.__TAG__ = {
  getState: () => gameState,
  getPlayers: () => players.map(p => ({ name: p.name, x: p.x, y: p.y, coins: p.coins, invincible: p.invincible })),
  getIt: () => (players[itIndex] ? players[itIndex].name : null),
  getTime: () => timeLeft,
  setTime: (t) => { timeLeft = t; },
  join: (i) => { lobby.joined[i] = true; },
  setMap: (i) => { lobby.mapIndex = i; },
  start: () => startGame(),
  press: (k) => { keys[k.toLowerCase()] = true; justPressed[k.toLowerCase()] = true; },
  release: (k) => { keys[k.toLowerCase()] = false; },
  forceTag: () => {
    // move IT onto another player to test tagging
    if (players.length >= 2) {
      const other = (itIndex + 1) % players.length;
      players[itIndex].x = players[other].x;
      players[itIndex].y = players[other].y;
      players[other].invincible = 0;
    }
  },
};

})();
