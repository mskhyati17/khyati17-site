<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign up</title>
  <!-- SEO: meta description for search-result snippets. (khyati:seo-meta) -->
  <meta name="description" content="Khyati17 account area. Sign in to manage your profile and content." />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    #signup-form{max-width:400px;margin:22px auto;text-align:left;background:#fff;border:1px solid #efe4fb;border-radius:18px;padding:24px 22px;box-shadow:0 14px 36px rgba(117,80,168,.14)}
    #signup-form label{display:block;font-weight:700;color:#6a1b9a;font-size:.82rem;margin:12px 0 5px}
    #signup-form label:first-of-type{margin-top:0}
    #signup-form input{width:100%;padding:11px 13px;border:2px solid #e3d3f6;border-radius:11px;font:inherit;font-size:.98rem;color:#2b0b3a;outline:none;transition:border-color .15s}
    #signup-form input:focus{border-color:#9c4dcc}
    #signup-form input+br{display:none}
    #signup-form button[type=submit]{width:100%;margin-top:18px;background:linear-gradient(90deg,#6a1b9a,#c56be0);color:#fff;border:none;border-radius:999px;padding:12px;font-weight:800;font-size:1rem;cursor:pointer}
    #signup-form button[type=submit]:hover{transform:translateY(-1px)}
    #signup-form .video-note{margin-top:14px;text-align:center;color:#6a4b8f;font-size:.88rem}
    #signup-form .video-note a{color:#6a1b9a;font-weight:700}
    .hero>h2{text-align:center}
    [data-theme="dark"] #signup-form{background:#241633;border-color:#3a2550}
    [data-theme="dark"] #signup-form input{background:#1a1027;border-color:#3a2550;color:#f0e8ff}
    [data-theme="dark"] #signup-form label{color:#d9b8ff}
    [data-theme="dark"] #signup-form .video-note{color:#c3b0dd}
  </style>
  <!-- canonical + site icon (khyati:head) -->
  <link rel="canonical" href="https://khyati17.com/admin/signup.html" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#6a1b9a" />
</head>
<body>
  <div id="site-header-root"></div>

  <main class="hero">
    <h2>Create an account</h2>
    <form id="signup-form" style="max-width:420px;margin:16px auto;text-align:left;">
  <label>First name<br/><input id="first_name" required/></label><br/>
  <label>Last name<br/><input id="last_name" required/></label><br/>
  <label>Username<br/><input id="username" required/></label><br/>
      <label>Email<br/><input id="email" type="email" autocapitalize="none" autocorrect="off" autocomplete="username" required/></label><br/>
      <label>Password<br/><input id="password" type="password" required/></label><br/>
      <label>Confirm password<br/><input id="confirm" type="password" required/></label><br/>
      <button type="submit" class="btn">Sign up</button>
      <p class="video-note">Already have an account? <a href="login.html">Sign in</a></p>
      <p id="msg" style="color:#7a2a9b"></p>
    </form>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Khyati17 — All rights reserved</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script type="module" src="../assets/js/auth.js?v=2"></script>
  <script type="module">import('../assets/js/loadHeader.js').then(m=>m.loadSharedHeader());</script>
  <script>
    const form = document.getElementById('signup-form');
    form.addEventListener('submit', async e =>{
      e.preventDefault();
  const first_name = document.getElementById('first_name').value.trim();
  const last_name = document.getElementById('last_name').value.trim();
  const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirm').value;
      const msg = document.getElementById('msg');
      if(p !== c){ msg.textContent = 'Passwords do not match'; return; }
  const res = await Auth.signup(email,p,{first_name,last_name,username});
      if(res.ok){
        if(res.alreadyExisted){
          msg.textContent = 'Welcome back — signing you in...'; setTimeout(()=>location.href='/',600);
          return;
        }
        // Refresh auth UI; this will set the signed-in state if available
        await Auth.renderAuthArea();
        // If the user is actually signed in now, create the profile; otherwise store pending
        const current = await Auth.currentUser();
        if(current && current.id){
          const profile = { id: current.id, first_name, last_name, username, email, metadata: { first_name, last_name, username } };
          const created = await Auth.createProfile(profile);
          console.debug('createProfile result', created);
          if(!created.ok){ msg.textContent = 'Profile creation failed: ' + (created.msg || JSON.stringify(created.raw)); return; }
        } else {
          // Not signed-in yet; save pending profile for post-confirmation insertion
          try{ localStorage.setItem('pending_profile', JSON.stringify({ first_name,last_name,username,email })); }catch(e){}
        }

        if(res.confirmed === false){
          msg.textContent = 'Account created — please check your email and confirm before signing in. Your profile will be saved after confirmation.';
        } else {
          msg.textContent = 'Account created — redirecting...'; setTimeout(()=>location.href='/',900);
        }
      } else msg.textContent = res.msg || 'Signup failed';
    });
  </script>
  <script src="/assets/js/cute.js?v=5"></script>
</body>
</html>
