<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🧩 Mochi Slide</title>
<!-- SEO + social share preview: meta description, Open Graph & Twitter Card tags. (khyati:seo-meta) -->
<meta name="description" content="Slide the tiles into order in this classic 3×3 puzzle — solve it in the fewest moves! Free on Khyati17." />
<meta property="og:title" content="🧩 Mochi Slide — Khyati17" />
<meta property="og:description" content="A classic sliding-tile puzzle — put the numbers back in order!" />
<meta property="og:image" content="https://khyati17.com/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#2b0b3a,#6a1b9a,#9c4dcc);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
  .container{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:24px;padding:26px;box-shadow:0 30px 80px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);text-align:center;max-width:400px;width:100%}
  h1{font-size:1.7rem;color:#fff;margin-bottom:4px;text-shadow:0 0 30px rgba(233,216,255,.4)}
  .subtitle{color:rgba(255,255,255,.7);font-size:.84rem;margin-bottom:14px}
  .score-board{display:flex;justify-content:space-between;background:rgba(0,0,0,.3);border-radius:12px;padding:9px 18px;margin-bottom:16px;color:#fff}
  .score-board b{color:#e9d8ff}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:300px;margin:0 auto}
  .tile{aspect-ratio:1;border-radius:14px;border:none;cursor:pointer;font-size:1.9rem;font-weight:800;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#e9d8ff,#c9a8f0);color:#3a1a5a;transition:transform .08s,background .15s;box-shadow:0 4px 10px rgba(0,0,0,.25)}
  .tile:active{transform:scale(.95)}
  .tile.blank{background:transparent;box-shadow:none;cursor:default}
  .tile.correct{background:linear-gradient(180deg,#b6f0c4,#7fd89a)}
  .msg{color:#fff;margin-top:14px;font-weight:700;min-height:1.2em}
  .controls{margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .controls a,.controls button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:9px 20px;border-radius:10px;cursor:pointer;font-size:.95rem;text-decoration:none;display:inline-block}
  .controls a:hover,.controls button:hover{background:#e9d8ff;color:#2b0b3a}
</style>
</head>
<body>
<div class="container">
  <h1>🧩 Mochi Slide</h1>
  <p class="subtitle">Slide the tiles to put 1–8 back in order!</p>
  <div class="score-board"><div>Moves: <b id="moves">0</b></div><div id="status">Keep sliding…</div><div>Best: <b id="best">—</b></div></div>
  <div class="grid" id="grid"></div>
  <div class="msg" id="msg"></div>
  <div class="controls">
    <button id="shuffle">Shuffle 🔀</button>
    <a href="/fun-games/index.html">← All Games</a>
  </div>
</div>
<script>
(function(){
  var SOLVED=[1,2,3,4,5,6,7,8,0];
  var gridEl=document.getElementById('grid'), movesEl=document.getElementById('moves'), bestEl=document.getElementById('best'), msgEl=document.getElementById('msg'), statusEl=document.getElementById('status');
  var board=SOLVED.slice(), moves=0, best=null, done=false;
  try{ best=JSON.parse(localStorage.getItem('mochiSlideBest')); }catch(e){}
  if(best!=null) bestEl.textContent=best;

  function isSolved(){ for(var i=0;i<9;i++){ if(board[i]!==SOLVED[i]) return false; } return true; }
  function blankIdx(){ return board.indexOf(0); }
  function adjacent(i,b){ var ri=Math.floor(i/3), ci=i%3, rb=Math.floor(b/3), cb=b%3; return (ri===rb && Math.abs(ci-cb)===1) || (ci===cb && Math.abs(ri-rb)===1); }
  function render(){
    gridEl.innerHTML='';
    board.forEach(function(v,i){
      var b=document.createElement('button');
      if(v===0){ b.className='tile blank'; b.disabled=true; }
      else { b.className='tile'+(v===SOLVED[i]?' correct':''); b.textContent=v; b.addEventListener('click', function(){ move(i); }); }
      gridEl.appendChild(b);
    });
  }
  function move(i){
    if(done) return; var b=blankIdx();
    if(!adjacent(i,b)) return;
    board[b]=board[i]; board[i]=0; moves++; movesEl.textContent=moves; render();
    if(isSolved()) win();
  }
  function win(){
    done=true; statusEl.textContent='Solved! 🎉';
    if(best==null || moves<best){ best=moves; try{ localStorage.setItem('mochiSlideBest',JSON.stringify(best)); }catch(e){} bestEl.textContent=best; msgEl.textContent='🏆 New best — '+moves+' moves!'; }
    else msgEl.textContent='🎉 Solved in '+moves+' moves! Tap Shuffle to play again.';
  }
  function shuffle(){
    // scramble by making many random valid moves from solved (always solvable)
    board=SOLVED.slice();
    var prev=-1;
    for(var n=0;n<120;n++){
      var b=blankIdx(), opts=[];
      for(var i=0;i<9;i++){ if(i!==prev && adjacent(i,b)) opts.push(i); }
      var pick=opts[Math.floor(Math.random()*opts.length)];
      board[b]=board[pick]; board[pick]=0; prev=b;
    }
    if(isSolved()){ var t=board[7]; board[7]=board[8]; board[8]=t; } // avoid starting solved
    moves=0; done=false; movesEl.textContent=0; msgEl.textContent=''; statusEl.textContent='Keep sliding…'; render();
  }
  document.getElementById('shuffle').addEventListener('click', shuffle);

  // test hooks
  window.__mochiSlide = { board:function(){return board.slice();}, moves:function(){return moves;}, solved:isSolved, move:move, setBoard:function(a){ board=a.slice(); done=false; moves=0; movesEl.textContent=0; render(); }, shuffle:shuffle };

  shuffle();
})();
</script>
<script src="/assets/js/cute.js?nb=1"></script>
</body>
</html>
