<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#2b0b3a,#6a1b9a,#9c4dcc);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
  .container{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:24px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);text-align:center;max-width:420px;width:100%}
  h1{font-size:1.7rem;color:#fff;margin-bottom:4px;text-shadow:0 0 30px rgba(233,216,255,.4)}

  .score-board{display:flex;justify-content:space-between;background:rgba(0,0,0,.3);border-radius:12px;padding:9px 18px;margin-bottom:16px;color:#fff}
  .score-board b{color:#e9d8ff}
  .board{background:rgba(0,0,0,.28);border-radius:14px;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:340px;margin:0 auto;touch-action:none;position:relative}
  .tile{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.5rem;background:rgba(255,255,255,.07);color:#2b0b3a;transition:transform .08s}
  .msg{color:#fff;margin-top:14px;font-weight:700;min-height:1.3em}
  .controls{margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .controls a,.controls button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:9px 20px;border-radius:10px;cursor:pointer;font-size:.95rem;text-decoration:none;display:inline-block}
  .controls a:hover,.controls button:hover{background:#e9d8ff;color:#2b0b3a}
  .hint{color:rgba(255,255,255,.5);font-size:.74rem;margin-top:12px}
</style>

<body>
<div class="container">
  <h1>🔢 Mochi 2048</h1>
  <p class="subtitle">Slide to merge matching numbers — get to 2048!</p>
  <div class="score-board"><div>Score: <b id="score">0</b></div><div id="status">Keep merging…</div><div>Best: <b id="best">0</b></div></div>
  <div class="board" id="board"></div>
  <div class="msg" id="msg"></div>
  <p class="hint">⬆️⬇️⬅️➡️ arrow keys, or swipe on touch.</p>
  <div class="controls">
    <button id="new">New Game 🔄</button>
    <a href="/fun-games/index.html">← All Games</a>
  </div>
</div>
<script>
(function(){
  var N=4;
  var boardEl=document.getElementById('board'), scoreEl=document.getElementById('score'), bestEl=document.getElementById('best'), msgEl=document.getElementById('msg'), statusEl=document.getElementById('status');
  var grid=[], score=0, best=0, state='play';
  var COLORS={0:'rgba(255,255,255,.07)',2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
  try{ best=+localStorage.getItem('mochi2048Best')||0; }catch(e){} bestEl.textContent=best;

  function empty(){ var r=[]; for(var i=0;i<N*N;i++){ if(grid[i]===0) r.push(i); } return r; }
  function spawn(){ var e=empty(); if(!e.length) return; grid[e[Math.floor(Math.random()*e.length)]] = Math.random()<0.9?2:4; }
  function render(){
    boardEl.innerHTML='';
    for(var i=0;i<N*N;i++){
      var v=grid[i], t=document.createElement('div'); t.className='tile';
      t.style.background=COLORS[v]||'#3c3a32'; t.style.color = v>4?'#f9f6f2':'#2b0b3a';
      t.textContent=v||''; t.style.fontSize = v>=1024?'1.1rem':v>=128?'1.3rem':'1.5rem';
      boardEl.appendChild(t);
    }
  }
  // slide one row of 4 to the left; returns [newRow, gained, moved]
  function slide(row){
    var a=row.filter(function(x){return x;}); var gained=0;
    for(var i=0;i<a.length-1;i++){ if(a[i]===a[i+1]){ a[i]*=2; gained+=a[i]; a.splice(i+1,1); } }
    while(a.length<N) a.push(0);
    var moved=false; for(var j=0;j<N;j++){ if(a[j]!==row[j]) moved=true; }
    return [a,gained,moved];
  }
  function getRow(r){ return [grid[r*N],grid[r*N+1],grid[r*N+2],grid[r*N+3]]; }
  function setRow(r,a){ for(var c=0;c<N;c++) grid[r*N+c]=a[c]; }
  function getCol(c){ return [grid[c],grid[c+N],grid[c+2*N],grid[c+3*N]]; }
  function setCol(c,a){ for(var r=0;r<N;r++) grid[r*N+c]=a[r]; }
  function move(dir){
    if(state!=='play') return false;
    var moved=false, gained=0, i, res;
    if(dir==='left'||dir==='right'){
      for(i=0;i<N;i++){ var row=getRow(i); if(dir==='right') row.reverse(); res=slide(row); if(dir==='right') res[0].reverse(); setRow(i,res[0]); gained+=res[1]; if(res[2]) moved=true; }
    } else {
      for(i=0;i<N;i++){ var col=getCol(i); if(dir==='down') col.reverse(); res=slide(col); if(dir==='down') res[0].reverse(); setCol(i,res[0]); gained+=res[1]; if(res[2]) moved=true; }
    }
    if(moved){ score+=gained; scoreEl.textContent=score; spawn(); render(); check(); }
    return moved;
  }
  function canMove(){
    if(empty().length) return true;
    for(var r=0;r<N;r++) for(var c=0;c<N;c++){ var v=grid[r*N+c]; if(c<N-1&&grid[r*N+c+1]===v) return true; if(r<N-1&&grid[(r+1)*N+c]===v) return true; }
    return false;
  }
  function check(){
    if(grid.indexOf(2048)>=0 && state==='play'){ state='won'; statusEl.textContent='You win! 🎉'; msgEl.textContent='🏆 You reached 2048! Keep going or start fresh.'; state='play'; } // allow continue
    if(!canMove()){ state='over'; statusEl.textContent='Game over'; msgEl.textContent='No more moves! Score: '+score+'. Tap New Game.'; save(); }
  }
  function save(){ if(score>best){ best=score; try{ localStorage.setItem('mochi2048Best',best); }catch(e){} bestEl.textContent=best; } }
  function newGame(){ grid=new Array(N*N).fill(0); score=0; state='play'; scoreEl.textContent=0; statusEl.textContent='Keep merging…'; msgEl.textContent=''; spawn(); spawn(); render(); }
  document.getElementById('new').addEventListener('click', function(){ save(); newGame(); });
  document.addEventListener('keydown', function(e){
    var d={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'}[e.key];
    if(d){ e.preventDefault(); move(d); save(); }
  });
  // swipe
  var sx=0,sy=0;
  boardEl.addEventListener('touchstart', function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
  boardEl.addEventListener('touchend', function(e){ var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy; if(Math.max(Math.abs(dx),Math.abs(dy))<24) return; if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left'); else move(dy>0?'down':'up'); save(); }, {passive:true});

  // test hooks
  window.__mochi2048 = { grid:function(){return grid.slice();}, score:function(){return score;}, state:function(){return state;}, move:move, setGrid:function(a){ grid=a.slice(); render(); }, newGame:newGame };

  newGame();
})();
</script>

</body>
</html>
