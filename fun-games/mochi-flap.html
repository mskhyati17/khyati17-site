<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐤 Mochi Flap</title>
<!-- SEO + social share preview: meta description, Open Graph & Twitter Card tags. (khyati:seo-meta) -->
<meta name="description" content="Tap to flap Mochi through the gaps — how far can you fly? A free arcade game on Khyati17." />
<meta property="og:title" content="🐤 Mochi Flap — Khyati17" />
<meta property="og:description" content="Tap to fly Mochi through the pipes — beat your best score!" />
<meta property="og:image" content="https://khyati17.com/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#2b0b3a,#6a1b9a,#9c4dcc);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
  .container{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:24px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);text-align:center;max-width:440px;width:100%}
  h1{font-size:1.7rem;color:#fff;margin-bottom:4px;text-shadow:0 0 30px rgba(233,216,255,.4)}
  .subtitle{color:rgba(255,255,255,.7);font-size:.84rem;margin-bottom:14px}
  .score-board{display:flex;justify-content:space-between;background:rgba(0,0,0,.3);border-radius:12px;padding:9px 18px;margin-bottom:14px;color:#fff}
  .score-board b{color:#e9d8ff}
  .wrap{border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.4);line-height:0}
  #game{width:100%;height:auto;display:block;cursor:pointer;touch-action:none;background:linear-gradient(180deg,#8ecbff,#c9e9ff)}
  .msg{color:#fff;margin-top:14px;font-weight:700;min-height:1.2em}
  .controls{margin-top:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .controls a,.controls button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:9px 20px;border-radius:10px;cursor:pointer;font-size:.95rem;text-decoration:none;display:inline-block}
  .controls a:hover,.controls button:hover{background:#e9d8ff;color:#2b0b3a}
</style>
</head>
<body>
<div class="container">
  <h1>🐤 Mochi Flap</h1>
  <p class="subtitle">Tap / click / press Space to flap through the gaps!</p>
  <div class="score-board"><div>Score: <b id="score">0</b></div><div id="status">Tap to start</div><div>Best: <b id="best">0</b></div></div>
  <div class="wrap"><canvas id="game" width="320" height="420"></canvas></div>
  <div class="msg" id="msg"></div>
  <div class="controls">
    <button id="restart">Restart 🔄</button>
    <a href="/fun-games/index.html">← All Games</a>
  </div>
</div>
<script>
(function(){
  var canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  var W=canvas.width, H=canvas.height;
  var scoreEl=document.getElementById('score'), bestEl=document.getElementById('best'), msgEl=document.getElementById('msg'), statusEl=document.getElementById('status');
  var GAP=120, PIPE_W=52, SPEED=2.1, GRAV=0.42, FLAP=-6.6, R=14;
  var bird, pipes, score, best=0, state='ready', raf=null;
  try{ best=+localStorage.getItem('mochiFlapBest')||0; }catch(e){} bestEl.textContent=best;

  function reset(){ bird={x:80,y:H/2,v:0}; pipes=[]; score=0; state='ready'; scoreEl.textContent=0; statusEl.textContent='Tap to start'; msgEl.textContent=''; draw(); }
  function addPipe(x){ var top=40+Math.random()*(H-GAP-120); pipes.push({x:x, top:top, passed:false}); }
  function start(){ if(state==='playing') return; if(state==='over') reset(); state='playing'; statusEl.textContent='Fly!'; pipes=[]; addPipe(W+40); addPipe(W+40+ (W+40)/2*2); bird.v=FLAP; loop(); }
  function flap(){ if(state==='ready'){ start(); return; } if(state==='over'){ reset(); return; } bird.v=FLAP; }
  function end(){
    state='over'; statusEl.textContent='Game over'; cancelAnimationFrame(raf);
    if(score>best){ best=score; try{ localStorage.setItem('mochiFlapBest',best); }catch(e){} bestEl.textContent=best; msgEl.textContent='🏆 New best: '+score+'! Tap to fly again.'; }
    else msgEl.textContent='You scored '+score+'. Tap to fly again.';
  }
  function update(){
    bird.v+=GRAV; bird.y+=bird.v;
    if(bird.y>H-R){ bird.y=H-R; return end(); }
    if(bird.y<R){ bird.y=R; bird.v=0; }
    for(var i=0;i<pipes.length;i++){
      var p=pipes[i]; p.x-=SPEED;
      if(!p.passed && p.x+PIPE_W<bird.x){ p.passed=true; score++; scoreEl.textContent=score; }
      // collision
      if(bird.x+R>p.x && bird.x-R<p.x+PIPE_W && (bird.y-R<p.top || bird.y+R>p.top+GAP)){ return end(); }
    }
    if(pipes.length && pipes[0].x < -PIPE_W) pipes.shift();
    var last=pipes[pipes.length-1];
    if(!last || last.x < W-((W+40)/1.6)) addPipe(W+20);
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    // pipes
    ctx.fillStyle='#5cc85c'; ctx.strokeStyle='#3a9d3a'; ctx.lineWidth=3;
    (pipes||[]).forEach(function(p){
      ctx.fillRect(p.x,0,PIPE_W,p.top); ctx.strokeRect(p.x,0,PIPE_W,p.top);
      ctx.fillRect(p.x,p.top+GAP,PIPE_W,H-(p.top+GAP)); ctx.strokeRect(p.x,p.top+GAP,PIPE_W,H-(p.top+GAP));
    });
    // ground
    ctx.fillStyle='#d9b56a'; ctx.fillRect(0,H-8,W,8);
    // bird (Mochi)
    if(bird){ ctx.save(); ctx.translate(bird.x,bird.y); ctx.rotate(Math.max(-0.5,Math.min(1,bird.v/12)));
      ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🐶',0,0); ctx.restore(); }
  }
  function loop(){ update(); draw(); if(state==='playing') raf=requestAnimationFrame(loop); }

  canvas.addEventListener('pointerdown', function(e){ e.preventDefault(); flap(); });
  document.addEventListener('keydown', function(e){ if(e.code==='Space'||e.key===' '){ e.preventDefault(); flap(); } });
  document.getElementById('restart').addEventListener('click', reset);

  // test hooks
  window.__mochiFlap = { get state(){return state;}, get score(){return score;}, flap:flap, tick:function(n){ for(var i=0;i<(n||1);i++){ if(state==='playing') update(); } draw(); }, forceStart:start, crash:function(){ if(state!=='playing') start(); bird.y=H+50; update(); } };

  reset();
})();
</script>
<script src="/assets/js/cute.js?nb=1"></script>
</body>
</html>
