<body>
    <div class="container" style="position:relative">
        <div class="complete-msg" id="completeMsg">
            <h2>🎉 You Win!</h2>
            <p>Moves: <span id="finalMoves">0</span></p>
            <p>Time: <span id="finalTime">0</span>s</p>
            <button onclick="resetGame()">Play Again</button>
        </div>
        <h1>🧠 Memory Match</h1>
        <p class="subtitle">Flip cards to find matching pairs</p>
        <div class="score-board">
            <div>Moves: <span id="moves">0</span></div>
            <div>Pairs: <span id="pairs">0</span>/8</div>
            <div>Time: <span id="timer">0</span>s</div>
        </div>
        <div class="grid" id="grid"></div>
        <div class="controls">
            <button onclick="resetGame()">🔄 New Game</button>
        </div>
    </div>
    <script>
        const emojis = ['🐶','🐱','🐸','🦊','🐻','🐼','🐨','🐯'];
        let cards, flipped, matched, moves, pairs, timer, timerInterval, running;
        const gridEl = document.getElementById('grid');
        const movesEl = document.getElementById('moves');
        const pairsEl = document.getElementById('pairs');
        const timerEl = document.getElementById('timer');
        const finalMovesEl = document.getElementById('finalMoves');
        const finalTimeEl = document.getElementById('finalTime');
        const completeMsg = document.getElementById('completeMsg');

        function init() {
            const doubled = [...emojis, ...emojis];
            for (let i = doubled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [doubled[i], doubled[j]] = [doubled[j], doubled[i]];
            }
            cards = doubled.map((emoji, i) => ({ id: i, emoji, flipped: false, matched: false }));
            flipped = [];
            matched = new Set();
            moves = 0;
            pairs = 0;
            timer = 0;
            running = true;
            movesEl.textContent = '0';
            pairsEl.textContent = '0/8';
            timerEl.textContent = '0';
            completeMsg.classList.remove('show');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (running) { timer++; timerEl.textContent = timer; }
            }, 1000);
            render();
        }

        function render() {
            gridEl.innerHTML = '';
            cards.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                if (card.flipped || card.matched) div.classList.add('flipped');
                if (card.matched) div.classList.add('matched');
                div.textContent = (card.flipped || card.matched) ? card.emoji : '?';
                div.addEventListener('click', () => flipCard(i));
                gridEl.appendChild(div);
            });
        }

        function flipCard(i) {
            if (!running) return;
            const card = cards[i];
            if (card.flipped || card.matched) return;
            if (flipped.length >= 2) return;

            card.flipped = true;
            flipped.push(i);
            render();

            if (flipped.length === 2) {
                moves++;
                movesEl.textContent = moves;
                const [a, b] = flipped;
                if (cards[a].emoji === cards[b].emoji) {
                    cards[a].matched = true;
                    cards[b].matched = true;
                    matched.add(a);
                    matched.add(b);
                    pairs = matched.size / 2;
                    pairsEl.textContent = `${pairs}/8`;
                    flipped = [];
                    render();
                    if (matched.size === cards.length) {
                        running = false;
                        clearInterval(timerInterval);
                        finalMovesEl.textContent = moves;
                        finalTimeEl.textContent = timer;
                        completeMsg.classList.add('show');
                    }
                } else {
                    setTimeout(() => {
                        cards[a].flipped = false;
                        cards[b].flipped = false;
                        flipped = [];
                        render();
                    }, 800);
                }
            }
        }

        function resetGame() {
            clearInterval(timerInterval);
            init();
        }

        init();
    </script>
