<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Tool — Khyati17</title>
<!-- SEO + social share preview: meta description, Open Graph & Twitter Card tags. (khyati:seo-meta) -->
<meta name="description" content="AI Tool — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed." />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Khyati17" />
<meta property="og:title" content="AI Tool — Khyati17" />
<meta property="og:description" content="AI Tool — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed." />
<meta property="og:image" content="https://khyati17.com/og-image.png" />
<meta property="og:url" content="https://khyati17.com/ai-tools/tool.html" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="AI Tool — Khyati17" />
<meta name="twitter:description" content="AI Tool — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed." />
<meta name="twitter:image" content="https://khyati17.com/og-image.png" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="../assets/css/styles.css" />
<style>
  :root{ --pp:#6a1b9a; --pp2:#9c4dcc; --acc:#e9d8ff; --ink:#2b0b3a; }
  .tool-wrap{ max-width:680px; margin:26px auto 60px; padding:0 18px; }
  .tool-card{ background:#fff; border:1px solid var(--acc); border-radius:20px; padding:26px 24px; box-shadow:0 10px 28px rgba(117,80,168,.12); }
  .tool-head{ display:flex; align-items:center; gap:14px; }
  .tool-head .ico{ font-size:2.6rem; }
  .tool-head h2{ color:var(--pp); margin:0; font-size:1.5rem; }
  .tool-desc{ color:#666; margin:8px 0 18px; font-size:.95rem; }
  label.fld{ font-weight:600; color:var(--pp); font-size:.9rem; display:block; margin-bottom:6px; }
  textarea#t-in{ width:100%; min-height:140px; resize:vertical; padding:14px; border:2px solid var(--acc); border-radius:14px; font:inherit; font-size:1rem; color:var(--ink); outline:none; transition:border-color .15s; }
  textarea#t-in:focus{ border-color:var(--pp2); }
  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
  .pbtn{ border:none; cursor:pointer; font:inherit; font-weight:700; border-radius:999px; padding:12px 22px; font-size:1rem; transition:transform .1s, box-shadow .15s; }
  .pbtn-solid{ background:linear-gradient(90deg,var(--pp),var(--pp2)); color:#fff; box-shadow:0 6px 16px rgba(117,80,168,.28); }
  .pbtn-ghost{ background:#fff; color:var(--pp); border:2px solid var(--pp2); }
  .pbtn:active{ transform:scale(.97); }
  .pbtn:disabled{ opacity:.5; cursor:default; }
  .out-label{ font-weight:600; color:var(--pp); font-size:.9rem; margin:22px 0 6px; }
  #t-out{ white-space:pre-wrap; word-break:break-word; background:#f8f2ff; border:1px dashed var(--pp2); border-radius:14px; padding:16px; min-height:54px; font-size:1.05rem; color:var(--ink); }
  #t-out.big{ font-size:1.6rem; text-align:center; }
  .back{ display:inline-block; margin-bottom:14px; color:var(--pp); font-weight:600; }
  .nf{ text-align:center; padding:40px 0; color:#666; }
  .more{ text-align:center; margin-top:22px; }
  .more a{ color:var(--pp2); font-weight:600; }
</style>
  <!-- canonical + site icon (khyati:head) -->
  <link rel="canonical" href="https://khyati17.com/ai-tools/tool.html" />
  <script type="application/ld+json" id="tool-jsonld"></script>
</head>
<body>
  <div id="site-header-root"></div>

  <main class="tool-wrap">
    <a class="back" href="/ai-tools/index.html">← Back to AI Zone</a>
    <div class="tool-card" id="t-card">
      <div class="tool-head">
        <span class="ico" id="t-ico">🤖</span>
        <h2 id="t-name">Loading…</h2>
      </div>
      <p class="tool-desc" id="t-desc"></p>
      <div id="t-input-block">
        <label class="fld" for="t-in" id="t-inlabel">Your text</label>
        <textarea id="t-in" placeholder="Type or paste here…"></textarea>
      </div>
      <div class="btn-row">
        <button class="pbtn pbtn-solid" id="t-run">Run</button>
        <button class="pbtn pbtn-ghost" id="t-copy">📋 Copy result</button>
        <button class="pbtn pbtn-ghost" id="t-share">🔗 Share tool</button>
      </div>
      <div class="out-label">Result</div>
      <div id="t-out"></div>
    </div>
    <div class="more"><a href="/ai-tools/index.html">✨ Explore all AI tools</a></div>
  </main>

  <footer class="site-footer"><p>© <span id="year"></span> Khyati17 — All rights reserved</p></footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script type="module" src="../assets/js/auth.js?v=2"></script>
  <script type="module">import('../assets/js/loadHeader.js').then(m=>m.loadSharedHeader());</script>
  <script type="module">
    import { TOOLS } from './tools-data.js?v=1';
    const params = new URLSearchParams(location.search);
    const id = params.get('t');
    const tool = TOOLS.find(x=>x.id===id);
    const card = document.getElementById('t-card');
    const out = document.getElementById('t-out');

    if(!tool){
      card.innerHTML = '<div class="nf">😕 Sorry, that tool wasn’t found.<br><br><a class="back" href="/ai-tools/index.html">← Back to AI Zone</a></div>';
    } else {
      // Per-tool SEO: give each ?t=<id> its own canonical URL, title and
      // description so search engines index tools individually instead of
      // collapsing them all onto this one static page.
      const toolTitle = tool.name + ' — Khyati17 AI Zone';
      const toolDesc = tool.desc || (tool.name + ' — a free online tool on Khyati17. Fast, easy to use and runs right in your browser, no sign-up needed.');
      const toolUrl = 'https://khyati17.com/ai-tools/tool.html?t=' + encodeURIComponent(tool.id);
      document.title = toolTitle;
      const canon = document.querySelector('link[rel="canonical"]');
      if(canon) canon.setAttribute('href', toolUrl);
      const setMeta = (sel, attr, val) => { const el = document.querySelector(sel); if(el) el.setAttribute(attr, val); };
      setMeta('meta[name="description"]', 'content', toolDesc);
      setMeta('meta[property="og:title"]', 'content', toolTitle);
      setMeta('meta[property="og:description"]', 'content', toolDesc);
      setMeta('meta[property="og:url"]', 'content', toolUrl);
      setMeta('meta[name="twitter:title"]', 'content', toolTitle);
      setMeta('meta[name="twitter:description"]', 'content', toolDesc);
      const jsonld = document.getElementById('tool-jsonld');
      if(jsonld) jsonld.textContent = JSON.stringify({
        '@context': 'https://schema.org',
        '@type': 'SoftwareApplication',
        name: tool.name,
        description: toolDesc,
        url: toolUrl,
        applicationCategory: tool.cat ? (tool.cat + ' Tool') : 'UtilitiesApplication',
        operatingSystem: 'Any (runs in browser)',
        isAccessibleForFree: true,
        offers: { '@type': 'Offer', price: '0', priceCurrency: 'USD' }
      });
      document.getElementById('t-ico').textContent = tool.emoji;
      document.getElementById('t-name').textContent = tool.name;
      document.getElementById('t-desc').textContent = tool.desc;
      const inp = document.getElementById('t-in');
      const runBtn = document.getElementById('t-run');
      if(tool.placeholder) inp.placeholder = tool.placeholder;

      if(tool.gen){
        // generator tools need no input
        document.getElementById('t-input-block').style.display = 'none';
        runBtn.textContent = '✨ Generate';
        out.classList.add('big');
      }

      function run(){
        try{
          out.classList.remove('err');
          out.textContent = tool.run(inp.value);
        }catch(e){
          out.textContent = 'Oops — something went wrong. Try different input.';
        }
      }
      runBtn.addEventListener('click', run);
      inp.addEventListener('keydown', e=>{ if(e.key==='Enter' && (e.ctrlKey||e.metaKey)) run(); });
      if(tool.gen) run(); // show one result immediately for generators

      document.getElementById('t-copy').addEventListener('click', async ()=>{
        const txt = out.textContent || '';
        if(!txt) return;
        const b = document.getElementById('t-copy');
        try{ await navigator.clipboard.writeText(txt); b.textContent='✅ Copied!'; }
        catch(e){ b.textContent='Press Ctrl+C'; }
        setTimeout(()=>{ b.textContent='📋 Copy result'; }, 1500);
      });
      // share this specific tool (native share on mobile, copy link elsewhere)
      document.getElementById('t-share').addEventListener('click', async ()=>{
        const b = document.getElementById('t-share');
        const shareUrl = 'https://khyati17.com/ai-tools/tool.html?t=' + encodeURIComponent(id);
        const data = { title: tool.name + ' — Khyati17', text: 'Try the ' + tool.name + ' tool on Khyati17!', url: shareUrl };
        if(navigator.share){ try{ await navigator.share(data); return; }catch(e){} }
        try{ await navigator.clipboard.writeText(shareUrl); b.textContent='✅ Link copied!'; }
        catch(e){ b.textContent='Press Ctrl+C'; }
        setTimeout(()=>{ b.textContent='🔗 Share tool'; }, 1600);
      });
    }
  </script>
  <script src="/assets/js/cute.js?v=5"></script>
</body>
</html>
