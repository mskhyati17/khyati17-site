        statHappinessBar.style.width  = s.happiness + '%';
        statHealthBar.style.width     = s.health + '%';
        statSmartsBar.style.width     = s.smarts + '%';
        statDisciplineBar.style.width = s.discipline + '%';
    }

    function getMoodEmoji() {
        const s = state.stats;
        const avg = (s.happiness + s.health + s.smarts + s.discipline) / 4;
        if (avg >= 85) return '🌟';
        if (avg >= 65) return '😊';
        if (avg >= 45) return '😐';
        if (avg >= 25) return '😢';
        return '😭';
    }

    function getMoodText() {
        const s = state.stats;
        const avg = (s.happiness + s.health + s.smarts + s.discipline) / 4;
        if (avg >= 85) return 'Thriving! 🌟';
        if (avg >= 65) return 'Doing well 😊';
        if (avg >= 45) return 'Could be better 😐';
        if (avg >= 25) return 'Needs help 😢';
        return 'In trouble 😭';
    }

    function getChildEmoji(day) {
        if (day <= 2) return '👶';
        if (day <= 4) return '🧒';
        if (day <= 7) return '👦';
        if (day <= 10) return '🧑';
        return '🧑‍🎓';
    }

    function updateCharacter() {
        const ageEmoji = getChildEmoji(state.day);
        const moodEmoji = getMoodEmoji();
        characterEmoji.textContent = ageEmoji;
        kidName.textContent = state.kidNameStr || 'Baby';
        kidMood.textContent = `${moodEmoji} ${getMoodText()}`;
        // Bounce animation
        characterEmoji.classList.remove('bounce');
        void characterEmoji.offsetWidth;
        characterEmoji.classList.add('bounce');
    }

    function updateAgeDisplay() {
        const labels = ['', 'Baby', 'Toddler', 'Kid', 'Pre-teen', 'Graduate'];
        let stage = 'Baby';
        if (state.day <= 2) stage = '👶 Baby';
        else if (state.day <= 4) stage = '🧒 Toddler';
        else if (state.day <= 7) stage = '👦 Kid';
        else if (state.day <= 10) stage = '🧑 Pre-teen';
        else stage = '🧑‍🎓 Graduate';
        ageDisplay.textContent = `${stage} – Day ${state.day}`;
    }

    function checkGameOver() {
        const s = state.stats;
        if (s.happiness <= 0) return { over: true, reason: 'Your child became too unhappy. 😢 Sometimes parenting means making the hard choices.' };
        if (s.health <= 0) return { over: true, reason: 'Your child\'s health declined too much. Remember — a healthy body helps a healthy mind!' };
        if (s.smarts <= 0) return { over: true, reason: 'Your child lost their curiosity for learning. Nurture that spark!' };
        if (s.discipline <= 0) return { over: true, reason: 'There were no boundaries left. Kids need structure to feel safe.' };
        return { over: false };
    }

    function checkWin() {
        if (state.day > MAX_DAY) {
            const s = state.stats;
            const avg = (s.happiness + s.health + s.smarts + s.discipline) / 4;
            return { won: true, avg };
        }
        return { won: false };
    }

    // ─── Rendering ───
    function renderWelcome() {
        state.phase = 'welcome';
        situationLabel.textContent = '🌟 Welcome!';
        scenarioText.textContent = 'Welcome to Parenting Simulator! You\'ll guide your child through 12 days of adventures, challenges, and milestones. Every choice shapes who they become. Ready to be the best parent?';
        choicesContainer.innerHTML = '';
        resultBox.classList.add('hidden');
        startBtn.classList.remove('hidden');
        nextBtn.classList.add('hidden');
        restartBtn.classList.add('hidden');
        startBtn.textContent = '▶ Start Your Journey';
        // initial stats
        state.stats = { happiness: 100, health: 100, smarts: 100, discipline: 100 };
        state.day = 1;
        state.round = 0;
        state.choiceMade = false;
        updateStatsUI();
        updateAgeDisplay();
        characterEmoji.textContent = '👶';
        kidName.textContent = 'Baby';
        kidMood.textContent = '🥰 A new beginning!';
    }

    function renderParentChoice() {
        state.phase = 'choose-parent';
        situationLabel.textContent = '👩‍👧‍👦 Choose Your Role';
        scenarioText.textContent = 'First things first — who will you be on this parenting journey?';
        choicesContainer.innerHTML = '';
        resultBox.classList.add('hidden');
        startBtn.classList.add('hidden');
        nextBtn.classList.add('hidden');
        restartBtn.classList.add('hidden');

        const momBtn = document.createElement('button');
        momBtn.className = 'choice-btn';
        momBtn.innerHTML = '👩 I\'ll be the Mom! <div class="effect">Nurturing, caring, and wise</div>';
        momBtn.addEventListener('click', () => chooseParent('mom'));

        const dadBtn = document.createElement('button');
        dadBtn.className = 'choice-btn';
        dadBtn.innerHTML = '👨 I\'ll be the Dad! <div class="effect">Strong, playful, and kind</div>';
        dadBtn.addEventListener('click', () => chooseParent('dad'));

        choicesContainer.appendChild(momBtn);
        choicesContainer.appendChild(dadBtn);
    }

    function chooseParent(role) {
        state.parent = role;
        const parentEmoji = role === 'mom' ? '👩' : '👨';
        state.kidNameStr = role === 'mom' ? 'Mom\'s Little Star' : 'Dad\'s Champ';
        const nameInput = prompt('Give your child a name! (or press Enter for default):', '');
        if (nameInput && nameInput.trim()) {
            state.kidNameStr = nameInput.trim();
        }
        // Move to day 1 scenario
        renderScenario(1);
    }

    function renderScenario(day) {
        state.phase = 'playing';
        state.day = day;
        state.choiceMade = false;
        updateAgeDisplay();
        updateCharacter();

        const scenario = SCENARIOS.find(s => s.day === day);
        if (!scenario) {
            // No more scenarios — check win
            const winCheck = checkWin();
            if (winCheck.won) {
                renderWin();
            }
            return;
        }

        state.currentScenario = scenario;
        situationLabel.textContent = `📅 Day ${day} — Challenge`;
        scenarioText.textContent = scenario.desc;

        choicesContainer.innerHTML = '';
        resultBox.classList.add('hidden');
        startBtn.classList.add('hidden');
        nextBtn.classList.add('hidden');
        restartBtn.classList.add('hidden');

        scenario.choices.forEach((choice, idx) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.textContent = choice.text;
            btn.addEventListener('click', () => handleChoice(idx));
            choicesContainer.appendChild(btn);
        });
    }

    function handleChoice(idx) {
        if (state.choiceMade) return;
        const scenario = state.currentScenario;
        if (!scenario) return;
        const choice = scenario.choices[idx];
        if (!choice) return;

        state.choiceMade = true;
        state.round++;

        // Apply effects
        const eff = choice.effects;
        state.stats.happiness  = clamp(state.stats.happiness  + (eff.happiness  || 0));
        state.stats.health     = clamp(state.stats.health     + (eff.health     || 0));
        state.stats.smarts    = clamp(state.stats.smarts    + (eff.smarts    || 0));
        state.stats.discipline = clamp(state.stats.discipline + (eff.discipline || 0));
        updateStatsUI();
        updateCharacter();

        // Show result
        resultBox.classList.remove('hidden');
        resultTitle.textContent = '✨ Result';
        resultText.textContent = choice.result;

        // Disable all choice buttons and color them
        const btns = choicesContainer.querySelectorAll('.choice-btn');
        btns.forEach((btn, i) => {
            btn.disabled = true;
            if (i === idx) {
                const net = (eff.happiness||0) + (eff.health||0) + (eff.smarts||0) + (eff.discipline||0);
                if (net > 5) btn.classList.add('result-good');
                else if (net < -3) btn.classList.add('result-bad');
                else btn.classList.add('result-neutral');
            } else {
                btn.style.opacity = '0.4';
            }
        });

        // Check game over
        const gameOverCheck = checkGameOver();
        if (gameOverCheck.over) {
            renderGameOver(gameOverCheck.reason);
            return;
        }

        // Check win (after last day)
        if (state.day >= MAX_DAY) {
            const winCheck = checkWin();
            if (winCheck.won) {
                nextBtn.classList.add('hidden');
                restartBtn.classList.remove('hidden');
                return;
            }
        }

        // Show next button
        nextBtn.classList.remove('hidden');
        nextBtn.textContent = state.day >= MAX_DAY ? '🎉 See Final Results' : '➡ Next Day';
    }

    function goToNextDay() {
        if (state.day >= MAX_DAY) {
            renderWin();
            return;
        }
        renderScenario(state.day + 1);
    }

    function renderGameOver(reason) {
        state.phase = 'game-over';
        situationLabel.textContent = '💔 Game Over';
        scenarioText.textContent = reason;
        choicesContainer.innerHTML = '';
        resultBox.classList.add('hidden');
        startBtn.classList.add('hidden');
        nextBtn.classList.add('hidden');
        restartBtn.classList.remove('hidden');
        characterEmoji.textContent = '😢';
        kidMood.textContent = '💔 Needs more love...';
    }

    function renderWin() {
        state.phase = 'game-over';
        const s = state.stats;
        const avg = ((s.happiness + s.health + s.smarts + s.discipline) / 4).toFixed(0);
        situationLabel.textContent = '🎉 Graduation Day!';
        let grade = 'C';
        let msg = 'You did okay, but there\'s room to grow.';
        if (avg >= 90) { grade = 'A+'; msg = 'Absolutely incredible! You\'re a legendary parent! 🌟'; }
        else if (avg >= 80) { grade = 'A'; msg = 'Amazing job! Your child is thriving! ⭐'; }
        else if (avg >= 70) { grade = 'B'; msg = 'Great work! Your child is happy and healthy! 👍'; }
        else if (avg >= 60) { grade = 'C'; msg = 'Good effort! Every parent learns as they go. 💪'; }
        else if (avg >= 45) { grade = 'D'; msg = 'It was a tough journey, but you tried! 🌱'; }
        else { grade = 'F'; msg = 'Parenting is hard — don\'t give up! 💖'; }

        scenarioText.innerHTML = `
            <strong>${state.kidNameStr} graduated with an average score of ${avg}%!</strong><br>
            Grade: <span style="font-size:1.3em;font-weight:bold;color:#d87093">${grade}</span><br>
            ${msg}<br><br>
            😊 Happiness: ${s.happiness} &nbsp;|&nbsp; 💪 Health: ${s.health} &nbsp;|&nbsp; 🧠 Smarts: ${s.smarts} &nbsp;|&nbsp; 🎯 Discipline: ${s.discipline}
        `;
        choicesContainer.innerHTML = '';
        resultBox.classList.add('hidden');
        startBtn.classList.add('hidden');
        nextBtn.classList.add('hidden');
        restartBtn.classList.remove('hidden');
        characterEmoji.textContent = '🧑‍🎓';
        kidMood.textContent = `🎓 Graduated with ${grade}!`;
    }

    function resetGame() {
        state = {
            phase: 'welcome',
            parent: '',
            kidNameStr: '',
            day: 1,
            stats: { happiness: 100, health: 100, smarts: 100, discipline: 100 },
            currentScenario: null,
            choiceMade: false,
            round: 0,
        };
        renderWelcome();
    }

    // ─── Event bindings ───
    startBtn.addEventListener('click', renderParentChoice);
    nextBtn.addEventListener('click', goToNextDay);
    restartBtn.addEventListener('click', resetGame);

    // ─── Start with welcome ───
    renderWelcome();
})();
</script>
