    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1a1a3e, #0d0d2b);
            min-height: 100vh; display: flex; justify-content: center;
            align-items: center; padding: 20px; overflow: hidden;
        }
        .container {
            background: rgba(255,255,255,0.07); backdrop-filter: blur(12px);
            border-radius: 24px; padding: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; max-width: 550px; width: 100%;
        }
        h1 { font-size: 2.2rem; color: #fff; margin-bottom: 8px; text-shadow: 0 0 30px rgba(251,191,36,0.3); }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 14px; }
        .score-board {
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.4); border-radius: 12px;
            padding: 8px 16px; margin-bottom: 12px; color: #fff; font-size: 1rem;
        }
        .score-board span { color: #fbbf24; font-weight: bold; }
        canvas {
            display: block; margin: 0 auto; border-radius: 12px;
            background: #0a0a1a; box-shadow: 0 0 40px rgba(251,191,36,0.1);
            width: 100%; max-width: 500px;
        }
        .controls { margin-top: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .controls button {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 20px; border-radius: 10px; cursor: pointer;
            font-size: 0.9rem; transition: 0.2s;
        }
        .controls button:hover { background: #fbbf24; color: #000; border-color: #fbbf24; transform: scale(1.05); }
        .game-over-msg {
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.75); border-radius: 24px;
            justify-content: center; align-items: center; flex-direction: column; color: #fff; z-index: 10;
        }
        .game-over-msg.show { display: flex; }
        .game-over-msg h2 { font-size: 2rem; margin-bottom: 4px; }
        .game-over-msg p { font-size: 1.1rem; opacity: 0.7; }
        .game-over-msg button {
            margin-top: 14px; background: #fbbf24; border: none;
            color: #000; padding: 10px 32px; border-radius: 10px;

            h1 { font-size: 1.5rem; }
        }

<body>
    <div class="container" style="position:relative">
        <div class="game-over-msg" id="gameOverMsg">
            <h2 id="gameOverTitle">Game Over</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
        <h1>🧱 Breakout</h1>
        <p class="subtitle">← → to move paddle</p>
        <div class="score-board">
            <div>Score: <span id="score">0</span></div>
            <div>Lives: <span id="lives">❤️❤️❤️</span></div>
        </div>
        <canvas id="gameCanvas" width="500" height="400"></canvas>
        <div class="controls">
            <button onclick="togglePause()" id="pauseBtn">⏸ Pause</button>
            <button onclick="resetGame()">🔄 Restart</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 500, H = 400;
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const gameOverMsg = document.getElementById('gameOverMsg');

        const PADDLE_W = 80, PADDLE_H = 12;
        const BALL_R = 6;
        const BRICK_ROWS = 6, BRICK_COLS = 8;
        const BRICK_W = 55, BRICK_H = 16, BRICK_GAP = 5;

        let paddle, ball, bricks, score, lives, running, paused, gameLoop, keys;

        function init() {
            paddle = { x: W/2 - PADDLE_W/2, y: H - 30, w: PADDLE_W, h: PADDLE_H };
            resetBall();
            bricks = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks.push({
                        x: 15 + c * (BRICK_W + BRICK_GAP),
                        y: 30 + r * (BRICK_H + BRICK_GAP),
                        w: BRICK_W, h: BRICK_H,
                        alive: true,
                        color: ['#ef4444','#f97316','#fbbf24','#22c55e','#3b82f6','#a78bfa'][r]
                    });
                }
            }
            score = 0;
            lives = 3;
            running = true;
            paused = false;
            keys = {};
            scoreEl.textContent = '0';
            livesEl.textContent = '❤️❤️❤️';
            document.getElementById('pauseBtn').textContent = '⏸ Pause';
            gameOverMsg.classList.remove('show');
        }

        function resetBall() {
            ball = {
                x: paddle.x + paddle.w/2,
                y: paddle.y - BALL_R,
                r: BALL_R,
                vx: (Math.random() > 0.5 ? 1 : -1) * 3,
                vy: -4
            };
        }

        function togglePause() {
            if (!running) return;
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Pause';
        }

        function resetGame() {
            clearInterval(gameLoop);
            init();
            gameLoop = setInterval(update, 20);
        }

        function update() {
            if (!running || paused) return;

            if (keys['ArrowLeft']) paddle.x = Math.max(0, paddle.x - 6);
            if (keys['ArrowRight']) paddle.x = Math.min(W - paddle.w, paddle.x + 6);

            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.x - ball.r < 0 || ball.x + ball.r > W) ball.vx *= -1;
            if (ball.y - ball.r < 0) ball.vy *= -1;

            if (ball.y + ball.r > H) {
                lives--;
                livesEl.textContent = '❤️'.repeat(Math.max(0, lives));
                if (lives <= 0) { gameOver('Game Over'); return; }
                resetBall();
            }

            // Paddle collision
            if (ball.y + ball.r >= paddle.y && ball.y - ball.r <= paddle.y + paddle.h &&
                ball.x + ball.r > paddle.x && ball.x - ball.r < paddle.x + paddle.w) {
                const hitPos = (ball.x - paddle.x) / paddle.w;
                const angle = (hitPos - 0.5) * Math.PI * 0.7;
                const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                ball.vx = Math.cos(angle) * speed;
                ball.vy = -Math.abs(Math.sin(angle) * speed);
                ball.y = paddle.y - ball.r;
            }

            // Brick collision
            for (const brick of bricks) {
                if (!brick.alive) continue;
                if (ball.x + ball.r > brick.x && ball.x - ball.r < brick.x + brick.w &&
                    ball.y + ball.r > brick.y && ball.y - ball.r < brick.y + brick.h) {
                    brick.alive = false;
                    score += 10;
                    scoreEl.textContent = score;
                    // Determine bounce direction
                    const overlapX = Math.min(ball.x + ball.r - brick.x, brick.x + brick.w - (ball.x - ball.r));
                    const overlapY = Math.min(ball.y + ball.r - brick.y, brick.y + brick.h - (ball.y - ball.r));
                    if (overlapX < overlapY) ball.vx *= -1;
                    else ball.vy *= -1;
                    break;
                }
            }

            // Win check
            if (bricks.every(b => !b.alive)) {
                gameOver('🎉 You Win!');
            }

            draw();
        }

        function gameOver(msg) {
            running = false;
            clearInterval(gameLoop);
            gameOverTitle.textContent = msg;
            finalScoreEl.textContent = score;
            gameOverMsg.classList.add('show');
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            // Bricks
            bricks.forEach(b => {
                if (!b.alive) return;
                ctx.fillStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 6;
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(b.x, b.y, b.w, 3);
            });
            // Paddle
            ctx.shadowColor = '#fbbf24';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#fbbf24';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, 3);
            // Ball
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' && !e.repeat) { e.preventDefault(); if (!running) resetGame(); }
            if (e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); }
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; });
        window.addEventListener('keydown', e => {
            if (['ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
        });

        init();
        gameLoop = setInterval(update, 20);
    </script>

</body>
