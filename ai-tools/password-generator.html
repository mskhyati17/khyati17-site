  <style>
    :root{ --pp:#6a1b9a; --pp2:#9c4dcc; --acc:#e9d8ff; --ink:#2b0b3a; }
    .t-main{ max-width:720px; margin:0 auto; padding:18px 16px 48px; }
    .t-head{ text-align:center; margin:8px 0 22px; }
    .t-head h2{ font-size:clamp(1.5rem,4vw,2.2rem); color:var(--pp); margin:0; }
    .t-head p{ color:#6b5b7e; margin:8px 0 0; }
    .t-panel{ background:#fff; border:1px solid var(--acc); border-radius:16px; box-shadow:0 8px 28px rgba(117,80,168,.10); padding:20px; margin-bottom:20px; }
    .pw-out{ display:flex; gap:10px; align-items:center; background:#faf5ff; border:1px solid #ead9fb; border-radius:12px; padding:14px 16px; }
    .pw-out code{ flex:1; font-size:1.2rem; word-break:break-all; color:var(--ink); font-family:ui-monospace,Menlo,Consolas,monospace; }
    .pw-out button{ cursor:pointer; border:1px solid var(--pp2); background:#fff; color:var(--pp); border-radius:10px; padding:8px 12px; font-weight:600; }
    .pw-strength{ height:8px; border-radius:999px; background:#eee; margin:14px 0 6px; overflow:hidden; }
    .pw-strength i{ display:block; height:100%; width:0; transition:width .2s, background .2s; }
    .pw-strength-label{ font-size:.85rem; color:#6b5b7e; }
    .t-row{ display:flex; align-items:center; gap:12px; margin:14px 0; flex-wrap:wrap; }
    .t-row label{ font-weight:600; color:var(--ink); }
    input[type=range]{ flex:1; accent-color:var(--pp2); min-width:160px; }
    .opt{ display:flex; align-items:center; gap:8px; font-weight:500; color:var(--ink); }
    .opt input{ width:18px; height:18px; accent-color:var(--pp2); }
    .t-generate{ margin-top:8px; width:100%; cursor:pointer; border:none; border-radius:12px; background:linear-gradient(90deg,var(--pp),var(--pp2)); color:#fff; font-weight:700; font-size:1.05rem; padding:14px; }
    .t-generate:hover{ opacity:.93; }
    .t-toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:var(--pp); color:#fff; padding:10px 18px; border-radius:999px; font-size:.9rem; box-shadow:0 8px 24px rgba(0,0,0,.2); opacity:0; pointer-events:none; transition:all .25s; z-index:100; }
    .t-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div id="site-header-root"></div>
  <main class="t-main">
    <div class="t-head">
      <h2>🔐 Password Generator</h2>
      <p>Create strong, random passwords right in your browser — nothing is sent anywhere.</p>
    </div>
    <div class="t-panel">
      <div class="pw-out"><code id="pwOut">click generate…</code><button id="pwCopy">📋</button></div>
      <div class="pw-strength"><i id="pwBar"></i></div>
      <div class="pw-strength-label" id="pwLabel">&nbsp;</div>

      <div class="t-row"><label for="pwLen">Length</label><input type="range" id="pwLen" min="6" max="40" value="16" /><strong id="pwLenVal">16</strong></div>
      <div class="t-row">
        <span class="opt"><input type="checkbox" id="pwUpper" checked /> A-Z</span>
        <span class="opt"><input type="checkbox" id="pwLower" checked /> a-z</span>
        <span class="opt"><input type="checkbox" id="pwNum" checked /> 0-9</span>
        <span class="opt"><input type="checkbox" id="pwSym" checked /> !@#$</span>
      </div>
      <button class="t-generate" id="pwGen">🔁 Generate Password</button>
    </div>
  </main>
  <div class="t-toast" id="toast">Copied!</div>
  <footer class="site-footer"><p>© <span id="year"></span> Khyati — All rights reserved</p></footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script>
  (function(){
    const SETS = { upper:"ABCDEFGHJKLMNPQRSTUVWXYZ", lower:"abcdefghijkmnopqrstuvwxyz", num:"23456789", sym:"!@#$%^&*-_=+?" };
    const out=document.getElementById('pwOut'), bar=document.getElementById('pwBar'), label=document.getElementById('pwLabel');
    const lenEl=document.getElementById('pwLen'), lenVal=document.getElementById('pwLenVal');
    const toast=document.getElementById('toast'); let tt;
    function showToast(m){ toast.textContent=m; toast.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>toast.classList.remove('show'),1400); }
    function rand(n){ const a=new Uint32Array(n); (crypto||window.crypto).getRandomValues(a); return a; }
    function gen(){
      let pool=""; const active=[];
      if(document.getElementById('pwUpper').checked){ pool+=SETS.upper; active.push(SETS.upper); }
      if(document.getElementById('pwLower').checked){ pool+=SETS.lower; active.push(SETS.lower); }
      if(document.getElementById('pwNum').checked){ pool+=SETS.num; active.push(SETS.num); }
      if(document.getElementById('pwSym').checked){ pool+=SETS.sym; active.push(SETS.sym); }
      if(!pool){ out.textContent="select at least one option"; bar.style.width="0"; label.textContent=""; return; }
      const len=parseInt(lenEl.value,10); const r=rand(len); let pw="";
      for(let i=0;i<len;i++) pw+=pool[r[i]%pool.length];
      // ensure at least one of each selected set
      const r2=rand(active.length);
      active.forEach((set,i)=>{ const pos=r2[i]%len; const c=set[rand(1)[0]%set.length]; pw=pw.substring(0,pos)+c+pw.substring(pos+1); });
      out.textContent=pw;
      const variety=active.length, score=Math.min(100, Math.round((len/40)*60 + variety*10));
      bar.style.width=score+"%";
      bar.style.background = score<40?"#ef4444":score<70?"#f59e0b":"#16a34a";
      label.textContent = score<40?"Weak":score<70?"Good":"Strong";
    }
    lenEl.addEventListener('input',()=>{ lenVal.textContent=lenEl.value; gen(); });
    ['pwUpper','pwLower','pwNum','pwSym'].forEach(id=>document.getElementById(id).addEventListener('change',gen));
    document.getElementById('pwGen').addEventListener('click',gen);
    document.getElementById('pwCopy').addEventListener('click',()=>{
      const t=out.textContent; if(!t||t.includes('click')||t.includes('select')) return;
      try{ navigator.clipboard.writeText(t); showToast("Copied!"); }catch(e){ showToast("Press Ctrl+C"); }
    });
    gen();
  })();
  </script>
  <script type="module" src="../assets/js/auth.js?v=2"></script>
  <script type="module">import('../assets/js/loadHeader.js').then(m=>m.loadSharedHeader());</script>
</body>
</html>
