  let c = hex.replace('#','');

/* ============ SILHOUETTE (for card previews) ============ */
const Silhouette = () => (<g>{Body('#e6d5ee')}</g>);

const findItem = (arr, id) => arr.find(x=>x.id===id);

/* ============ MINI PREVIEW for a card ============ */
function MiniPreview({type, item, color, hairColor}) {
  let inner;
  if (type==='hair') inner = (<g>{item.back(hairColor||'#6b4423')}{item.front(hairColor||'#6b4423')}</g>);
  else inner = item.svg(color);
  return (
    <svg viewBox="20 12 165 370" preserveAspectRatio="xMidYMid meet">
      <Silhouette/>
      {type==='hair' && <ellipse cx="100" cy="70" rx="38" ry="42" fill="#f0e2f7"/>}
      {inner}
    </svg>
  );
}

/* ============ MAIN APP ============ */
function App() {
  const [selectedTop, setSelectedTop] = useState(null);
  const [selectedBottom, setSelectedBottom] = useState(null);
  const [selectedShoes, setSelectedShoes] = useState(null);
  const [selectedOuter, setSelectedOuter] = useState(null);
  const [selectedHair, setSelectedHair] = useState('longStraight');
  const [selectedAccs, setSelectedAccs] = useState([]);

  const [topColor, setTopColor] = useState('#FF69B4');
  const [bottomColor, setBottomColor] = useState('#4169E1');
  const [shoeColor, setShoeColor] = useState('#C9A66B');
  const [outerColor, setOuterColor] = useState('#2C2C2C');
  const [hairColor, setHairColor] = useState('#3b2417');
  const [skinTone, setSkinTone] = useState('#FDBCB4');

  const [showModal, setShowModal] = useState(false);
  const [open, setOpen] = useState({tops:true, bottoms:true, shoes:false, outer:false});

  const toggleAcc = (id) =>
    setSelectedAccs(p => p.includes(id) ? p.filter(x=>x!==id) : [...p, id]);

  const rand = (a) => a[Math.floor(Math.random()*a.length)];
  const randColor = () => rand(CLOTHE_COLORS).c;

  const randomize = () => {
    setSelectedTop(rand(TOPS).id);
    setSelectedBottom(rand(BOTTOMS).id);
    setSelectedShoes(rand(SHOES).id);
    setSelectedOuter(Math.random() > 0.5 ? rand(OUTER).id : null);
    setSelectedHair(rand(HAIR).id);
    const naccs = Math.floor(Math.random()*4);
    const shuffled = [...ACCS].sort(()=>Math.random()-0.5).slice(0, naccs).map(a=>a.id);
    setSelectedAccs(shuffled);
    setTopColor(randColor()); setBottomColor(randColor());
    setShoeColor(randColor()); setOuterColor(randColor());
    setHairColor(rand(HAIR_COLORS).c);
    setSkinTone(rand(SKIN_TONES).c);
  };

  const clearAll = () => {
    setSelectedTop(null); setSelectedBottom(null); setSelectedShoes(null);
    setSelectedOuter(null); setSelectedHair('longStraight'); setSelectedAccs([]);
    setTopColor('#FF69B4'); setBottomColor('#4169E1'); setShoeColor('#C9A66B');
    setOuterColor('#2C2C2C'); setHairColor('#3b2417'); setSkinTone('#FDBCB4');
  };

  const topItem = selectedTop && findItem(TOPS, selectedTop);
  const botItem = selectedBottom && findItem(BOTTOMS, selectedBottom);
  const shoeItem = selectedShoes && findItem(SHOES, selectedShoes);
  const outItem = selectedOuter && findItem(OUTER, selectedOuter);
  const hairItem = findItem(HAIR, selectedHair);

  /* ---- reusable section renderer (left panel) ---- */
  const Section = ({title, emoji, items, type, selected, setSel, color, setColor, key2}) => (
    <div className="section">
      <div className="sechead" onClick={()=>setOpen(o=>({...o,[key2]:!o[key2]}))}>
        <span>{emoji} {title}</span><span>{open[key2]?'▾':'▸'}</span>
      </div>
      {open[key2] && (<>
        <div className="grid">
          {items.map(it=>(
            <div key={it.id} className={'card'+(selected===it.id?' sel':'')}
                 onClick={()=>setSel(selected===it.id?null:it.id)}>
              <MiniPreview type={type} item={it} color={color}/>
              <div className="lbl">{it.label}</div>
            </div>
          ))}
        </div>
        <div className="swlabel">Color</div>
        <div className="swatches">
          {CLOTHE_COLORS.map(s=>(
            <div key={s.c} className={'swatch'+(color===s.c?' sel':'')}
                 style={{background:s.c}} title={s.n} onClick={()=>setColor(s.c)}/>
          ))}
        </div>
      </>)}
    </div>
  );

  return (
    <div>
      <div className="topbar">
        <div className="title">✨ Dress To Impress</div>
        <div className="topbtns">
          <button className="pill" onClick={randomize}>🎲 Randomize</button>
          <button className="pill" onClick={clearAll}>🗑️ Clear</button>
          <button className="pill" onClick={()=>setShowModal(true)}>💾 Save Look</button>
        </div>
      </div>

      <div className="layout">
        {/* LEFT PANEL */}
        <div className="panel">
          <Section title="Tops" emoji="👗" items={TOPS} type="top"
                   selected={selectedTop} setSel={setSelectedTop}
                   color={topColor} setColor={setTopColor} key2="tops"/>
          <Section title="Bottoms" emoji="👖" items={BOTTOMS} type="bottom"
                   selected={selectedBottom} setSel={setSelectedBottom}
                   color={bottomColor} setColor={setBottomColor} key2="bottoms"/>
          <Section title="Shoes" emoji="👠" items={SHOES} type="shoe"
                   selected={selectedShoes} setSel={setSelectedShoes}
                   color={shoeColor} setColor={setShoeColor} key2="shoes"/>
          <Section title="Outerwear" emoji="🧥" items={OUTER} type="outer"
                   selected={selectedOuter} setSel={setSelectedOuter}
                   color={outerColor} setColor={setOuterColor} key2="outer"/>
        </div>

        {/* CENTER STAGE */}
        <div className="stage">
          <span className="deco" style={{top:'8%',left:'10%'}}>🌸</span>
          <span className="deco" style={{top:'14%',right:'12%'}}>✨</span>
          <span className="deco" style={{bottom:'30%',left:'8%'}}>💖</span>
          <span className="deco" style={{top:'40%',right:'8%'}}>🌷</span>
          <div className="floor"></div>
          <div className="charholder">
            <svg viewBox="0 0 200 400">
              {Body(skinTone)}
              {hairItem.back(hairColor)}
              {Face()}
              {UnderWear(skinTone)}
              {botItem && botItem.svg(bottomColor)}
              {topItem && topItem.svg(topColor)}
              {shoeItem && shoeItem.svg(shoeColor)}
              {outItem && outItem.svg(outerColor)}
              {selectedAccs.map(id => {
                const a = findItem(ACCS, id);
                return <g key={id}>{a.svg()}</g>;
              })}
              {hairItem.front(hairColor)}
            </svg>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div className="panel">
          <div className="section">
            <div className="sechead"><span>💎 Accessories</span></div>
            <div className="grid">
              {ACCS.map(a=>(
                <div key={a.id} className={'cardwrap card'+(selectedAccs.includes(a.id)?' sel':'')}
                     onClick={()=>toggleAcc(a.id)}>
                  {selectedAccs.includes(a.id) && <span className="check">✅</span>}
                  <MiniPreview type="acc" item={a} color="#999"/>
                  <div className="lbl">{a.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="section">
            <div className="sechead"><span>💇 Hairstyles</span></div>
            <div className="grid">
              {HAIR.map(h=>(
                <div key={h.id} className={'card'+(selectedHair===h.id?' sel':'')}
                     onClick={()=>setSelectedHair(h.id)}>
                  <MiniPreview type="hair" item={h} hairColor={hairColor}/>
                  <div className="lbl">{h.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="section">
            <div className="sechead"><span>🎨 Skin Tone</span></div>
            <div className="swatches" style={{justifyContent:'space-around', marginTop:'12px'}}>
              {SKIN_TONES.map(s=>(
                <div key={s.c} className={'swatch'+(skinTone===s.c?' sel':'')}
                     style={{background:s.c, width:'34px', height:'34px'}}
                     title={s.n} onClick={()=>setSkinTone(s.c)}/>
              ))}
            </div>
          </div>

          <div className="section">
            <div className="sechead"><span>🌈 Hair Color</span></div>
            <div className="swatches" style={{marginTop:'12px'}}>
              {HAIR_COLORS.map(s=>(
                <div key={s.c} className={'swatch'+(hairColor===s.c?' sel':'')}
                     style={{background:s.c}} title={s.n} onClick={()=>setHairColor(s.c)}/>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* SAVE MODAL */}
      {showModal && (
        <div className="modalbg" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h2>💖 Your Look 💖</h2>
            <LookRow label="Top" item={topItem} color={topColor}/>
            <LookRow label="Bottom" item={botItem} color={bottomColor}/>
            <LookRow label="Shoes" item={shoeItem} color={shoeColor}/>
            <LookRow label="Outerwear" item={outItem} color={outerColor}/>
            <LookRow label="Hairstyle" item={hairItem} color={hairColor}/>
            <div className="lookrow">
              <span><b>Skin Tone</b></span>
              <span><span className="dot" style={{background:skinTone}}></span></span>
            </div>
            <div className="lookrow" style={{borderBottom:'none'}}>
              <span><b>Accessories</b></span>
              <span style={{maxWidth:'60%',textAlign:'right'}}>
                {selectedAccs.length ? selectedAccs.map(id=>findItem(ACCS,id).label).join(', ') : '—'}
              </span>
            </div>
            <button className="pill" style={{width:'100%',marginTop:'16px'}}
                    onClick={()=>setShowModal(false)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

function LookRow({label, item, color}) {
  return (
    <div className="lookrow">
      <span><b>{label}</b></span>
      <span>
        {item ? item.label : '—'}
        {item && <span className="dot" style={{background:color}}></span>}
      </span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
