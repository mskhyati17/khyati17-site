<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🤖 AI Zone — AI Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Theme matched to the Khyati home page (purple / lavender) */
    --purple-900:#2b0b3a;
    --purple-700:#6a1b9a;
    --purple-500:#9c4dcc;
    --accent:#e9d8ff;
    --mint:#e9d8ff;
    --mint-soft:#f8f2ff;
    --navy:#6a1b9a;
    --ink:#2b0b3a;
    --muted:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:linear-gradient(180deg,#f8f2ff 0%,#fff 100%);
    color:var(--ink);
    min-height:100vh;
  }
  a{text-decoration:none;color:inherit}

  /* ---------- Navbar ---------- */
  .navbar{
    background:linear-gradient(90deg,var(--purple-700),var(--purple-500));
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    display:flex;align-items:center;gap:16px;
    padding:14px 20px;
    position:sticky;top:0;z-index:50;
  }
  .logo{
    color:#fff;
    font-weight:700;font-size:1.25rem;
    white-space:nowrap;
  }
  .search-wrap{flex:1;display:flex;justify-content:center}
  .search{
    width:100%;max-width:520px;
    background:rgba(255,255,255,0.18);
    border:2px solid transparent;
    border-radius:999px;
    padding:10px 18px;
    color:#fff;font-family:inherit;font-size:.95rem;
    outline:none;transition:border-color .2s,background .2s;
  }
  .search::placeholder{color:rgba(255,255,255,0.75)}
  .search:focus{border-color:var(--accent);background:rgba(255,255,255,0.26)}

  /* ---------- Category strip ---------- */
  .cat-strip{
    background:var(--purple-700);
    padding:0 20px 14px;
    display:flex;gap:10px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .cat-strip::-webkit-scrollbar{display:none}
  .cat-strip:empty{display:none}
  .chip{
    flex:0 0 auto;
    background:rgba(255,255,255,0.16);color:#f1e6ff;
    border:none;cursor:pointer;
    font-family:inherit;font-size:.85rem;font-weight:500;
    padding:8px 16px;border-radius:999px;
    transition:background .18s,color .18s,transform .1s;
    white-space:nowrap;
  }
  .chip:hover{background:rgba(255,255,255,0.28)}
  .chip.active{background:var(--accent);color:var(--purple-900);font-weight:600}
  .chip:active{transform:scale(.96)}

  /* ---------- Hero ---------- */
  .hero{
    background:linear-gradient(135deg,#6a1b9a 0%,#9c4dcc 55%,#2b0b3a 100%);
    color:#fff;text-align:center;
    padding:46px 20px;
  }
  .hero h1{
    font-size:clamp(1.6rem,4vw,2.6rem);
    font-weight:700;
    background:linear-gradient(90deg,#ffffff,#e9d8ff);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .hero p{margin-top:10px;color:#ecdcff;font-size:clamp(.9rem,2vw,1.05rem)}

  /* ---------- Sections ---------- */
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px}
  .section{margin:34px auto}
  .section-title{
    font-size:1.15rem;font-weight:600;
    margin-bottom:14px;display:flex;align-items:center;gap:8px;
  }
  .section-title .count{
    font-size:.75rem;font-weight:500;color:var(--muted);
    background:#fff;border:1px solid #e2e8f0;border-radius:999px;padding:2px 9px;
  }

  /* ---------- Popular row (horizontal) ---------- */
  .pop-row{
    display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;
    scrollbar-width:none;
  }
  .pop-row::-webkit-scrollbar{display:none}
  .pop-item{flex:0 0 auto;text-align:center;width:80px;cursor:pointer}
  .pop-tile{
    width:80px;height:80px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:2.1rem;
    box-shadow:0 4px 12px rgba(117,80,168,.08);
    transition:transform .15s,box-shadow .15s;
    position:relative;
  }
  .pop-item:hover .pop-tile{transform:translateY(-4px);box-shadow:0 10px 20px rgba(117,80,168,.16)}
  .pop-rank{
    position:absolute;top:-6px;left:-6px;
    background:var(--navy);color:var(--mint);
    width:22px;height:22px;border-radius:50%;
    font-size:.7rem;font-weight:600;
    display:flex;align-items:center;justify-content:center;
  }
  .pop-name{
    font-size:.72rem;margin-top:6px;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  /* ---------- Featured grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
    grid-auto-flow:dense;
  }
  .card{
    border-radius:14px;cursor:pointer;
    position:relative;overflow:hidden;
    aspect-ratio:1/1;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    box-shadow:0 4px 12px rgba(117,80,168,.07);
    transition:transform .15s,box-shadow .15s;
  }
  .card:hover{transform:translateY(-5px);box-shadow:0 14px 28px rgba(117,80,168,.18)}
  .card .emoji{font-size:2.6rem;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.12))}
  .card .label{
    margin-top:10px;font-size:.82rem;font-weight:600;color:#1a1a2e;
    padding:0 8px;text-align:center;
  }
  .card .excerpt{
    margin-top:4px;font-size:.68rem;color:#5a4a6e;
    padding:0 12px;text-align:center;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card.big{grid-column:span 2;grid-row:span 2}
  .card.big .emoji{font-size:5rem}
  .card.big .label{font-size:1.05rem;margin-top:14px}
  .card.big .excerpt{font-size:.8rem;-webkit-line-clamp:3}
  /* coming-soon cards are dimmed and not clickable */
  .card.soon{cursor:default;opacity:.72}
  .card.soon:hover{transform:none;box-shadow:0 4px 12px rgba(117,80,168,.07)}
  .badge-live{
    position:absolute;top:8px;left:8px;
    background:#16a34a;color:#fff;
    font-size:.62rem;font-weight:600;
    padding:3px 8px;border-radius:999px;
    box-shadow:0 2px 6px rgba(22,163,74,.35);
  }
  .badge-soon{
    position:absolute;top:8px;left:8px;
    background:#9ca3af;color:#fff;
    font-size:.62rem;font-weight:600;
    padding:3px 8px;border-radius:999px;
  }
  .badge-offline{
    position:absolute;top:8px;left:8px;
    background:#f59e0b;color:#fff;
    font-size:.62rem;font-weight:600;
    padding:3px 8px;border-radius:999px;
    box-shadow:0 2px 6px rgba(245,158,11,.35);
  }
  .badge-cat{
    position:absolute;bottom:8px;right:8px;
    background:rgba(255,255,255,.65);
    color:#1a1a2e;font-size:.6rem;font-weight:500;
    padding:2px 8px;border-radius:999px;backdrop-filter:blur(3px);
  }
  .empty{
    grid-column:1/-1;text-align:center;color:var(--muted);
    padding:40px 0;font-size:.95rem;
  }

  /* ---------- Browse categories ---------- */
  .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .cat-tile{
    border-radius:14px;cursor:pointer;
    padding:20px;display:flex;align-items:center;gap:14px;
    box-shadow:0 4px 12px rgba(117,80,168,.06);
    transition:transform .15s,box-shadow .15s;
  }
  .cat-tile:hover{transform:translateY(-3px);box-shadow:0 12px 24px rgba(117,80,168,.14)}
  .cat-tile .c-emoji{font-size:2.1rem}
  .cat-tile .c-name{font-weight:600;font-size:1rem}

  /* ---------- Footer ---------- */
  .footer{
    background:linear-gradient(90deg,var(--purple-700),var(--purple-500));
    color:#ecdcff;text-align:center;
    padding:26px 20px;margin-top:40px;font-size:.9rem;
  }
  .footer span{color:#fff}

  /* ---------- Responsive ---------- */
  @media (max-width:680px){
    .navbar{flex-wrap:wrap}
    .logo{flex:1}
    .search-wrap{order:3;flex-basis:100%}
    .grid{grid-template-columns:repeat(2,1fr)}
    .card.big{grid-column:span 2;grid-row:span 2}
    .cat-grid{grid-template-columns:1fr}
  }
  @media (max-width:400px){
    .card .emoji{font-size:2.1rem}
    .card .label{font-size:.74rem}
  }
</style>
</head>
<body>

  <!-- 1. Navbar -->
  <nav class="navbar">
    <a class="logo" href="/ai-tools/index.html">🤖 AI Zone</a>
    <div class="search-wrap">
      <input id="search" class="search" type="search" placeholder="Search AI tools…" autocomplete="off" aria-label="Search AI tools" />
    </div>
  </nav>

  <!-- 2. Category strip -->
  <div id="catStrip" class="cat-strip"></div>

  <!-- 3. Hero -->
  <header class="hero">
    <h1>What will you create today?</h1>
    <p>AI-powered tools you can use right now — no downloads, just create.</p>
  </header>

  <main class="wrap">
    <!-- 4. Popular tools -->
    <section class="section" id="popularSection">
      <div class="section-title">🔥 Popular Tools</div>
      <div id="popRow" class="pop-row"></div>
    </section>

    <!-- 5. Featured / all tools -->
    <section class="section">
      <div class="section-title">⭐ Featured Tools <span class="count" id="gridCount"></span></div>
      <div id="grid" class="grid"></div>
    </section>

    <!-- 6. Browse categories -->
    <section class="section" id="browseSection">
      <div class="section-title">🗂️ Browse Categories</div>
      <div id="catGrid" class="cat-grid"></div>
    </section>
  </main>

  <!-- 7. Footer -->
  <footer class="footer">
    Built by Khyati · Powered by <span>AI</span>
  </footer>

<script>
/* ============================================================
   AI TOOLS — the AI-powered tools built for this site.
   ============================================================ */
const AI_TOOLS = [
  { name:"Story Creator",   category:"Writing", emoji:"📖", color:"#E0D6FF", uses:6900, featured:true,  status:"live",    desc:"AI-powered story generator — choose characters, genres, and settings to create unique tales instantly.", url:"/ai-tools/story-creator.html" },
  { name:"Name Generator",  category:"Names",   emoji:"🏷️", color:"#D7FFD9", uses:5200, featured:false, status:"live",    desc:"Generate fantasy names, usernames, brand names, pet & baby names — instantly in your browser.", url:"/ai-tools/name-generator.html" },
  { name:"News Aggregator", category:"News",    emoji:"📰", color:"#D6E4FF", uses:9800, featured:false, status:"offline", desc:"Latest headlines from BBC, CNN, Reuters, NBC and NYT — all in one place, updated live.", url:"/ai-tools/news-app.html" },
  { name:"Voice Clone",     category:"Audio",   emoji:"🎙️", color:"#FFD6E0", uses:7400, featured:false, status:"offline", desc:"Clone any voice using AI — record a sample and generate realistic speech instantly.", url:"/ai-tools/voice-clone.html" },
  { name:"Coming Soon",     category:"",        emoji:"✨", color:"#F3ECFB", uses:0,    featured:false, status:"soon", desc:"More AI tools are being built. Check back soon!", url:"" },
];

/* ---------- Category styling ---------- */
const CAT_EMOJI = {
  "Writing":"✍️","Names":"🏷️","Audio":"🎙️","News":"📰","Image":"🎨","Chat":"💬","Video":"🎬","Code":"💻","Productivity":"⚡"
};
const CAT_COLOR = {
  "Writing":"#E0D6FF","Names":"#D7FFD9","Audio":"#FFD6E0","News":"#D6E4FF","Image":"#D7FFD9","Chat":"#FFF3C4","Video":"#D6F5FF","Code":"#E5E5FF","Productivity":"#FFE0C4"
};

/* ============================================================
   STATE + RENDERING
   ============================================================ */
let activeCat = "All";
let query = "";

const el = (tag,cls)=>{ const n=document.createElement(tag); if(cls) n.className=cls; return n; };
// Real tools (live + temporarily offline) are clickable; "soon" tools are not.
// Offline tools still open their page, which shows a friendly offline message.
const open = t => { if(t.status!=="soon" && t.url && t.url!=="#") window.location.href = t.url; };

/* --- Categories present (real tools only) --- */
function categories(){
  const set = new Set(AI_TOOLS.filter(t=>t.status!=="soon" && t.category).map(t=>t.category));
  return ["All", ...[...set].sort()];
}

/* --- Category chips --- */
function renderChips(){
  const strip = document.getElementById("catStrip");
  strip.innerHTML = "";
  const cats = categories();
  if(cats.length <= 1) return;
  cats.forEach(cat=>{
    const b = el("button","chip"+(cat===activeCat?" active":""));
    b.textContent = cat;
    b.onclick = ()=>{ activeCat = cat; query=""; document.getElementById("search").value=""; render(); window.scrollTo({top:0,behavior:"smooth"}); };
    strip.appendChild(b);
  });
}

/* --- Popular row (live tools by usage) --- */
function renderPopular(){
  const row = document.getElementById("popRow");
  row.innerHTML = "";
  const top = AI_TOOLS.filter(t=>t.status!=="soon").sort((a,b)=>b.uses-a.uses).slice(0,10);
  top.forEach((t,i)=>{
    const item = el("div","pop-item");
    const tile = el("div","pop-tile");
    tile.style.background = t.color;
    tile.textContent = t.emoji;
    const rank = el("div","pop-rank"); rank.textContent = i+1;
    tile.appendChild(rank);
    const name = el("div","pop-name"); name.textContent = t.name;
    item.appendChild(tile); item.appendChild(name);
    item.onclick = ()=>open(t);
    row.appendChild(item);
  });
}

/* --- Featured / main grid --- */
function renderGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let list = AI_TOOLS.filter(t=>{
    const matchCat = activeCat==="All" || t.category===activeCat;
    const hay = (t.name + ' ' + (t.desc||'')).toLowerCase();
    const matchQ = hay.includes(query);
    return matchCat && matchQ;
  });

  const toolCount = list.filter(t=>t.status!=="soon").length;
  document.getElementById("gridCount").textContent = toolCount + (toolCount===1?" tool":" tools");

  if(!list.length){
    const e = el("div","empty");
    e.textContent = "No tools match your search 😕";
    grid.appendChild(e);
    return;
  }

  const featured = list.find(t=>t.featured && t.status==="live");
  list.forEach(t=>{
    const card = el("div","card"+(t===featured?" big":"")+(t.status==="soon"?" soon":""));
    card.style.background = t.color;
    const BADGE = {
      live:    ["badge-live","● Live"],
      offline: ["badge-offline","● Back soon"],
      soon:    ["badge-soon","Coming Soon"],
    };
    const [bcls,btxt] = BADGE[t.status] || BADGE.live;
    const badge = el("div", bcls); badge.textContent = btxt;
    card.appendChild(badge);
    const visual = el("div","emoji"); visual.textContent = t.emoji;
    const label = el("div","label"); label.textContent = t.name;
    card.appendChild(visual); card.appendChild(label);
    if(t.desc){ const ex=el("div","excerpt"); ex.textContent=t.desc; card.appendChild(ex); }
    if(t.category){ const cat = el("div","badge-cat"); cat.textContent = t.category; card.appendChild(cat); }
    card.onclick = ()=>open(t);
    grid.appendChild(card);
  });
}

/* --- Browse categories grid --- */
function renderCatGrid(){
  const cg = document.getElementById("catGrid");
  cg.innerHTML = "";
  const cats = categories().filter(c=>c!=="All");
  if(!cats.length){ document.getElementById("browseSection").style.display = "none"; return; }
  cats.forEach(cat=>{
    const tile = el("div","cat-tile");
    tile.style.background = CAT_COLOR[cat] || "#eee";
    const em = el("div","c-emoji"); em.textContent = CAT_EMOJI[cat] || "🤖";
    const nm = el("div","c-name"); nm.textContent = cat;
    tile.appendChild(em); tile.appendChild(nm);
    tile.onclick = ()=>{ activeCat=cat; query=""; document.getElementById("search").value=""; render(); window.scrollTo({top:0,behavior:"smooth"}); };
    cg.appendChild(tile);
  });
}

/* --- Master render --- */
function render(){
  renderChips();
  const showHomeRows = activeCat==="All" && !query;
  document.getElementById("popularSection").style.display = showHomeRows ? "" : "none";
  document.getElementById("browseSection").style.display  = showHomeRows ? "" : "none";
  renderPopular();
  renderGrid();
  renderCatGrid();
}

/* --- Live search --- */
document.getElementById("search").addEventListener("input", e=>{
  query = e.target.value.trim().toLowerCase();
  if(query) activeCat = "All";
  render();
});

/* --- Init --- */
render();
</script>
</body>
</html>
