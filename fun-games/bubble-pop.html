<body>
<div class="container">
  <div class="over" id="over"><h2>Times Up!</h2><p>Score: <span id="fin">0</span></p><button onclick="reset()">Play Again</button></div>
  <h1>🫧 Bubble Pop Frenzy</h1>
  <p class="subtitle">Pop groups of 2+ touching same-color bubbles. Bigger groups = more points! 45s.</p>
  <div class="score-board"><div>Score: <span id="score">0</span></div><div>Time: <span id="time">45</span>s</div><div>Best: <span id="best">0</span></div></div>
  <canvas id="c" width="420" height="420"></canvas>
  <div class="controls"><button onclick="reset()">🔄 Restart</button></div>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const COLS=8,ROWS=8,R=420/COLS/2;
const PAL=['#ff5e7e','#5ec8ff','#7dff9b','#ffd65e','#c98bff'];
let grid,score,best,running,endTime,pops;
try{best=parseInt(localStorage.getItem('bubblePopBest'))||0}catch(e){best=0}
document.getElementById('best').textContent=best;
function reset(){grid=[];for(let r=0;r<ROWS;r++){grid[r]=[];for(let col=0;col<COLS;col++)grid[r][col]=Math.floor(Math.random()*PAL.length);}
  score=0;running=true;pops=[];endTime=performance.now()+45000;
  document.getElementById('score').textContent=0;document.getElementById('over').classList.remove('show');}
addEventListener('keydown',e=>{if(e.key===' '&&!running){e.preventDefault();reset();}});
function flood(r,col,ci,seen){if(r<0||col<0||r>=ROWS||col>=COLS)return[];const k=r+'-'+col;if(seen.has(k)||grid[r][col]!==ci)return[];seen.add(k);
  let g=[[r,col]];g=g.concat(flood(r+1,col,ci,seen),flood(r-1,col,ci,seen),flood(r,col+1,ci,seen),flood(r,col-1,ci,seen));return g;}
function collapse(){for(let col=0;col<COLS;col++){let stack=[];for(let r=ROWS-1;r>=0;r--)if(grid[r][col]!==-1)stack.push(grid[r][col]);
  for(let r=ROWS-1;r>=0;r--)grid[r][col]=stack[ROWS-1-r]!==undefined?stack[ROWS-1-r]:-1;}}
function pop(mx,my){if(!running)return;const col=Math.floor(mx/(R*2)),r=Math.floor(my/(R*2));
  if(r<0||col<0||r>=ROWS||col>=COLS||grid[r][col]===-1)return;
  const ci=grid[r][col],group=flood(r,col,ci,new Set());
  if(group.length<2)return;
  group.forEach(([gr,gc])=>{grid[gr][gc]=-1;const px=gc*R*2+R,py=gr*R*2+R;for(let i=0;i<4;i++)pops.push({x:px,y:py,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,ci});});
  score+=group.length*(group.length-1);document.getElementById('score').textContent=score;collapse();
  // refill empty top rows occasionally to keep going
  for(let col2=0;col2<COLS;col2++)for(let r2=0;r2<ROWS;r2++)if(grid[r2][col2]===-1&&Math.random()<0.35)grid[r2][col2]=Math.floor(Math.random()*PAL.length);}
c.addEventListener('mousedown',e=>{const b=c.getBoundingClientRect();pop((e.clientX-b.left)/b.width*420,(e.clientY-b.top)/b.height*420);});
c.addEventListener('touchstart',e=>{const b=c.getBoundingClientRect(),t=e.touches[0];pop((t.clientX-b.left)/b.width*420,(t.clientY-b.top)/b.height*420);e.preventDefault();},{passive:false});
function loop(){
  x.fillStyle='#0d041a';x.fillRect(0,0,420,420);
  const tnow=performance.now();
  if(running){const left=Math.max(0,(endTime-tnow)/1000);document.getElementById('time').textContent=Math.ceil(left);if(left<=0)over();}
  for(let r=0;r<ROWS;r++)for(let col=0;col<COLS;col++){const ci=grid[r][col];if(ci===-1)continue;
    const px=col*R*2+R,py=r*R*2+R, wob=Math.sin(tnow/300+r+col)*1.5;
    x.fillStyle=PAL[ci];x.beginPath();x.arc(px,py+wob,R-2,0,7);x.fill();
    x.fillStyle='rgba(255,255,255,.35)';x.beginPath();x.arc(px-R*0.35,py-R*0.35+wob,R*0.28,0,7);x.fill();}
  for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.x+=p.vx;p.y+=p.vy;p.life-=0.04;if(p.life<=0){pops.splice(i,1);continue;}
    x.globalAlpha=p.life;x.fillStyle=PAL[p.ci];x.beginPath();x.arc(p.x,p.y,4,0,7);x.fill();x.globalAlpha=1;}
  requestAnimationFrame(loop);
}
function over(){if(!running)return;running=false;if(score>best){best=score;try{localStorage.setItem('bubblePopBest',best)}catch(e){}document.getElementById('best').textContent=best;}
  document.getElementById('fin').textContent=score;document.getElementById('over').classList.add('show');}
reset();loop();
</script>
